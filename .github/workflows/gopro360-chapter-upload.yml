name: Upload GoPro 360 Chapter to Drive Inbox (Vast.ai)

on:
  workflow_dispatch:
    inputs:
      script_variant:
        description: 'Stitch script to use (chapter variant)'
        required: false
        default: 'vastai_stitch_max2_chapter.sh'
        type: string
      source_url:
        description: 'Direct CDN download URL for this chapter (from the "source" variant, not concat)'
        required: true
        type: string
      media_id:
        description: 'GoPro media ID for the parent session'
        required: true
        type: string
      filename:
        description: 'GoPro chapter filename e.g. GS020419.360'
        required: true
        type: string
      captured_at:
        description: 'Capture timestamp (ISO8601)'
        required: false
        default: ''
        type: string
      session_prefix:
        description: 'Session number used to group chapters e.g. 0419'
        required: true
        type: string
      chapter_num:
        description: 'Zero-padded chapter number e.g. 01, 02, 03'
        required: true
        type: string
      total_chapters:
        description: 'Total number of chapters in this session (for the concat step to verify against)'
        required: true
        type: string
      test_duration_sec:
        description: 'If set, only process this many seconds (for quick pipeline tests)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'If true, skip download/encode/upload — just boot, benchmark, write DONE, and terminate'
        required: false
        default: 'false'
        type: string
      excluded_offer_ids:
        description: 'Comma-separated offer IDs to skip (used internally on redispatch)'
        required: false
        default: ''
        type: string
      attempt_num:
        description: 'Redispatch attempt counter — do not set manually'
        required: false
        default: '1'
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: gopro360-chapter-${{ github.event.inputs.media_id }}-${{ github.event.inputs.chapter_num }}
  cancel-in-progress: false

jobs:
  upload-360-chapter:
    name: Stitch Chapter ${{ github.event.inputs.chapter_num }}/${{ github.event.inputs.total_chapters }} via Vast.ai
    runs-on: ubuntu-latest
    timeout-minutes: 200

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install requests google-auth google-auth-oauthlib google-api-python-client

      - name: Write GoPro cookies
        env:
          GOPRO_COOKIES: ${{ secrets.GOPRO_COOKIES }}
        run: |
          python3 -c "
          import os
          from pathlib import Path
          cookies = os.environ.get('GOPRO_COOKIES', '{}').strip() or '{}'
          Path('gopro_cookies.json').write_text(cookies)
          print('GoPro cookies written')
          "


      - name: Set chapter source URL (supplied directly, no lookup needed)
        id: get_url
        run: |
          echo "cdn_url=${{ github.event.inputs.source_url }}" >> "$GITHUB_OUTPUT"
          echo "captured_at=${{ github.event.inputs.captured_at }}" >> "$GITHUB_OUTPUT"
          echo "variant=source (chapter ${{ github.event.inputs.chapter_num }}/${{ github.event.inputs.total_chapters }})" >> "$GITHUB_OUTPUT"

      - name: Generate SSH key pair for this run
        run: |
          ssh-keygen -t ed25519 -f /tmp/vastai_key -N "" -C "ffa-360-actions"
          echo "pub_key=$(cat /tmp/vastai_key.pub)" >> $GITHUB_OUTPUT
        id: ssh_key

      - name: Search for cheapest offer + launch Vast.ai instance
        id: launch
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python3 - <<'PY'
          import os, time, json, urllib.request, urllib.parse, urllib.error, sys

          API_KEY = os.environ["VAST_API_KEY"]
          GH_PAT  = os.environ["GH_PAT"]
          pub_key = open("/tmp/vastai_key.pub").read().strip()

          BASE    = "https://console.vast.ai/api/v0"
          BASE_V1 = "https://cloud.vast.ai/api/v1"
          headers = {
              "Authorization": f"Bearer {API_KEY}",
              "Content-Type": "application/json",
              "Accept": "application/json",
          }

          def vast_get(path, params=None, base=None):
              url = f"{base or BASE}{path}"
              if params:
                  url += "?" + urllib.parse.urlencode(params)
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=20) as r:
                  return json.loads(r.read())

          def vast_put(path, data):
              req = urllib.request.Request(f"{BASE}{path}",
                  data=json.dumps(data).encode(), method="PUT", headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def vast_post(path, data):
              req = urllib.request.Request(f"{BASE}{path}",
                  data=json.dumps(data).encode(), method="POST", headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def vast_delete(path, base=None):
              req = urllib.request.Request(f"{base or BASE}{path}", method="DELETE", headers=headers)
              with urllib.request.urlopen(req, timeout=20) as r:
                  return json.loads(r.read())

          def robust_terminate(instance_id):
              """Try all known-working vast.ai delete endpoints in sequence, with logging.
              A single endpoint/error is not sufficient reason to give up — vast.ai's API
              is inconsistent about which base URL accepts DELETE for a given instance.
              This mirrors the final 'Terminate Vast.ai instance' step's proven logic,
              which has never failed to terminate in practice, unlike the old single-
              endpoint try/except:pass version this replaces."""
              endpoints = [
                  f"https://console.vast.ai/api/v0/instances/{instance_id}/",
                  f"https://cloud.vast.ai/api/v0/instances/{instance_id}/",
                  f"https://cloud.vast.ai/api/v1/instances/{instance_id}/",
              ]
              for url in endpoints:
                  req = urllib.request.Request(url, method="DELETE", headers=headers)
                  try:
                      with urllib.request.urlopen(req, timeout=20) as r:
                          print(f"    terminated {instance_id} via {url}: {json.loads(r.read())}")
                      return True
                  except urllib.error.HTTPError as e:
                      body = e.read().decode()[:200]
                      print(f"    {url} -> HTTP {e.code}: {body}")
                      continue  # try next endpoint regardless of error code — do NOT give up early
                  except Exception as e:
                      print(f"    {url} -> error: {e}")
                      continue
              print(f"    WARNING: could not terminate {instance_id} via any endpoint — may need manual cleanup")
              return False

          def redispatch():
              """Re-dispatch this workflow so we get a fresh attempt (max 8 total)."""
              attempt = int("${{ github.event.inputs.attempt_num }}" or "1")
              if attempt >= 8:
                  print(f"ERROR: Already on attempt {attempt}/8 — giving up to avoid burning credit. Manual retry required.", file=sys.stderr)
                  sys.exit(1)
              payload = json.dumps({
                  "ref": "${{ github.ref_name }}",
                  "inputs": {
                      "source_url":          "${{ github.event.inputs.source_url }}",
                      "media_id":            "${{ github.event.inputs.media_id }}",
                      "filename":            "${{ github.event.inputs.filename }}",
                      "captured_at":         "${{ github.event.inputs.captured_at }}",
                      "session_prefix":      "${{ github.event.inputs.session_prefix }}",
                      "chapter_num":         "${{ github.event.inputs.chapter_num }}",
                      "total_chapters":      "${{ github.event.inputs.total_chapters }}",
                      "test_duration_sec":   "${{ github.event.inputs.test_duration_sec }}",
                      "dry_run":             "${{ github.event.inputs.dry_run }}",
                      "excluded_offer_ids":  "${{ github.event.inputs.excluded_offer_ids }}",
                      "attempt_num":         str(attempt + 1),
                      "script_variant":      "${{ github.event.inputs.script_variant }}",
                  }
              }).encode()
              req = urllib.request.Request(
                  "https://api.github.com/repos/${{ github.repository }}/actions/workflows/gopro360-chapter-upload.yml/dispatches",
                  data=payload,
                  method="POST",
                  headers={
                      "Authorization": f"token {GH_PAT}",
                      "Accept": "application/vnd.github.v3+json",
                      "Content-Type": "application/json",
                  }
              )
              try:
                  urllib.request.urlopen(req, timeout=15)
                  print("Redispatch successful.")
              except Exception as e:
                  print(f"WARNING: redispatch failed: {e}")

          # ── Register SSH key ────────────────────────────────────────────────
          print("Registering SSH key...")
          vast_post("/ssh/", {"ssh_key": pub_key})
          print("SSH key registered")

          # ── Dynamic offer search ─────────────────────────────────────────────
          print("Searching for cheapest available offer...")
          # NOTE: geolocation filter removed from query — Vast.ai API returns 400
          # on "neq" operator for this field. CN filtering is done in Python below.
          # Per docs: cpu_ram is in MB; geolocation uses in/notin; cpu_name not filterable via API
          query = json.dumps({
              "reliability":  {"gte": 0.98},
              "inet_up":      {"gte": 800},
              "inet_down":    {"gte": 800},
              "disk_space":   {"gte": 150},
              "cpu_cores":    {"gte": 16},
              "cpu_ram":      {"gte": 65536},
              "gpu_frac":     {"eq": 1},
              "rentable":     {"eq": True},
              "verified":     {"eq": True},
              "geolocation":  {"notin": ["CN"]},
          })

          try:
              resp = vast_get("/bundles/", {"q": query})
          except urllib.error.HTTPError as e:
              body = e.read().decode()[:300]
              print(f"ERROR: Vast.ai /bundles/ returned HTTP {e.code}: {body}", file=sys.stderr)
              print("Redispatching for a retry...")
              redispatch()
              sys.exit(1)
          except Exception as e:
              print(f"ERROR: Vast.ai /bundles/ request failed: {e}", file=sys.stderr)
              print("Redispatching for a retry...")
              redispatch()
              sys.exit(1)

          offers = resp.get("offers", [])
          print(f"Found {len(offers)} verified offers from API")

          # Whitelist high-IPC modern CPUs only — filter graph is single-threaded so IPC matters more than core count
          # CPU model is only a starting hint; offer-level measured reputation (below) overrides it.
          GOOD_CPU_SUBSTRINGS = [
              "Ryzen 9 9950X", "Ryzen 9 7950X",
              "Ryzen 9 9900X", "Ryzen 9 7900X", "Ryzen 9 5900X",
              "Core i9-14", "Core i9-13", "Core i9-12",
              "Threadripper PRO", "Threadripper",
              "Core Ultra 9",
          ]
          before = len(offers)
          offers = [o for o in offers if any(s in (o.get("cpu_name") or "") for s in GOOD_CPU_SUBSTRINGS)]
          print(f"Filtered to {len(offers)} offers with known fast CPUs (excluded {before - len(offers)} others)")

          # ── Persistent offer reputation (survives across runs, unlike excluded_offer_ids) ──
          import datetime, base64
          REPO = "${{ github.repository }}"
          now = datetime.datetime.now(datetime.timezone.utc)
          reputation = {}
          try:
              rurl = f"https://api.github.com/repos/{REPO}/contents/gopro360/offer_reputation.json"
              rreq = urllib.request.Request(rurl, headers={"Authorization": f"token {GH_PAT}", "Accept": "application/vnd.github.v3+json"})
              with urllib.request.urlopen(rreq, timeout=15) as r:
                  reputation = json.loads(base64.b64decode(json.loads(r.read())["content"]).decode() or "{}")
              print(f"Loaded reputation for {len(reputation)} offers")
          except Exception as e:
              print(f"No reputation file (or unreadable): {e} — proceeding with empty reputation")

          def is_blocked(oid):
              rec = reputation.get(str(oid))
              if not rec or not rec.get("block_until"):
                  return False
              try:
                  return datetime.datetime.fromisoformat(rec["block_until"]) > now
              except Exception:
                  return False

          before_block = len(offers)
          offers = [o for o in offers if not is_blocked(o["id"])]
          print(f"Dropped {before_block - len(offers)} offers under active reputation block, {len(offers)} remain")

          # Exclude offers already tried in this retry chain
          excluded_raw = "${{ github.event.inputs.excluded_offer_ids }}".strip()
          excluded_ids = set(int(x.strip()) for x in excluded_raw.split(",") if x.strip().isdigit())
          if excluded_ids:
              before_excl = len(offers)
              offers = [o for o in offers if o["id"] not in excluded_ids]
              print(f"Excluded {before_excl - len(offers)} previously tried offers, {len(offers)} remain")

          if not offers:
              print("ERROR: No matching offers found after filtering", file=sys.stderr)
              redispatch()
              sys.exit(1)

          # ── Rank: proven-good reputation first, then CPU tier, then price ──
          def cpu_tier(name):
              n = name or ""
              x3d = "X3D" in n
              if ("9950X" in n or "9900X" in n) and not x3d: return 0   # plain Zen5 — best measured (~2.1x)
              if "9950X" in n or "9900X" in n:                 return 1   # Zen5 X3D — lower clock (~1.4x)
              if "7950X" in n or "7900X" in n:                 return 2
              if "Core i9-14" in n or "Core i9-13" in n:       return 2
              if "Core i9-12" in n:                            return 3
              if "5900X" in n:                                 return 4
              return 5

          def proven_speed(oid):
              rec = reputation.get(str(oid))
              if rec and not is_blocked(oid):
                  s = rec.get("last_speed")
                  if isinstance(s, (int, float)) and s >= 1.6:
                      return s
              return None

          def rank_key(o):
              ps = proven_speed(o["id"])
              price = float(o.get("dph_total", 999))
              if ps is not None:
                  return (0, price)      # proven-good: cheapest first, escalate price only if cheap ones fail
              return (1, cpu_tier(o.get("cpu_name")), price)

          offers.sort(key=rank_key)
          candidates = offers[:5]
          print("Top candidates (proven-good → CPU tier → price):")
          for o in candidates:
              print(f"  offer {o['id']} — {o.get('cpu_name','?')} {o.get('cpu_cores','?')}c @ {o.get('cpu_ghz','?')}GHz — ${o.get('dph_total', 0):.4f}/hr")

          IMAGE_PAYLOAD = {
              "image":   "nvidia/cuda:12.4.1-runtime-ubuntu22.04",
              "disk":    150,
              "runtype": "ssh",
              "ssh_key": pub_key,
              "env":     {"NVIDIA_VISIBLE_DEVICES": "all", "NVIDIA_DRIVER_CAPABILITIES": "all"},
          }

          ip = port = instance_id = used_offer_id = None
          for offer in candidates:
              offer_id = offer["id"]
              gpu_name = offer.get("gpu_name", "unknown")
              price    = offer.get("dph_total", "?")
              location = offer.get("geolocation", "?")
              cpu_name = offer.get("cpu_name", "?")
              print(f"Trying offer {offer_id} — {gpu_name} / {cpu_name} @ ${price:.4f}/hr ({location})")

              try:
                  result = vast_put(f"/asks/{offer_id}/", IMAGE_PAYLOAD)
              except urllib.error.HTTPError as e:
                  body = e.read().decode()[:200]
                  print(f"  launch failed: HTTP {e.code} — {body} — trying next offer")
                  continue
              except Exception as e:
                  print(f"  launch failed: {e} — trying next offer")
                  continue

              this_instance = result.get("new_contract")
              if not this_instance:
                  print(f"  no instance ID returned: {result} — trying next offer")
                  continue
              print(f"  Instance ID: {this_instance}")

              this_ip = this_port = None
              for attempt in range(20):  # max 5 min boot wait
                  time.sleep(15)
                  try:
                      resp = vast_get("/instances/", base=BASE_V1)
                      inst = next((x for x in resp.get("instances", []) if x["id"] == this_instance), None)
                      if not inst:
                          print(f"    [{attempt+1}] instance not visible yet")
                          continue
                  except Exception as e:
                      print(f"    [{attempt+1}] poll error: {e}")
                      continue

                  status   = inst.get("actual_status", "")
                  ssh_host = inst.get("ssh_host") or inst.get("public_ipaddr")
                  ssh_port = inst.get("ssh_port", 22)
                  print(f"    [{attempt+1}] status={status} host={ssh_host} port={ssh_port}")

                  if status == "running" and ssh_host:
                      this_ip   = ssh_host
                      this_port = str(ssh_port)
                      break

              if this_ip:
                  ip, port, instance_id = this_ip, this_port, this_instance
                  used_offer_id = offer_id
                  break
              else:
                  print(f"  instance {this_instance} never reached running — terminating, trying next offer")
                  robust_terminate(this_instance)

          if not ip:
              print("ERROR: All candidate offers exhausted — redispatching", file=sys.stderr)
              redispatch()
              sys.exit(1)

          print(f"Ready: {ip}:{port}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"instance_id={instance_id}\n")
              f.write(f"ip={ip}\n")
              f.write(f"port={port}\n")
              f.write(f"used_offer_id={used_offer_id}\n")
          PY

      - name: Wait for SSH
        id: wait_ssh
        continue-on-error: true
        run: |
          IP="${{ steps.launch.outputs.ip }}"
          PORT="${{ steps.launch.outputs.port }}"
          echo "Waiting for SSH on ${IP}:${PORT}..."
          for i in $(seq 1 8); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=8 \
                   -i /tmp/vastai_key -p "${PORT}" "root@${IP}" \
                   "echo SSH_OK" 2>/dev/null | grep -q SSH_OK; then
              echo "SSH is up after ${i} attempts"
              exit 0
            fi
            echo "  [${i}/8] not ready — waiting 5s..."
            sleep 5
          done
          echo "ERROR: SSH never came up"
          exit 1

      - name: Re-dispatch on SSH failure
        if: steps.wait_ssh.outcome == 'failure'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          ATTEMPT_NUM="${{ github.event.inputs.attempt_num }}"
          ATTEMPT_NUM="${ATTEMPT_NUM:-1}"
          if [ "$ATTEMPT_NUM" -ge 3 ]; then
            echo "ERROR: SSH failure on attempt ${ATTEMPT_NUM}/3 — giving up to avoid burning credit. Manual retry required."
            exit 1
          fi
          NEXT_ATTEMPT=$((ATTEMPT_NUM + 1))
          echo "SSH never came up on this host — instance was a dud. Re-dispatching attempt ${NEXT_ATTEMPT}/3..."
          curl -s -X POST -H "Authorization: token ${GH_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/gopro360-chapter-upload.yml/dispatches" \
            -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"source_url\":\"${{ github.event.inputs.source_url }}\",\"media_id\":\"${{ github.event.inputs.media_id }}\",\"filename\":\"${{ github.event.inputs.filename }}\",\"captured_at\":\"${{ github.event.inputs.captured_at }}\",\"session_prefix\":\"${{ github.event.inputs.session_prefix }}\",\"chapter_num\":\"${{ github.event.inputs.chapter_num }}\",\"total_chapters\":\"${{ github.event.inputs.total_chapters }}\",\"attempt_num\":\"${NEXT_ATTEMPT}\",\"script_variant\":\"${{ github.event.inputs.script_variant }}\"}}"
          echo "Fresh run dispatched. Failing this run (dud host already terminated below)."
          exit 1

      - name: Copy stitch script to instance
        if: steps.wait_ssh.outcome == 'success'
        env:
          SCRIPT_VARIANT: ${{ github.event.inputs.script_variant }}
        run: |
          python3 - <<'PY'
          import urllib.request, json, base64, os
          from pathlib import Path

          PAT  = "${{ secrets.GH_PAT }}"
          REPO = "${{ github.repository }}"
          SCRIPT = os.environ.get("SCRIPT_VARIANT", "").strip() or "vastai_stitch.sh"

          req = urllib.request.Request(
              f"https://api.github.com/repos/{REPO}/contents/gopro360/{SCRIPT}?ref=main",
              headers={"Authorization": f"token {PAT}", "Accept": "application/vnd.github.v3+json"}
          )
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())
          Path("/tmp/vastai_stitch.sh").write_bytes(base64.b64decode(data["content"]))
          print(f"Script fetched OK: {SCRIPT}")
          PY

          scp -o StrictHostKeyChecking=no \
              -i /tmp/vastai_key \
              -P "${{ steps.launch.outputs.port }}" \
              /tmp/vastai_stitch.sh \
              "root@${{ steps.launch.outputs.ip }}:/tmp/vastai_stitch.sh"
          echo "Script transferred"

      - name: Launch stitch + upload (detached)
        if: steps.wait_ssh.outcome == 'success'
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 \
              -i /tmp/vastai_key \
              -p "${{ steps.launch.outputs.port }}" \
              "root@${{ steps.launch.outputs.ip }}" \
              "cat > /tmp/run_stitch.sh << 'WRAPEOF'
          #!/usr/bin/env bash
          export SOURCE_URL='${{ steps.get_url.outputs.cdn_url }}'
          export MEDIA_ID='${{ github.event.inputs.media_id }}'
          export FILENAME='${{ github.event.inputs.filename }}'
          export CAPTURED_AT='${{ steps.get_url.outputs.captured_at }}'
          export SESSION_PREFIX='${{ github.event.inputs.session_prefix }}'
          export CHAPTER_NUM='${{ github.event.inputs.chapter_num }}'
          export TOTAL_CHAPTERS='${{ github.event.inputs.total_chapters }}'
          export YOUTUBE_CREDS='${YOUTUBE_CREDENTIALS}'
          export YOUTUBE_TOKEN='${YOUTUBE_TOKEN}'
          export GH_PAT='${GH_PAT}'
          export REPO='${{ github.repository }}'
          export TRANSCODE_BITRATE='auto'
          export TEST_DURATION_SEC='${{ github.event.inputs.test_duration_sec }}'
          export DRY_RUN='${{ github.event.inputs.dry_run }}'
          exec bash /tmp/vastai_stitch.sh
          WRAPEOF
          chmod +x /tmp/run_stitch.sh
          rm -f /tmp/ffa360_run.log
          mkdir -p /tmp/ffa360
          rm -f /tmp/ffa360/DONE /tmp/ffa360/FAILED
          setsid nohup /tmp/run_stitch.sh < /dev/null > /tmp/ffa360_run.log 2>&1 &
          disown
          sleep 2
          echo LAUNCHED pid=\$!"

      - name: Poll for completion
        if: steps.wait_ssh.outcome == 'success'
        id: poll
        run: |
          MAX_TICKS=700
          CONSEC_FAIL=0
          MAX_CONSEC_FAIL=20
          LAST_LINE_COUNT=0

          for ((i=1; i<=MAX_TICKS; i++)); do
            sleep 15
            OUT=$(ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o BatchMode=yes \
                      -i /tmp/vastai_key \
                      -p "${{ steps.launch.outputs.port }}" \
                      "root@${{ steps.launch.outputs.ip }}" \
                      "tail -n +$(( $LAST_LINE_COUNT + 1 )) /tmp/ffa360_run.log 2>/dev/null; \
                       echo '__FFA_STATUS_BEGIN__'; \
                       if [ -f /tmp/ffa360/DONE ] || [ -f /tmp/ffa360_DONE ]; then echo DONE; \
                       elif [ -f /tmp/ffa360/FAILED ]; then cat /tmp/ffa360/FAILED; \
                       else echo RUNNING; fi; \
                       echo '__FFA_LINE_COUNT__'; \
                       wc -l < /tmp/ffa360_run.log" 2>/dev/null) || {
              CONSEC_FAIL=$((CONSEC_FAIL+1))
              echo "[poll $i] SSH unreachable (${CONSEC_FAIL}/${MAX_CONSEC_FAIL})"
              if [ "$CONSEC_FAIL" -ge "$MAX_CONSEC_FAIL" ]; then
                echo "ERROR: instance unreachable for too long"
                exit 1
              fi
              continue
            }
            CONSEC_FAIL=0

            NEW_LOG=$(echo "$OUT" | sed -n '1,/^__FFA_STATUS_BEGIN__$/{/^__FFA_STATUS_BEGIN__$/!p}')
            STATUS_LINE=$(echo "$OUT" | sed -n '/^__FFA_STATUS_BEGIN__$/{n;p}')
            NEW_TOTAL=$(echo "$OUT" | sed -n '/^__FFA_LINE_COUNT__$/{n;p}')

            CLEAN_LOG=$(echo "$NEW_LOG" | grep -v '^__FFA_LINE_COUNT__$' | grep -v '^__FFA_STATUS_BEGIN__$' | grep -v '^RUNNING$' | grep -v '^DONE$' || true)
            [ -n "$CLEAN_LOG" ] && echo "$CLEAN_LOG"
            LAST_LINE_COUNT="$NEW_TOTAL"

            case "$STATUS_LINE" in
              DONE)
                echo "[poll $i] DONE"
                RESULT_URL=$(ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o BatchMode=yes \
                      -i /tmp/vastai_key -p "${{ steps.launch.outputs.port }}" \
                      "root@${{ steps.launch.outputs.ip }}" \
                      "cat /tmp/ffa360/RESULT_URL /tmp/ffa360_RESULT_URL 2>/dev/null | head -1 || true" 2>/dev/null)
                echo "result_url=${RESULT_URL}" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              BENCHMARK_FAILED)
                ATTEMPT_NUM="${{ github.event.inputs.attempt_num }}"
                ATTEMPT_NUM="${ATTEMPT_NUM:-1}"
                if [ "$ATTEMPT_NUM" -ge 8 ]; then
                  echo "ERROR: Benchmark failed on attempt ${ATTEMPT_NUM}/8 — giving up to avoid burning credit. Manual retry required."
                  exit 1
                fi
                NEXT_ATTEMPT=$((ATTEMPT_NUM + 1))
                echo "[poll $i] Benchmark failed — redispatching attempt ${NEXT_ATTEMPT}/8 on a fresh offer..."
                PREV_EXCLUDED="${{ github.event.inputs.excluded_offer_ids }}"
                THIS_OFFER="${{ steps.launch.outputs.used_offer_id }}"
                NEW_EXCLUDED="${PREV_EXCLUDED:+${PREV_EXCLUDED},}${THIS_OFFER}"
                curl -s -X POST -H "Authorization: token ${{ secrets.GH_PAT }}" \
                  -H "Accept: application/vnd.github.v3+json" \
                  "https://api.github.com/repos/${{ github.repository }}/actions/workflows/gopro360-chapter-upload.yml/dispatches" \
                  -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"source_url\":\"${{ github.event.inputs.source_url }}\",\"media_id\":\"${{ github.event.inputs.media_id }}\",\"filename\":\"${{ github.event.inputs.filename }}\",\"captured_at\":\"${{ github.event.inputs.captured_at }}\",\"session_prefix\":\"${{ github.event.inputs.session_prefix }}\",\"chapter_num\":\"${{ github.event.inputs.chapter_num }}\",\"total_chapters\":\"${{ github.event.inputs.total_chapters }}\",\"test_duration_sec\":\"${{ github.event.inputs.test_duration_sec }}\",\"dry_run\":\"${{ github.event.inputs.dry_run }}\",\"excluded_offer_ids\":\"${NEW_EXCLUDED}\",\"attempt_num\":\"${NEXT_ATTEMPT}\",\"script_variant\":\"${{ github.event.inputs.script_variant }}\"}}"
                echo "Fresh run dispatched excluding offers: ${NEW_EXCLUDED}"
                exit 1
                ;;
              FAILED*)
                echo "[poll $i] FAILED: $STATUS_LINE"
                exit 1
                ;;
            esac
          done
          echo "ERROR: timed out waiting for completion"
          exit 1

      - name: Record offer reputation
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          OFFER_ID: ${{ steps.launch.outputs.used_offer_id }}
          IP: ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          if [ -z "${OFFER_ID}" ] || [ -z "${IP}" ]; then
            echo "No offer/instance to record — skipping reputation update"
            exit 0
          fi
          SPEED=$(ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o BatchMode=yes \
                    -i /tmp/vastai_key -p "${PORT}" "root@${IP}" \
                    "cat /tmp/ffa360/SPEED 2>/dev/null | head -1 || true" 2>/dev/null || true)
          SPEED=$(echo "${SPEED}" | tr -d 'x \r\n')
          if [ -z "${SPEED}" ]; then
            echo "No SPEED marker on host — skipping reputation update"
            exit 0
          fi
          echo "Recording offer ${OFFER_ID} measured speed ${SPEED}x"
          REPO="${{ github.repository }}" OFFER_ID="${OFFER_ID}" SPEED="${SPEED}" GH_PAT="${GH_PAT}" python3 - <<'PY'
          import os, json, base64, urllib.request, urllib.error, datetime
          REPO=os.environ["REPO"]; OFFER_ID=os.environ["OFFER_ID"]; GH_PAT=os.environ["GH_PAT"]
          try:
              speed=float(os.environ["SPEED"])
          except Exception:
              print("speed unparseable — skip"); raise SystemExit(0)
          now=datetime.datetime.now(datetime.timezone.utc)
          path="gopro360/offer_reputation.json"
          url=f"https://api.github.com/repos/{REPO}/contents/{path}"
          def hdr(): return {"Authorization":f"token {GH_PAT}","Accept":"application/vnd.github.v3+json"}
          for attempt in range(2):
              sha=None; rep={}
              try:
                  with urllib.request.urlopen(urllib.request.Request(url, headers=hdr()), timeout=15) as r:
                      d=json.loads(r.read()); sha=d["sha"]
                      rep=json.loads(base64.b64decode(d["content"]).decode() or "{}")
              except urllib.error.HTTPError as e:
                  if e.code!=404: raise
              rec=rep.get(OFFER_ID, {})
              samples=(rec.get("samples") or [])[-4:]+[speed]
              # Expiring block by measured speed: <1.0x → 7d, 1.0–1.5x → 24h, ≥1.5x → eligible (≥1.6x preferred by ranker)
              if speed<1.0:   block=(now+datetime.timedelta(days=7)).isoformat()
              elif speed<1.5: block=(now+datetime.timedelta(hours=24)).isoformat()
              else:           block=None
              rep[OFFER_ID]={"last_speed":speed,"last_seen":now.isoformat(),"block_until":block,"samples":samples}
              body={"message":f"reputation: offer {OFFER_ID} = {speed}x","content":base64.b64encode(json.dumps(rep,indent=2,sort_keys=True).encode()).decode()}
              if sha: body["sha"]=sha
              try:
                  with urllib.request.urlopen(urllib.request.Request(url, data=json.dumps(body).encode(), method="PUT", headers={**hdr(),"Content-Type":"application/json"}), timeout=15) as r:
                      print(f"reputation updated: offer {OFFER_ID} = {speed}x, block_until={block}")
                  break
              except urllib.error.HTTPError as e:
                  if e.code in (409,422) and attempt==0:
                      print("write conflict — retrying once"); continue
                  print(f"reputation write failed HTTP {e.code}: {e.read().decode()[:200]}"); break
          PY

      - name: Terminate Vast.ai instance
        if: always()
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
          INSTANCE_ID: ${{ steps.launch.outputs.instance_id }}
        run: |
          if [ -z "${INSTANCE_ID}" ]; then
            echo "No instance ID — nothing to terminate"
            exit 0
          fi
          python3 - <<'PY'
          import os, json, urllib.request, urllib.error

          API_KEY     = os.environ["VAST_API_KEY"]
          INSTANCE_ID = os.environ["INSTANCE_ID"]
          headers     = {"Authorization": f"Bearer {API_KEY}", "Accept": "application/json"}

          endpoints = [
              f"https://console.vast.ai/api/v0/instances/{INSTANCE_ID}/",
              f"https://cloud.vast.ai/api/v0/instances/{INSTANCE_ID}/",
              f"https://cloud.vast.ai/api/v1/instances/{INSTANCE_ID}/",
          ]

          for url in endpoints:
              req = urllib.request.Request(url, method="DELETE", headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=20) as r:
                      print(f"Terminated {INSTANCE_ID} via {url}: {json.loads(r.read())}")
                  break
              except urllib.error.HTTPError as e:
                  body = e.read().decode()[:300]
                  print(f"  {url} -> HTTP {e.code}: {body}")
                  if e.code == 404:
                      continue
                  break
              except Exception as e:
                  print(f"  {url} -> error: {e}")
                  continue
          else:
              print(f"WARNING: could not terminate {INSTANCE_ID} via any endpoint — terminate manually")
          PY



