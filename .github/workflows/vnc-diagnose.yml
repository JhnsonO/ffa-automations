name: VNC Diagnose (temporary)

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Start x11vnc against existing display :99 + install watchdog
        run: |
          echo "=== checking for existing vnc password file ==="
          PASSWD=""
          for f in "$HOME/.vnc/passwd" "/root/.vnc/passwd"; do
            if sudo test -r "$f"; then
              echo "found existing passwd file: $f"
              PASSWD="$f"
              break
            fi
          done

          mkdir -p "$HOME/.vnc"
          if [ -z "$PASSWD" ]; then
            NEWPASS="ffa$(date +%s | tail -c 6)"
            x11vnc -storepasswd "$NEWPASS" "$HOME/.vnc/passwd"
            PASSWD="$HOME/.vnc/passwd"
            echo "NEW_VNC_PASSWORD=$NEWPASS"
          else
            # copy root-owned passwd file to a runner-readable path if needed
            if [ "$PASSWD" != "$HOME/.vnc/passwd" ]; then
              sudo cp "$PASSWD" "$HOME/.vnc/passwd"
              sudo chown "$(id -u):$(id -g)" "$HOME/.vnc/passwd"
              PASSWD="$HOME/.vnc/passwd"
            fi
            echo "reusing existing password file"
          fi

          cat > "$HOME/x11vnc_watchdog.sh" <<'SCRIPT'
          if ! pgrep -f "x11vnc.*-display :99" > /dev/null; then
            /usr/bin/x11vnc -display :99 -forever -shared -rfbport 5900 \
              -rfbauth "$HOME/.vnc/passwd" -bg -o "$HOME/.x11vnc.log" -noxdamage
          fi
          SCRIPT
          chmod +x "$HOME/x11vnc_watchdog.sh"
          echo "--- watchdog script content ---"
          cat "$HOME/x11vnc_watchdog.sh"

          ( crontab -l 2>/dev/null | grep -v x11vnc_watchdog.sh ; \
            echo "* * * * * bash $HOME/x11vnc_watchdog.sh" ; \
            echo "@reboot bash $HOME/x11vnc_watchdog.sh" ) | crontab -

          echo "=== starting now ==="
          bash "$HOME/x11vnc_watchdog.sh"
          sleep 2
          ss -tlnp 2>/dev/null | grep 5900 || sudo ss -tlnp | grep 5900
          echo "=== watchdog installed, crontab: ==="
          crontab -l

      - name: Verify listening + firewall state
        run: |
          echo "=== what's listening on 5900 now ==="
          sudo ss -tlnp | grep 5900 || echo "still nothing listening on 5900"
          echo ""
          echo "=== ufw status (should already allow 5900/tcp) ==="
          sudo ufw status | grep 5900
