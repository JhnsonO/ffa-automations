name: VNC Diagnose (temporary)

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Check VNC process and listening ports
        run: |
          echo "=== VNC-related processes ==="
          ps aux | grep -i vnc | grep -v grep || echo "no vnc process found"
          echo ""
          echo "=== what's listening on 5900 ==="
          sudo ss -tlnp | grep 5900 || echo "nothing listening on 5900"
          echo ""
          echo "=== all listening TCP ports (context) ==="
          sudo ss -tlnp
          echo ""
          echo "=== ufw status ==="
          sudo ufw status verbose 2>&1 || echo "ufw not available/active"
          echo ""
          echo "=== recent ufw log hits on 5900 (if logging enabled) ==="
          sudo grep -h "DPT=5900" /var/log/ufw.log 2>/dev/null | tail -20 || echo "no ufw log or no 5900 entries"
          echo ""
          echo "=== systemd vnc-related services ==="
          systemctl list-units --type=service --all 2>/dev/null | grep -i vnc || echo "no systemd vnc service found"
          echo ""
          echo "=== X server processes ==="
          ps aux | grep -iE "Xorg|Xvfb|Xtightvnc|Xvnc" | grep -v grep || echo "no X server process found"
          echo ""
          echo "=== is x11vnc installed? ==="
          which x11vnc 2>&1 || echo "x11vnc not on PATH"
          echo ""
          echo "=== is tigervnc/vncserver installed? ==="
          which vncserver tigervncserver 2>&1 || echo "no vncserver binary found"
          echo ""
          echo "=== DISPLAY sockets in /tmp/.X11-unix ==="
          ls -la /tmp/.X11-unix/ 2>&1 || echo "no X11 unix sockets found"
          echo ""
          echo "=== chrome process DISPLAY env ==="
          for p in $(pgrep -f "user-data-dir=/root/.config/chrome-ffa" | head -3); do
            sudo tr '\0' '\n' < /proc/$p/environ 2>/dev/null | grep "^DISPLAY="
          done | sort -u
