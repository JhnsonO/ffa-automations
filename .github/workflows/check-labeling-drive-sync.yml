name: Check Labeling Tool Drive Sync

on:
  workflow_dispatch:

jobs:
  check:
    name: Curl the running labeling tool's clip list (read-only, no restart)
    runs-on: self-hosted
    timeout-minutes: 2

    steps:
      - name: GET /api/clips
        run: |
          PORT="${LABELING_TOOL_PORT:-8090}"
          CODE=$(curl -s -o /tmp/clips.json -w "%{http_code}" "http://127.0.0.1:$PORT/api/clips" || true)
          echo "HTTP check: $CODE"
          if [ "$CODE" != "200" ]; then
            echo "::error::labeling tool did not respond 200 on /api/clips (got $CODE) -- is ffa-labeling-tool.service up?"
            exit 1
          fi
          echo "--- clip list (local + drive_cache) ---"
          cat /tmp/clips.json

      - name: Identify service account (client_email only -- never the private key) and recent Drive log lines
        run: |
          ENV_FILE="$HOME/ffa-labeling-tool/.env"
          if [ -f "$ENV_FILE" ]; then
            EMAIL=$(grep '^GOOGLE_SERVICE_ACCOUNT_JSON=' "$ENV_FILE" | python3 -c "import sys, json; raw = sys.stdin.readline().split('=', 1)[1].strip(); print(json.loads(raw).get('client_email', '?'))")
            echo "Service account (share the Drive folder with this address if not already): $EMAIL"
          else
            echo ".env not found at $ENV_FILE"
          fi

          echo "--- last Drive-related journal lines (app-level sync attempts) ---"
          SERVICE="ffa-labeling-tool"
          if [ "${USE_SYSTEM:-0}" = "1" ] || sudo systemctl status "${SERVICE}.service" >/dev/null 2>&1; then
            sudo journalctl -u "${SERVICE}.service" --no-pager | grep -i "drive" | tail -15 || echo "(no Drive-related lines found in system journal)"
          else
            export XDG_RUNTIME_DIR="/run/user/$(id -u)"
            journalctl --user -u "${SERVICE}.service" --no-pager | grep -i "drive" | tail -15 || echo "(no Drive-related lines found in user journal)"
          fi
