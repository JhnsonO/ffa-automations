name: Upload GoPro Session to YouTube

on:
  workflow_dispatch:
    inputs:
      media_id:
        description: 'GoPro media ID to upload (from queue)'
        required: false
        default: ''
        type: string
      gopro_filename:
        description: 'Optional: exact GoPro filename to upload manually, e.g. GX010130.MP4'
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: gopro-upload-${{ github.event.inputs.media_id || 'manual' }}
  cancel-in-progress: false

jobs:

  # ─────────────────────────────────────────────────────────────
  # Upload — runs on GitHub-hosted ubuntu-latest runner.
  # Triggered by the scanner (one run per video) or manually.
  # ─────────────────────────────────────────────────────────────
  upload:
    name: Upload GoPro Session (GitHub Runner)
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Load latest DB and queue from main
        run: |
          git fetch origin main
          git checkout origin/main -- uploaded.db upload_queue.json || true
          [ -f uploaded.db ] || touch uploaded.db
          [ -f upload_queue.json ] || echo '[]' > upload_queue.json
          ls -lah uploaded.db
          echo "Queue:"
          cat upload_queue.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-auth google-auth-oauthlib google-api-python-client

      - name: Write YouTube credentials
        run: echo '${{ secrets.YOUTUBE_CREDENTIALS }}' > youtube_credentials.json

      - name: Write YouTube token
        run: echo '${{ secrets.YOUTUBE_TOKEN }}' > youtube_token.json

      - name: Validate YouTube auth
        run: |
          python3 - <<'PY'
          import gopro_uploader as u
          try:
              u.get_youtube_service()
              print("YouTube auth is valid")
          except Exception as e:
              print(f"ERROR: YouTube auth failed: {type(e).__name__}: {e}")
              raise
          PY

      - name: Write GoPro cookies from secret
        env:
          GOPRO_COOKIES: ${{ secrets.GOPRO_COOKIES }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          cookies = os.environ.get("GOPRO_COOKIES", "{}").strip() or "{}"
          Path("gopro_cookies.json").write_text(cookies)
          print("GoPro cookies written from secret")
          PY

      - name: Validate GoPro cookies
        id: validate_cookies
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import sys, os, json, urllib.request
          import gopro_uploader as u

          try:
              session = u.make_session(u.load_cookies_from_file())
              u.gopro_get(session, "/media/search", params={"fields": "id", "per_page": 1, "page": 1, "type": "Video"})
              print("GoPro cookies are valid")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("cookies_valid=true\n")
          except Exception as e:
              print(f"GoPro cookies invalid: {e}")
              print("Dispatching cookie refresh — this upload will be re-queued after refresh")
              token = os.environ["GH_PAT"]
              repo = os.environ["REPO"]
              payload = json.dumps({
                  "ref": "main",
                  "inputs": {"run_cookie_refresh": "true"}
              }).encode()
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/actions/workflows/cookie-refresh.yml/dispatches",
                  data=payload, method="POST",
                  headers={"Authorization": f"token {token}", "Content-Type": "application/json"}
              )
              urllib.request.urlopen(req)
              print("Cookie refresh dispatched — exiting cleanly")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("cookies_valid=false\n")
          PY

      - name: Run uploader
        if: steps.validate_cookies.outputs.cookies_valid == 'true'
        id: run_upload
        env:
          MEDIA_ID_OVERRIDE: ${{ github.event.inputs.media_id || '' }}
          MANUAL_GOPRO_FILENAME: ${{ github.event.inputs.gopro_filename || '' }}
          GOPRO_EMAIL: ${{ secrets.GOPRO_EMAIL }}
          GOPRO_PASSWORD: ${{ secrets.GOPRO_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python3 gopro_uploader.py

      - name: Remove uploaded item from queue
        if: steps.validate_cookies.outputs.cookies_valid == 'true' && steps.run_upload.outcome == 'success'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          MEDIA_ID: ${{ github.event.inputs.media_id || '' }}
        run: |
          python3 - <<'PY'
          import os, json, base64, urllib.request
          from pathlib import Path

          media_id = os.environ.get("MEDIA_ID", "").strip()
          if not media_id:
              print("No media_id — skipping queue cleanup")
              exit(0)

          token = os.environ["GH_PAT"]
          repo = os.environ["REPO"]

          queue_path = Path("upload_queue.json")
          queue = json.loads(queue_path.read_text()) if queue_path.exists() else []
          before = len(queue)
          queue = [item for item in queue if item["media_id"] != media_id]
          print(f"Queue: {before} → {len(queue)} items (removed {media_id})")
          queue_path.write_text(json.dumps(queue, indent=2))

          encoded = base64.b64encode(queue_path.read_bytes()).decode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/contents/upload_queue.json?ref=main",
              headers={"Authorization": f"token {token}"}
          )
          with urllib.request.urlopen(req) as r:
              current_sha = json.load(r)["sha"]

          payload = json.dumps({
              "message": f"chore: remove {media_id} from upload queue [skip ci]",
              "content": encoded,
              "sha": current_sha,
              "branch": "main"
          }).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/contents/upload_queue.json",
              data=payload, method="PUT",
              headers={"Authorization": f"token {token}", "Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req) as r:
              result = json.load(r)
          print(f"Queue committed: {result['commit']['sha']}")
          PY

      - name: Handle upload failure — update fail count or alert
        if: steps.validate_cookies.outputs.cookies_valid == 'true' && steps.run_upload.outcome == 'failure'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          MEDIA_ID: ${{ github.event.inputs.media_id || '' }}
        run: |
          python3 - <<'PY'
          import os, json, base64, urllib.request
          from pathlib import Path

          media_id = os.environ.get("MEDIA_ID", "").strip()
          if not media_id:
              print("No media_id — skipping failure handling")
              exit(0)

          token = os.environ["GH_PAT"]
          repo = os.environ["REPO"]

          queue_path = Path("upload_queue.json")
          queue = json.loads(queue_path.read_text()) if queue_path.exists() else []

          alert_needed = False
          for item in queue:
              if item["media_id"] == media_id:
                  item["fail_count"] = item.get("fail_count", 0) + 1
                  print(f"Fail count for {item['filename']}: {item['fail_count']}")
                  if item["fail_count"] >= 3:
                      alert_needed = True
                      print(f"ALERT: {item['filename']} has failed {item['fail_count']} times")
                  break

          queue_path.write_text(json.dumps(queue, indent=2))
          encoded = base64.b64encode(queue_path.read_bytes()).decode()

          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/contents/upload_queue.json?ref=main",
              headers={"Authorization": f"token {token}"}
          )
          with urllib.request.urlopen(req) as r:
              current_sha = json.load(r)["sha"]

          payload = json.dumps({
              "message": f"chore: update fail count for {media_id} [skip ci]",
              "content": encoded,
              "sha": current_sha,
              "branch": "main"
          }).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/contents/upload_queue.json",
              data=payload, method="PUT",
              headers={"Authorization": f"token {token}", "Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req) as r:
              print(f"Queue updated: {json.load(r)['commit']['sha']}")

          if alert_needed:
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("send_alert=true\n")
          PY

      - name: Send failure alert email
        if: steps.validate_cookies.outputs.cookies_valid == 'true' && steps.run_upload.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.ALERT_EMAIL_FROM }}
          password: ${{ secrets.ALERT_EMAIL_PASSWORD }}
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: FFA Automations
          subject: "⚠️ FFA Upload Failed 3 Times — ${{ github.event.inputs.media_id }}"
          body: |
            The video with media ID ${{ github.event.inputs.media_id }} has failed to upload 3 times.

            Check the Actions log for details:
            https://github.com/${{ github.repository }}/actions

            The video remains in the upload queue. You may need to manually investigate or remove it.

      - name: Commit updated DB to main
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import os, json, base64, urllib.request
          from pathlib import Path

          db_path = Path("uploaded.db")
          if not db_path.exists():
              print("No uploaded.db — skipping")
              exit(0)

          token = os.environ["GH_PAT"]
          repo = os.environ["REPO"]
          encoded = base64.b64encode(db_path.read_bytes()).decode()

          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/contents/uploaded.db?ref=main",
              headers={"Authorization": f"token {token}"}
          )
          with urllib.request.urlopen(req) as r:
              current_sha = json.load(r)["sha"]

          payload = json.dumps({
              "message": "chore: update uploaded.db [skip ci]",
              "content": encoded,
              "sha": current_sha,
              "branch": "main"
          }).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/contents/uploaded.db",
              data=payload, method="PUT",
              headers={"Authorization": f"token {token}", "Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req) as r:
              result = json.load(r)
          print(f"uploaded.db committed: {result['commit']['sha']}")
          PY
