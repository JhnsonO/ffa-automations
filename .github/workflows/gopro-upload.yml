name: Upload GoPro Sessions to YouTube

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'How many days back to check for new videos'
        required: false
        default: '2'
        type: string
      gopro_filename:
        description: 'Optional: exact GoPro filename to upload manually, e.g. GX010130.MP4'
        required: false
        default: ''
        type: string
      direct_video_url:
        description: 'Optional: direct downloadable MP4/video URL to upload manually if GoPro scan misses one'
        required: false
        default: ''
        type: string
      direct_filename:
        description: 'Optional: filename to use for the direct URL upload, e.g. GX010130.MP4'
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: gopro-upload
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Checkout selected workflow ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Show checked out ref
        run: |
          git branch --show-current
          git log -1 --oneline

      - name: Ensure DB exists
        run: |
          touch uploaded.db
          ls -lah uploaded.db

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests google-auth google-auth-oauthlib google-api-python-client playwright
          playwright install chromium --with-deps

      - name: Write YouTube credentials
        run: echo '${{ secrets.YOUTUBE_CREDENTIALS }}' > youtube_credentials.json

      - name: Write YouTube token
        run: echo '${{ secrets.YOUTUBE_TOKEN }}' > youtube_token.json

      - name: Run uploader
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.days || '2' }}
          MANUAL_GOPRO_FILENAME: ${{ github.event.inputs.gopro_filename || '' }}
          DIRECT_UPLOAD_URL: ${{ github.event.inputs.direct_video_url || '' }}
          DIRECT_UPLOAD_FILENAME: ${{ github.event.inputs.direct_filename || '' }}
          GOPRO_EMAIL: ${{ secrets.GOPRO_EMAIL }}
          GOPRO_PASSWORD: ${{ secrets.GOPRO_PASSWORD }}
        run: python3 gopro_uploader.py

      - name: Show DB status
        if: always()
        run: |
          ls -lah uploaded.db || true
          git status --short

      - name: Commit updated database back to main
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stash DB changes made by the uploader, switch to main, then apply the DB only.
          git stash --include-untracked || true
          git fetch origin main
          git checkout main
          git pull --rebase origin main
          git stash pop || true

          touch uploaded.db
          git add uploaded.db

          if git diff --staged --quiet; then
            echo "No uploaded.db changes to commit"
            exit 0
          fi

          git commit -m "chore: update uploaded.db [skip ci]"
          git push origin HEAD:main

      - name: Save updated YouTube token
        if: always()
        run: |
          if [ -f youtube_token.json ]; then
            echo "YOUTUBE_TOKEN_UPDATED=$(cat youtube_token.json | base64 -w 0)" >> $GITHUB_ENV
          fi
