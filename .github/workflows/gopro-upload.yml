name: Upload GoPro Sessions to YouTube

on:
  schedule:
    - cron: '0 */4 * * *'       # upload runs every 4 hours
    - cron: '0 3 * * *'         # cookie refresh runs once daily at 03:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: 'How many days back to check for new videos'
        required: false
        default: '2'
        type: string
      gopro_filename:
        description: 'Optional: exact GoPro filename to upload manually, e.g. GS010404.360 or GX010130.MP4'
        required: false
        default: ''
        type: string
      run_cookie_refresh:
        description: 'Force a cookie refresh run (VM job)'
        required: false
        default: 'false'
        type: string

permissions:
  contents: write

concurrency:
  group: gopro-upload
  cancel-in-progress: false

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1: Cookie refresh — runs on Vultr VM, once daily at 03:00
  # or when forced via workflow_dispatch. Lightweight — just
  # Playwright login + secret sync. If it fails, it retries once.
  # ─────────────────────────────────────────────────────────────
  cookie-refresh:
    name: Refresh GoPro Cookies (VM)
    runs-on: self-hosted
    timeout-minutes: 30
    if: >-
      github.event.schedule == '0 3 * * *' ||
      github.event.inputs.run_cookie_refresh == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feature/360-camera-v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests playwright pynacl
          playwright install chromium --with-deps

      - name: Write existing cookies from secret (fallback baseline)
        env:
          GOPRO_COOKIES: ${{ secrets.GOPRO_COOKIES }}
        run: |
          python3 - <<'PY'
          import os, json
          from pathlib import Path
          cookie_path = Path("gopro_cookies.json")
          if cookie_path.exists():
              try:
                  existing = json.loads(cookie_path.read_text())
                  if existing:
                      print("On-disk cookies already present — keeping them")
                      exit(0)
              except Exception:
                  pass
          cookies = os.environ.get("GOPRO_COOKIES", "{}").strip() or "{}"
          cookie_path.write_text(cookies)
          print("Wrote cookies from secret")
          PY

      - name: Validate cookies — refresh via Playwright if expired
        env:
          GOPRO_EMAIL: ${{ secrets.GOPRO_EMAIL }}
          GOPRO_PASSWORD: ${{ secrets.GOPRO_PASSWORD }}
        run: |
          python3 - <<'PY'
          import sys
          import gopro_uploader as u

          try:
              session = u.make_session(u.load_cookies_from_file())
              u.gopro_get(session, "/media/search", params={"fields": "id", "per_page": 1, "page": 1, "type": "Video"})
              print("Cookies valid — no refresh needed")
          except Exception as e:
              print(f"Cookies invalid ({e}) — refreshing via Playwright")
              if not u.refresh_cookies_via_playwright():
                  raise SystemExit("GoPro cookie refresh failed")
              session = u.make_session(u.load_cookies_from_file())
              u.gopro_get(session, "/media/search", params={"fields": "id", "per_page": 1, "page": 1, "type": "Video"})
              print("Refreshed cookies are valid")
          PY

      - name: Sync refreshed cookies back to GOPRO_COOKIES secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          from pathlib import Path
          from base64 import b64encode
          from nacl import encoding, public as nacl_public

          cookie_path = Path("gopro_cookies.json")
          if not cookie_path.exists():
              print("No cookie file — skipping")
              exit(0)

          cookies = cookie_path.read_text().strip()
          if not cookies or cookies == "{}":
              print("Empty cookies — skipping secret update")
              exit(0)

          token = os.environ.get("GH_TOKEN", "")
          repo = os.environ.get("REPO", "")

          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/actions/secrets/public-key",
              headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github.v3+json"}
          )
          with urllib.request.urlopen(req) as r:
              key_data = json.load(r)

          pub_key = nacl_public.PublicKey(key_data["key"].encode(), encoding.Base64Encoder())
          sealed = nacl_public.SealedBox(pub_key).encrypt(cookies.encode())
          encrypted = b64encode(sealed).decode()

          payload = json.dumps({"encrypted_value": encrypted, "key_id": key_data["key_id"]}).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/actions/secrets/GOPRO_COOKIES",
              data=payload, method="PUT",
              headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github.v3+json", "Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req) as r:
              print(f"GOPRO_COOKIES secret synced (HTTP {r.status})")
          PY

      - name: Upload login failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gopro-login-screenshots
          path: /tmp/gopro_login_*.png
          if-no-files-found: ignore
          retention-days: 3

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Upload — runs on GitHub-hosted ubuntu-latest runner.
  # No VM involved. Reads cookies from GOPRO_COOKIES secret.
  # Installs ffmpeg + exiftool for .360 stitching.
  # Runs every 4 hours on schedule, or on manual dispatch.
  # ─────────────────────────────────────────────────────────────
  upload:
    name: Upload GoPro Sessions (GitHub Runner)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: >-
      github.event.schedule == '0 */4 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_cookie_refresh != 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feature/360-camera-v2
          fetch-depth: 0
          persist-credentials: true

      - name: Load latest uploaded DB from main
        run: |
          git fetch origin main
          git checkout origin/main -- uploaded.db || touch uploaded.db
          ls -lah uploaded.db

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install requests google-auth google-auth-oauthlib google-api-python-client

      - name: Install ffmpeg and exiftool
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libimage-exiftool-perl
          ffmpeg -version | head -1
          exiftool -ver

      - name: Write YouTube credentials
        run: echo '${{ secrets.YOUTUBE_CREDENTIALS }}' > youtube_credentials.json

      - name: Write YouTube token
        run: echo '${{ secrets.YOUTUBE_TOKEN }}' > youtube_token.json

      - name: Diagnose YouTube token safely
        run: |
          python3 - <<'PY'
          import hashlib, json
          from pathlib import Path

          def short_hash(value):
              if not value:
                  return "missing"
              return hashlib.sha256(value.encode()).hexdigest()[:12]

          token = json.loads(Path("youtube_token.json").read_text())
          creds = json.loads(Path("youtube_credentials.json").read_text())
          installed = creds.get("installed") or creds.get("web") or {}

          print("YouTube token diagnostics (secret-safe):")
          print(f"  token_keys: {sorted(token.keys())}")
          print(f"  has_refresh_token: {bool(token.get('refresh_token'))}")
          print(f"  expiry: {token.get('expiry', 'missing')}")
          print(f"  client_ids_match: {bool(token.get('client_id') and installed.get('client_id') and token.get('client_id') == installed.get('client_id'))}")
          PY

      - name: Validate YouTube auth
        run: |
          python3 - <<'PY'
          import gopro_uploader as u
          try:
              u.get_youtube_service()
              print("YouTube auth is valid")
          except Exception as e:
              print(f"ERROR: YouTube auth failed: {type(e).__name__}: {e}")
              raise
          PY

      - name: Write GoPro cookies from secret
        env:
          GOPRO_COOKIES: ${{ secrets.GOPRO_COOKIES }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          cookies = os.environ.get("GOPRO_COOKIES", "{}").strip() or "{}"
          Path("gopro_cookies.json").write_text(cookies)
          print("GoPro cookies written from secret")
          PY

      - name: Validate GoPro cookies
        run: |
          python3 - <<'PY'
          import sys
          import gopro_uploader as u

          try:
              session = u.make_session(u.load_cookies_from_file())
              u.gopro_get(session, "/media/search", params={"fields": "id", "per_page": 1, "page": 1, "type": "Video"})
              print("GoPro cookies are valid")
          except Exception as e:
              print(f"ERROR: GoPro cookies invalid: {e}")
              print("Tip: trigger a manual cookie refresh run (run_cookie_refresh=true) to fix this")
              raise SystemExit(1)
          PY

      - name: Debug GoPro scan candidates
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.days || '2' }}
          GOPRO_EMAIL: ${{ secrets.GOPRO_EMAIL }}
          GOPRO_PASSWORD: ${{ secrets.GOPRO_PASSWORD }}
        run: |
          python3 - <<'PY'
          import gopro_uploader as u

          con = u.init_db()
          session = u.get_authenticated_gopro_session()
          media_items = u.fetch_recent_media(session, con=con)

          print("=" * 60)
          print(f"DEBUG: GoPro returned {len(media_items)} item(s) before filtering")

          accepted = 0
          for item in media_items:
              reasons, summary = u.describe_media_filter(con, item)
              is_360 = item.get("filename", "").lower().endswith(".360")
              tag = " [360°]" if is_360 else ""
              if reasons:
                  print(f"DEBUG FILTERED: {summary}{tag} — {'; '.join(reasons)}")
              else:
                  accepted += 1
                  print(f"DEBUG ACCEPTED: {summary}{tag}")

          print(f"DEBUG: {accepted} item(s) would be accepted for upload")
          print("=" * 60)
          PY

      - name: Run uploader
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.days || '2' }}
          MANUAL_GOPRO_FILENAME: ${{ github.event.inputs.gopro_filename || '' }}
          GOPRO_EMAIL: ${{ secrets.GOPRO_EMAIL }}
          GOPRO_PASSWORD: ${{ secrets.GOPRO_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TRANSCODE_360_BITRATE: '20M'
        run: python3 gopro_uploader.py

      - name: Show DB status
        if: always()
        run: |
          ls -lah uploaded.db || true
          git status --short

      - name: Commit updated database back to main
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git stash --include-untracked || true
          git fetch origin main
          git checkout main
          git pull --rebase origin main
          git stash pop || true

          touch uploaded.db
          git add uploaded.db

          if git diff --staged --quiet; then
            echo "No uploaded.db changes to commit"
            exit 0
          fi

          git commit -m "chore: update uploaded.db [skip ci]"
          git push origin HEAD:main

      - name: Save updated YouTube token
        if: always()
        run: |
          if [ -f youtube_token.json ]; then
            echo "YOUTUBE_TOKEN_UPDATED=$(cat youtube_token.json | base64 -w 0)" >> $GITHUB_ENV
          fi
