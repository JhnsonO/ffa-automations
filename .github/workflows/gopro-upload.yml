name: Upload GoPro Sessions to YouTube

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'How many days back to check for new videos'
        required: false
        default: '2'
        type: string

permissions:
  contents: write

concurrency:
  group: gopro-upload
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Ensure latest main
        run: |
          git checkout main
          git pull --rebase origin main

      - name: Ensure DB exists
        run: |
          touch uploaded.db
          ls -lah uploaded.db

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests google-auth google-auth-oauthlib google-api-python-client playwright
          playwright install chromium --with-deps

      - name: Write YouTube credentials
        run: echo '${{ secrets.YOUTUBE_CREDENTIALS }}' > youtube_credentials.json

      - name: Write YouTube token
        run: echo '${{ secrets.YOUTUBE_TOKEN }}' > youtube_token.json

      - name: Run uploader
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.days || '2' }}
          GOPRO_EMAIL: ${{ secrets.GOPRO_EMAIL }}
          GOPRO_PASSWORD: ${{ secrets.GOPRO_PASSWORD }}
        run: python3 gopro_uploader.py

      - name: Show DB status
        if: always()
        run: |
          ls -lah uploaded.db || true
          git status --short

      - name: Commit updated database back to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stash any local changes so rebase can run cleanly
          git stash --include-untracked || true

          git checkout main
          git pull --rebase origin main

          # Restore stashed changes (uploaded.db)
          git stash pop || true

          touch uploaded.db
          git add uploaded.db

          if git diff --staged --quiet; then
            echo "No uploaded.db changes to commit"
            exit 0
          fi

          git commit -m "chore: update uploaded.db [skip ci]"
          git push origin HEAD:main

      - name: Save updated YouTube token
        if: always()
        run: |
          if [ -f youtube_token.json ]; then
            echo "YOUTUBE_TOKEN_UPDATED=$(cat youtube_token.json | base64 -w 0)" >> $GITHUB_ENV
          fi
