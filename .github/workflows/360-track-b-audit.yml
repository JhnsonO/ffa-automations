name: 360 Track B - Detector Review Packs

on:
  workflow_dispatch:
    inputs:
      equirect_file_id:
        description: 'Drive ID of equirect_trim.mp4'
        required: true
        default: '1z2p2FgLsjgvIIBw0HZXWEenckMLWpVNX'
        type: string
      stage1_candidates_file_id:
        description: 'Drive ID of stage1_candidates.json'
        required: true
        default: ''
        type: string

jobs:
  track-b-packs:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0 aria2
          pip install --quiet 'numpy<2' pillow opencv-python-headless

      - name: Get Drive access token
        env:
          YOUTUBE_TOKEN:       ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "$YOUTUBE_TOKEN"       > /tmp/youtube_token.json
          echo "$YOUTUBE_CREDENTIALS" > /tmp/youtube_credentials.json
          python3 - << 'PY'
          import json, urllib.request as _req
          token_data = json.loads(open("/tmp/youtube_token.json").read())
          creds_data = json.loads(open("/tmp/youtube_credentials.json").read())
          client_id     = token_data.get("client_id") or creds_data["installed"]["client_id"]
          client_secret = token_data.get("client_secret") or creds_data["installed"]["client_secret"]
          refresh_token = token_data["refresh_token"]
          token_uri     = token_data.get("token_uri", "https://oauth2.googleapis.com/token")
          payload = json.dumps({"client_id": client_id, "client_secret": client_secret,
              "refresh_token": refresh_token, "grant_type": "refresh_token"}).encode()
          r = _req.urlopen(_req.Request(token_uri, data=payload,
                           headers={"Content-Type": "application/json"}, method="POST"))
          tok = json.loads(r.read())
          if "access_token" not in tok:
              raise RuntimeError(f"Token refresh failed: {tok}")
          with open("/tmp/drive_token.txt", "w") as f:
              f.write(tok["access_token"])
          print(f"Access token obtained (expires_in={tok.get('expires_in')}s)")
          PY

      - name: Download inputs from Drive
        env:
          EQUIRECT_FILE_ID:          ${{ github.event.inputs.equirect_file_id }}
          STAGE1_CANDIDATES_FILE_ID: ${{ github.event.inputs.stage1_candidates_file_id }}
        run: |
          ACCESS_TOKEN=$(cat /tmp/drive_token.txt)
          mkdir -p /tmp/ffa_trackb

          echo "--- Downloading equirect_trim.mp4 ---"
          aria2c -x 8 -s 8 --file-allocation=none \
            --header="Authorization: Bearer $ACCESS_TOKEN" \
            --dir=/tmp/ffa_trackb --out=equirect_trim.mp4 \
            "https://www.googleapis.com/drive/v3/files/$EQUIRECT_FILE_ID?alt=media"
          du -sh /tmp/ffa_trackb/equirect_trim.mp4

          echo "--- Downloading stage1_candidates.json ---"
          aria2c -x 4 --file-allocation=none \
            --header="Authorization: Bearer $ACCESS_TOKEN" \
            --dir=/tmp/ffa_trackb --out=stage1_candidates.json \
            "https://www.googleapis.com/drive/v3/files/$STAGE1_CANDIDATES_FILE_ID?alt=media"

          ls -lh /tmp/ffa_trackb/

      - name: Generate Track B packs
        env:
          EQUIRECT_FILE_ID:          ${{ github.event.inputs.equirect_file_id }}
          STAGE1_CANDIDATES_FILE_ID: ${{ github.event.inputs.stage1_candidates_file_id }}
        run: |
          mkdir -p /tmp/ffa_trackb/out
          GITHUB_SHA=${{ github.sha }} \
          EQUIRECT_FILE_ID=$EQUIRECT_FILE_ID \
          STAGE1_FILE_ID=$STAGE1_CANDIDATES_FILE_ID \
          python3 ball_tracker/track_b_pack_gen.py \
            --equirect          /tmp/ffa_trackb/equirect_trim.mp4 \
            --stage1-candidates /tmp/ffa_trackb/stage1_candidates.json \
            --output-dir        /tmp/ffa_trackb/out \
            --equirect-file-id  "$EQUIRECT_FILE_ID" \
            --stage1-id         "$STAGE1_CANDIDATES_FILE_ID"
          ls -lh /tmp/ffa_trackb/out/

      - name: Copy outputs to workspace
        run: |
          mkdir -p track_b_output
          cp /tmp/ffa_trackb/out/track_b_manifest.json                    track_b_output/ \
            || echo "WARN: track_b_manifest.json not found"
          cp /tmp/ffa_trackb/out/candidate_precision_review_pack.png      track_b_output/ \
            || echo "WARN: candidate_precision_review_pack.png not found"
          cp /tmp/ffa_trackb/out/zero_candidate_coverage_review_pack.png  track_b_output/ \
            || echo "WARN: zero_candidate_coverage_review_pack.png not found"
          cp /tmp/ffa_trackb/out/track_b_report.txt                       track_b_output/ \
            || echo "WARN: track_b_report.txt not found"
          cp /tmp/ffa_trackb/out/run_summary.json                         track_b_output/ \
            || echo "WARN: run_summary.json not found"
          echo "=== workspace outputs ==="
          ls -lh track_b_output/

      - name: Upload outputs to Google Drive
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_TOKEN:       ${{ secrets.YOUTUBE_TOKEN }}
          GITHUB_RUN_ID:       ${{ github.run_id }}
        run: |
          pip install -q google-auth google-auth-oauthlib google-api-python-client
          echo "$YOUTUBE_CREDENTIALS" > youtube_credentials.json
          echo "$YOUTUBE_TOKEN"       > youtube_token.json
          python3 - << 'PY'
          import os, json, urllib.request as _req, datetime
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          FOLDER_ID = "1gHW29JbvUWnbvJTCC0J8O7r-O1IPZAd8"

          token_data = json.loads(open("youtube_token.json").read())
          creds_data = json.loads(open("youtube_credentials.json").read())
          client_id     = token_data.get("client_id") or creds_data["installed"]["client_id"]
          client_secret = token_data.get("client_secret") or creds_data["installed"]["client_secret"]
          refresh_token = token_data["refresh_token"]
          token_uri     = token_data.get("token_uri", "https://oauth2.googleapis.com/token")

          payload = json.dumps({"client_id": client_id, "client_secret": client_secret,
              "refresh_token": refresh_token, "grant_type": "refresh_token"}).encode()
          r = _req.urlopen(_req.Request(token_uri, data=payload,
                           headers={"Content-Type": "application/json"}, method="POST"))
          tok = json.loads(r.read())
          if "access_token" not in tok:
              raise RuntimeError(f"Token refresh failed: {tok}")

          creds = Credentials(
              token=tok["access_token"], refresh_token=refresh_token,
              token_uri=token_uri, client_id=client_id, client_secret=client_secret,
              scopes=["https://www.googleapis.com/auth/drive"],
          )
          creds.expiry = datetime.datetime.utcnow() + datetime.timedelta(
              seconds=int(tok.get("expires_in", 3600)))
          drive = build("drive", "v3", credentials=creds, cache_discovery=False)

          run_id = os.environ.get("GITHUB_RUN_ID", "unknown")
          uploads = [
              ("track_b_manifest.json",                    "application/json"),
              ("candidate_precision_review_pack.png",       "image/png"),
              ("zero_candidate_coverage_review_pack.png",   "image/png"),
              ("track_b_report.txt",                        "text/plain"),
              ("run_summary.json",                          "application/json"),
          ]
          drive_ids = {}
          for fname, mime in uploads:
              fpath = f"track_b_output/{fname}"
              if not os.path.isfile(fpath):
                  print(f"SKIP {fname} — not found"); continue
              stem, ext = fname.rsplit(".", 1)
              media = MediaFileUpload(fpath, mimetype=mime, resumable=True)
              uploaded = drive.files().create(
                  body={"name": f"{stem}-{run_id}.{ext}", "parents": [FOLDER_ID]},
                  media_body=media, fields="id,name,size"
              ).execute()
              size_kb = int(uploaded.get("size", 0)) // 1024
              print(f"Uploaded: {uploaded['name']} ({size_kb}KB)  id={uploaded['id']}")
              drive_ids[fname] = uploaded["id"]

          print(f"Drive folder: https://drive.google.com/drive/folders/{FOLDER_ID}")
          print(f"Drive IDs: {json.dumps(drive_ids, indent=2)}")
          PY

      - name: Upload outputs as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: track-b-packs-${{ github.run_id }}
          path: track_b_output/
          retention-days: 30
