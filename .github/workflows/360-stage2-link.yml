name: 360 Stage 2 — Temporal Linking

on:
  workflow_dispatch:
    inputs:
      stage1_candidates_file_id:
        description: 'Google Drive file ID for stage1_candidates.json (leave blank if using artifact_id)'
        required: false
        default: ''
      stage1_artifact_id:
        description: 'GitHub Actions artifact ID for stage1_candidates.json (alternative to Drive ID)'
        required: false
        default: ''
      hotspot_map_file_id:
        description: 'Google Drive file ID for hotspot_map.json'
        required: true

jobs:
  stage2-link:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy pytest requests google-auth google-auth-oauthlib google-api-python-client

      - name: Get Drive access token
        id: drive_token
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_TOKEN:       ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request

          creds = json.loads(os.environ['YOUTUBE_CREDENTIALS'])
          token = json.loads(os.environ['YOUTUBE_TOKEN'])

          payload = json.dumps({
              'client_id':     creds['installed']['client_id'],
              'client_secret': creds['installed']['client_secret'],
              'refresh_token': token['refresh_token'],
              'grant_type':    'refresh_token',
          }).encode()
          req = urllib.request.Request(
              'https://oauth2.googleapis.com/token',
              data=payload, method='POST',
              headers={'Content-Type': 'application/json'}
          )
          with urllib.request.urlopen(req) as r:
              access_token = json.loads(r.read())['access_token']

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"DRIVE_TOKEN={access_token}\n")
          print("Drive token obtained.")
          EOF

      - name: Download stage1_candidates.json (from Drive)
        if: ${{ github.event.inputs.stage1_candidates_file_id != '' }}
        run: |
          FILE_ID="${{ github.event.inputs.stage1_candidates_file_id }}"
          curl -sL \
            -H "Authorization: Bearer $DRIVE_TOKEN" \
            "https://www.googleapis.com/drive/v3/files/${FILE_ID}?alt=media" \
            -o stage1_candidates.json
          echo "stage1_candidates.json (Drive): $(wc -c < stage1_candidates.json) bytes"

      - name: Download stage1_candidates.json (from artifact)
        if: ${{ github.event.inputs.stage1_artifact_id != '' && github.event.inputs.stage1_candidates_file_id == '' }}
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          ARTIFACT_ID: ${{ github.event.inputs.stage1_artifact_id }}
        run: |
          python3 - <<'EOF'
          import urllib.request, urllib.error, json, zipfile, io, os

          PAT         = os.environ["GH_PAT"]
          ARTIFACT_ID = os.environ["ARTIFACT_ID"]
          REPO        = "JhnsonO/ffa-automations"

          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  return None

          opener = urllib.request.build_opener(NoRedirect)
          req = urllib.request.Request(
              f"https://api.github.com/repos/{REPO}/actions/artifacts/{ARTIFACT_ID}/zip",
              headers={"Authorization": f"token {PAT}", "Accept": "application/vnd.github.v3+json"}
          )
          try:
              opener.open(req)
          except urllib.error.HTTPError as e:
              blob_url = e.headers.get("Location")

          with urllib.request.urlopen(blob_url, timeout=120) as r:
              zdata = r.read()

          z = zipfile.ZipFile(io.BytesIO(zdata))
          with open("stage1_candidates.json", "wb") as f:
              f.write(z.read("stage1_candidates.json"))
          print(f"stage1_candidates.json (artifact): {os.path.getsize('stage1_candidates.json')} bytes")
          EOF

      - name: Download hotspot_map.json
        run: |
          FILE_ID="${{ github.event.inputs.hotspot_map_file_id }}"
          curl -sL \
            -H "Authorization: Bearer $DRIVE_TOKEN" \
            "https://www.googleapis.com/drive/v3/files/${FILE_ID}?alt=media" \
            -o hotspot_map.json
          echo "hotspot_map.json: $(wc -c < hotspot_map.json) bytes"

      - name: Run fixture tests
        run: |
          python3 -m pytest ball_tracker/tests/test_stage2_fixture.py -v

      - name: Run Stage 2 temporal linking
        run: |
          python3 ball_tracker/stage2_temporal_link.py \
            --stage1-candidates stage1_candidates.json \
            --hotspot-map hotspot_map.json \
            --output-dir stage2_output

      - name: Print summary
        run: |
          python3 - <<'EOF'
          import json, os
          for fname in ['tracklets.json', 'gaps.json', 'stage2_report.txt']:
              fpath = os.path.join('stage2_output', fname)
              if not os.path.exists(fpath):
                  print(f"MISSING: {fname}"); continue
              if fname.endswith('.txt'):
                  print(open(fpath).read())
              else:
                  data = json.load(open(fpath))
                  if isinstance(data, list):
                      print(f"{fname}: {len(data)} records")
                  elif isinstance(data, dict):
                      print(f"{fname}: {list(data.keys())[:5]}")
          EOF

      - name: Upload outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage2-output-${{ github.run_id }}
          path: stage2_output/
          retention-days: 14

      - name: Upload tracklets.json to Drive
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request, urllib.error

          OUTPUT_FOLDER = '1gHW29JbvUWnbvJTCC0J8O7r-O1IPZAd8'
          token = os.environ['DRIVE_TOKEN']
          headers = {'Authorization': f'Bearer {token}'}

          def drive_get(url, params=''):
              req = urllib.request.Request(url + (f'?{params}' if params else ''), headers=headers)
              with urllib.request.urlopen(req) as r: return json.loads(r.read())

          for fname in ['tracklets.json', 'gaps.json']:
              fpath = os.path.join('stage2_output', fname)
              if not os.path.exists(fpath):
                  print(f"WARN: {fname} not found, skipping"); continue

              import urllib.parse
              q = urllib.parse.urlencode({
                  'q': f"name='{fname}' and '{OUTPUT_FOLDER}' in parents and trashed=false",
                  'fields': 'files(id,name)'
              })
              existing = drive_get('https://www.googleapis.com/drive/v3/files', q).get('files', [])

              with open(fpath, 'rb') as f:
                  data = f.read()

              boundary = 'ffa_boundary_abc123'
              meta = json.dumps({'name': fname} if existing else {'name': fname, 'parents': [OUTPUT_FOLDER]})
              body = (
                  f'--{boundary}\r\nContent-Type: application/json\r\n\r\n{meta}\r\n'
                  f'--{boundary}\r\nContent-Type: application/json\r\n\r\n'
              ).encode() + data + f'\r\n--{boundary}--'.encode()

              if existing:
                  file_id = existing[0]['id']
                  url = f'https://www.googleapis.com/upload/drive/v3/files/{file_id}?uploadType=multipart'
                  method = 'PATCH'
              else:
                  url = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart'
                  method = 'POST'

              req = urllib.request.Request(url, data=body, method=method, headers={
                  **headers,
                  'Content-Type': f'multipart/related; boundary={boundary}'
              })
              with urllib.request.urlopen(req) as r:
                  resp = json.loads(r.read())
              print(f"Uploaded {fname} → Drive ID: {resp.get('id')}")
          EOF
