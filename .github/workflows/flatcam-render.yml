name: Flatcam Full-Clip Render (Vast.ai CPU)

on:
  workflow_dispatch:
    inputs:
      drive_file_id:
        description: 'Drive file ID of the source flat MP4'
        required: false
        default: '1xfr5gvMeYtkyVs1DdqU3GROcuVUt6BvQ'
        type: string
      profile:
        description: 'Lens profile name (flatcam/lens_profiles.json)'
        required: false
        default: 'gopro_max2_msv_4k60'
        type: string
      venue:
        description: 'Repo path to venue polygon JSON'
        required: false
        default: 'flatcam/venues/st_margarets_msv.json'
        type: string
      artifact_name:
        description: 'Name for the uploaded render artifact'
        required: false
        default: 'flatcam-full-render'
        type: string

jobs:
  flatcam-render:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate SSH key pair
        run: |
          pip install -q cryptography
          python3 -u - << 'PY'
          from cryptography.hazmat.primitives import serialization
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
          import os
          key = Ed25519PrivateKey.generate()
          priv = key.private_bytes(serialization.Encoding.PEM, serialization.PrivateFormat.OpenSSH, serialization.NoEncryption())
          pub = key.public_key().public_bytes(serialization.Encoding.OpenSSH, serialization.PublicFormat.OpenSSH)
          with open('/tmp/vastai_key', 'wb') as f: f.write(priv)
          with open('/tmp/vastai_key.pub', 'wb') as f: f.write(pub + b' ffa-flatcam\n')
          os.chmod('/tmp/vastai_key', 0o600)
          PY

      - name: Launch reliable Vast.ai CPU instance
        id: launch
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
        run: |
          python3 -u - << 'PY'
          import os, json, time, urllib.request, urllib.parse, sys

          api_key = os.environ['VAST_API_KEY']
          base = 'https://console.vast.ai/api/v0'
          cloud = 'https://cloud.vast.ai/api/v1'
          headers = {'Authorization': f'Bearer {api_key}', 'Content-Type': 'application/json', 'Accept': 'application/json'}
          pub_key = open('/tmp/vastai_key.pub').read().strip()

          def request(method, url, data=None, timeout=25):
              body = json.dumps(data).encode() if data is not None else None
              req = urllib.request.Request(url, data=body, method=method, headers=headers)
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  return json.loads(r.read())

          def delete_instance(instance_id):
              for ep in (f'{base}/instances/{instance_id}/',
                         f'https://cloud.vast.ai/api/v0/instances/{instance_id}/',
                         f'{cloud}/instances/{instance_id}/'):
                  try:
                      request('DELETE', ep, timeout=15)
                      return
                  except Exception as exc:
                      last_exc = exc
              print(f'Cleanup warning for {instance_id}: all endpoints failed, last error: {last_exc}')

          # Register this ephemeral GitHub runner key with Vast.
          request('POST', f'{base}/ssh/', {'ssh_key': pub_key})

          # This job is a CPU-only OpenCV render: no GPU required, but needs real cores/RAM.
          query = {
              'verified': {'eq': True},
              'rentable': {'eq': True},
              'reliability': {'gte': 0.98},
              'cpu_cores': {'gte': 16},
              'cpu_ram': {'gte': 32768},
              'disk_space': {'gte': 60},
              'inet_down': {'gte': 300},
          }
          bundles = request('GET', f'{base}/bundles/?' + urllib.parse.urlencode({'q': json.dumps(query)}))
          offers = bundles.get('offers', [])
          bad_cpu = ('E5-', 'E3-', 'Opteron', 'Xeon W3', 'Xeon X5')
          offers = [o for o in offers if not any(x in (o.get('cpu_name') or '') for x in bad_cpu)]
          offers.sort(key=lambda o: float(o.get('dph_total', 999)))
          if not offers:
              print('ERROR: No reliable CPU offers matched the flatcam render requirements', file=sys.stderr)
              sys.exit(1)

          print(f'Found {len(offers)} eligible offers; trying up to 5 cheapest reliable offers.')
          selected = None
          for index, offer in enumerate(offers[:5], start=1):
              offer_id = offer['id']
              print('Trying offer %s (%s/5): cpu=%s cores=%s ram=%sMB reliability=%s $%s/hr' % (
                  offer_id, index, offer.get('cpu_name', 'unknown'), offer.get('cpu_cores', '?'),
                  offer.get('cpu_ram', '?'), offer.get('reliability', '?'), offer.get('dph_total', '?')))
              try:
                  result = request('PUT', f'{base}/asks/{offer_id}/', {
                      'client_id': 'me',
                      'image': 'python:3.11-slim',
                      'disk': 60,
                      'onstart': '',
                      'runtype': 'ssh',
                      'ssh_key': pub_key,
                      'env': {},
                  })
              except Exception as exc:
                  print(f'Launch request failed for offer {offer_id}: {exc}')
                  continue
              instance_id = result.get('new_contract')
              if not instance_id:
                  print(f'Offer {offer_id} did not return an instance: {result}')
                  continue

              for attempt in range(30):  # 5 minutes per offer
                  time.sleep(10)
                  try:
                      instances = request('GET', f'{cloud}/instances/')
                      inst = next((x for x in instances.get('instances', []) if x.get('id') == instance_id), None)
                  except Exception as exc:
                      print(f'  [{attempt + 1}/30] status lookup failed: {exc}')
                      continue
                  if not inst:
                      print(f'  [{attempt + 1}/30] instance not listed yet')
                      continue
                  status = inst.get('actual_status', '?')
                  ip = inst.get('ssh_host') or inst.get('public_ipaddr')
                  port = inst.get('ssh_port', 22)
                  print(f'  [{attempt + 1}/30] status={status} ip={ip} port={port}')
                  if status == 'running' and ip:
                      selected = (instance_id, ip, port, offer)
                      break
                  if status in ('error', 'failed', 'stopped'):
                      break
              if selected:
                  break
              print(f'Offer {offer_id} did not become usable; terminating instance {instance_id} and trying next.')
              delete_instance(instance_id)

          if not selected:
              print('ERROR: None of the first five reliable CPU offers became ready', file=sys.stderr)
              sys.exit(1)
          instance_id, ip, port, offer = selected
          print(f'Selected ready instance: id={instance_id} cpu={offer.get("cpu_name")} cores={offer.get("cpu_cores")} reliability={offer.get("reliability")} ip={ip}:{port}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'instance_id={instance_id}\nip={ip}\nport={port}\n')
          PY

      - name: Wait for SSH
        env:
          IP: ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          for i in $(seq 1 18); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=8 -i /tmp/vastai_key -p "$PORT" "root@$IP" 'echo OK' 2>/dev/null | grep -q OK; then
              echo 'SSH ready'; exit 0
            fi
            echo "SSH not ready ($i/18)"; sleep 5
          done
          echo 'ERROR: SSH never came up'; exit 1

      - name: Install dependencies
        env:
          IP: ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=20 -o ServerAliveCountMax=3 root@$IP"
          $SSH "stdbuf -oL -eL apt-get update && stdbuf -oL -eL apt-get install -y --no-install-recommends ffmpeg aria2 libgl1 libglib2.0-0"
          $SSH "stdbuf -oL -eL pip install 'numpy<2' opencv-python-headless"
          $SSH "python3 -c \"import cv2, numpy; print('deps OK, cv2:', cv2.__version__, 'numpy:', numpy.__version__)\""

      - name: Upload flatcam code to instance
        env:
          IP: ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
          VENUE: ${{ github.event.inputs.venue }}
        run: |
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes root@$IP"
          SCP="scp -i /tmp/vastai_key -P $PORT -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes"
          $SSH 'mkdir -p /tmp/flatcam_run/flatcam/venues /tmp/flatcam_run/flatcam/output'
          $SCP flatcam/render_segment_flat.py root@$IP:/tmp/flatcam_run/flatcam/
          $SCP flatcam/follow_camera_flat.py root@$IP:/tmp/flatcam_run/flatcam/
          $SCP flatcam/action_centroid.py root@$IP:/tmp/flatcam_run/flatcam/
          $SCP flatcam/undistort.py root@$IP:/tmp/flatcam_run/flatcam/
          $SCP flatcam/lens_profiles.json root@$IP:/tmp/flatcam_run/flatcam/
          $SCP "$VENUE" root@$IP:/tmp/flatcam_run/flatcam/venues/

      - name: Download source clip from Drive
        env:
          IP: ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
          FILE_ID: ${{ github.event.inputs.drive_file_id }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "$YOUTUBE_TOKEN" > /tmp/youtube_token.json
          echo "$YOUTUBE_CREDENTIALS" > /tmp/youtube_credentials.json
          python3 -u - << 'PY'
          import json, urllib.request as req
          token_data = json.loads(open('/tmp/youtube_token.json').read())
          creds_data = json.loads(open('/tmp/youtube_credentials.json').read())
          payload = json.dumps({'client_id': token_data.get('client_id') or creds_data['installed']['client_id'], 'client_secret': token_data.get('client_secret') or creds_data['installed']['client_secret'], 'refresh_token': token_data['refresh_token'], 'grant_type': 'refresh_token'}).encode()
          response = req.urlopen(req.Request(token_data.get('token_uri', 'https://oauth2.googleapis.com/token'), data=payload, headers={'Content-Type': 'application/json'}, method='POST'))
          token = json.loads(response.read())
          if 'access_token' not in token: raise RuntimeError(f'Token refresh failed: {token}')
          open('/tmp/drive_token.txt', 'w').write(token['access_token'])
          print(f"Token OK (expires_in={token.get('expires_in')}s)")
          PY
          ACCESS_TOKEN=$(cat /tmp/drive_token.txt)
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes root@$IP"
          $SSH "aria2c -x 8 -s 8 --file-allocation=none --header='Authorization: Bearer $ACCESS_TOKEN' --dir=/tmp/flatcam_run --out=source.mp4 'https://www.googleapis.com/drive/v3/files/$FILE_ID?alt=media' 2>&1 | tail -5"
          $SSH "ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 /tmp/flatcam_run/source.mp4"

      - name: Run full-clip render
        env:
          IP: ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
          PROFILE: ${{ github.event.inputs.profile }}
          VENUE: ${{ github.event.inputs.venue }}
        run: |
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes root@$IP"
          VENUE_BASENAME=$(basename "$VENUE")
          $SSH "set -o pipefail; cd /tmp/flatcam_run && stdbuf -oL -eL python3 flatcam/render_segment_flat.py --input source.mp4 --profile $PROFILE --venue flatcam/venues/$VENUE_BASENAME --output flatcam/output/full_render.mp4 --csv-out flatcam/output/full_render.csv 2>&1"

      - name: Copy render artifacts
        env:
          IP: ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          SCP="scp -i /tmp/vastai_key -P $PORT -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes"
          mkdir -p flatcam_artifacts
          $SCP "root@$IP:/tmp/flatcam_run/flatcam/output/full_render.mp4" flatcam_artifacts/
          $SCP "root@$IP:/tmp/flatcam_run/flatcam/output/full_render.csv" flatcam_artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.artifact_name }}-${{ github.run_id }}
          path: flatcam_artifacts/
          retention-days: 14

      - name: Terminate Vast.ai instance
        if: always()
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
          INSTANCE_ID: ${{ steps.launch.outputs.instance_id }}
        run: |
          python3 - << 'PY'
          import os, urllib.request, urllib.error
          instance_id = os.environ.get('INSTANCE_ID', '')
          if not instance_id:
              print('No instance ID'); raise SystemExit(0)

          headers = {'Authorization': f"Bearer {os.environ['VAST_API_KEY']}", 'Content-Type': 'application/json'}
          endpoints = [
              f'https://console.vast.ai/api/v0/instances/{instance_id}/',
              f'https://cloud.vast.ai/api/v0/instances/{instance_id}/',
              f'https://cloud.vast.ai/api/v1/instances/{instance_id}/',
          ]
          done = False
          for url in endpoints:
              req = urllib.request.Request(url, method='DELETE', headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      print(f'Instance {instance_id} terminated OK via {url}: {r.read().decode()[:200]}')
                  done = True
                  break
              except urllib.error.HTTPError as exc:
                  print(f'  {url} -> HTTP {exc.code}: {exc.read().decode(errors="replace")[:200]}')
              except Exception as exc:
                  print(f'  {url} -> error: {exc}')
          if not done:
              print(f'::error::Instance {instance_id} may still be RUNNING — check https://cloud.vast.ai/instances manually')
          PY
