name: VM Benchmark
on:
  workflow_dispatch:
jobs:
  benchmark:
    runs-on: self-hosted
    steps:
      - name: CPU and disk info
        run: |
          echo "=== CPU ==="
          nproc
          cat /proc/cpuinfo | grep "model name" | head -1
          echo "=== DISK ==="
          df -h /
          echo "=== FFMPEG TEST ==="
          which ffmpeg && ffmpeg -version 2>&1 | head -1 || echo "ffmpeg not installed"
          echo "=== TRANSCODE SPEED TEST ==="
          # Generate 30s test video and time the transcode
          ffmpeg -f lavfi -i testsrc=duration=30:size=4096x1344:rate=30 -f lavfi -i sine=duration=30 -c:v libx264 -preset ultrafast -b:v 20M /tmp/test_out.mp4 -y 2>&1 | tail -3
          echo "Done"
