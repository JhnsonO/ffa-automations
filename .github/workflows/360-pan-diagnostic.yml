name: 360 Pan Diagnostic

on:
  workflow_dispatch:
    inputs:
      equirect_file_id:
        description: 'Google Drive file ID for equirect_trim.mp4'
        required: true
        default: '1z2p2FgLsjgvIIBw0HZXWEenckMLWpVNX'
      frame:
        description: 'Frame index to sample'
        required: true
        default: '800'
      pitch:
        description: 'Pitch held fixed during pan'
        required: false
        default: '5'
      fov:
        description: 'FOV'
        required: false
        default: '120'
      roll:
        description: 'Roll offset'
        required: false
        default: '4'
      yaws:
        description: 'Comma-separated yaw values'
        required: false
        default: '-90 -60 -30 0 30 60 90'
      mode:
        description: 'Diagnostic mode: sanity, pm30, full'
        required: false
        default: 'sanity'

jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Install dependencies
        run: |
          sudo apt-get install -y python3-pip python3-opencv aria2
          pip install --break-system-packages opencv-python-headless numpy

      - name: Download equirect_trim.mp4 from Drive
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          EQUIRECT_FILE_ID: ${{ github.event.inputs.equirect_file_id }}
        run: |
          pip install -q google-auth google-auth-oauthlib google-api-python-client
          echo "$YOUTUBE_TOKEN"       > /tmp/youtube_token.json
          echo "$YOUTUBE_CREDENTIALS" > /tmp/youtube_credentials.json
          python3 -c "
          import json, urllib.request as _req
          token_data = json.loads(open('/tmp/youtube_token.json').read())
          creds_data = json.loads(open('/tmp/youtube_credentials.json').read())
          client_id     = token_data.get('client_id') or creds_data['installed']['client_id']
          client_secret = token_data.get('client_secret') or creds_data['installed']['client_secret']
          refresh_token = token_data['refresh_token']
          token_uri     = token_data.get('token_uri', 'https://oauth2.googleapis.com/token')
          payload = json.dumps({'client_id': client_id, 'client_secret': client_secret,
                                'refresh_token': refresh_token, 'grant_type': 'refresh_token'}).encode()
          r = _req.urlopen(_req.Request(token_uri, data=payload,
                           headers={'Content-Type': 'application/json'}, method='POST'))
          tok = json.loads(r.read())
          if 'access_token' not in tok:
              raise RuntimeError(f'Token refresh failed: {tok}')
          open('/tmp/drive_token.txt', 'w').write(tok['access_token'])
          print('Token OK')
          "
          ACCESS_TOKEN=$(cat /tmp/drive_token.txt)
          mkdir -p calib_work
          aria2c -x 8 -s 8 --file-allocation=none \
            --header="Authorization: Bearer $ACCESS_TOKEN" \
            --dir=calib_work --out=equirect_trim.mp4 \
            "https://www.googleapis.com/drive/v3/files/$EQUIRECT_FILE_ID?alt=media"
          du -sh calib_work/equirect_trim.mp4


      - name: Run pan diagnostic
        env:
          FRAME: ${{ github.event.inputs.frame }}
          PITCH: ${{ github.event.inputs.pitch }}
          FOV:   ${{ github.event.inputs.fov }}
          ROLL:  ${{ github.event.inputs.roll }}
          YAWS:  ${{ github.event.inputs.yaws }}
        env:
          FRAME: ${{ github.event.inputs.frame }}
          PITCH: ${{ github.event.inputs.pitch }}
          FOV:   ${{ github.event.inputs.fov }}
          ROLL:  ${{ github.event.inputs.roll }}
          YAWS:  ${{ github.event.inputs.yaws }}
          MODE:  ${{ github.event.inputs.mode }}
        run: |
          mkdir -p calib_output
          python3 ball_tracker/diag_pan.py \
            --input  calib_work/equirect_trim.mp4 \
            --frame  $FRAME \
            --pitch  $PITCH \
            --fov    $FOV \
            --roll   $ROLL \
            --yaws   $YAWS \
            --mode   ${MODE:-sanity} \
            --output calib_output/pan_diagnostic.jpg
          ls -lh calib_output/

      - name: Upload montage as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pan-diagnostic-${{ github.run_id }}
          path: calib_output/
          retention-days: 7

      - name: Upload montage to Google Drive
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          pip install -q google-auth google-auth-oauthlib google-api-python-client
          echo "$YOUTUBE_CREDENTIALS" > youtube_credentials.json
          echo "$YOUTUBE_TOKEN"       > youtube_token.json
          python3 - << 'PY'
          import os, json, urllib.request as _req, datetime
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          FOLDER_ID = "1gHW29JbvUWnbvJTCC0J8O7r-O1IPZAd8"

          token_data = json.loads(open("youtube_token.json").read())
          creds_data = json.loads(open("youtube_credentials.json").read())
          client_id     = token_data.get("client_id") or creds_data["installed"]["client_id"]
          client_secret = token_data.get("client_secret") or creds_data["installed"]["client_secret"]
          refresh_token = token_data["refresh_token"]
          token_uri     = token_data.get("token_uri", "https://oauth2.googleapis.com/token")
          payload = json.dumps({"client_id": client_id, "client_secret": client_secret,
                                "refresh_token": refresh_token, "grant_type": "refresh_token"}).encode()
          r = _req.urlopen(_req.Request(token_uri, data=payload,
                           headers={"Content-Type": "application/json"}, method="POST"))
          tok = json.loads(r.read())
          creds = Credentials(
              token=tok["access_token"], refresh_token=refresh_token,
              token_uri=token_uri, client_id=client_id, client_secret=client_secret,
              scopes=["https://www.googleapis.com/auth/drive"],
          )
          creds.expiry = datetime.datetime.utcnow() + datetime.timedelta(seconds=int(tok.get("expires_in", 3600)))
          drive = build("drive", "v3", credentials=creds, cache_discovery=False)

          run_id = os.environ.get("GITHUB_RUN_ID", "unknown")
          folder = drive.files().create(
              body={"name": f"pan-diagnostic-{run_id}",
                    "mimeType": "application/vnd.google-apps.folder",
                    "parents": [FOLDER_ID]},
              fields="id"
          ).execute()
          subfolder_id = folder["id"]
          print(f"Drive subfolder: pan-diagnostic-{run_id}  id={subfolder_id}")

          for fname in sorted(os.listdir("calib_output")):
              fpath = os.path.join("calib_output", fname)
              if not os.path.isfile(fpath): continue
              mime = "image/jpeg" if fname.endswith(".jpg") else "application/octet-stream"
              media = MediaFileUpload(fpath, mimetype=mime, resumable=True)
              uploaded = drive.files().create(
                  body={"name": fname, "parents": [subfolder_id]},
                  media_body=media, fields="id,name,size"
              ).execute()
              size_kb = int(uploaded.get("size", 0)) // 1024
              print(f"  Uploaded: {uploaded['name']} ({size_kb}KB)  id={uploaded['id']}")

          print(f"\nAll outputs: https://drive.google.com/drive/folders/{subfolder_id}")
          PY




