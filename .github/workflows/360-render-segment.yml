name: 360 Render Segment

on:
  workflow_dispatch:
    inputs:
      equirect_file_id:
        description: 'Google Drive file ID for equirect_trim.mp4'
        required: true
        default: '1z2p2FgLsjgvIIBw0HZXWEenckMLWpVNX'
      tracking_file_id:
        description: 'Google Drive file ID for tracking.json (from prior run)'
        required: true
        default: '1imgH6LNwmism6dwlNNc_UfJ_bFlApKa1'
      start_frame:
        description: 'Start frame for render segment'
        required: true
        default: '800'
      end_frame:
        description: 'End frame for render segment'
        required: true
        default: '1000'
      fallback_yaw:
        description: 'Wide view target yaw (degrees)'
        required: false
        default: '0'
      fallback_pitch:
        description: 'Wide view target pitch — lift for far-side coverage (try 5 or 8)'
        required: false
        default: '5'
      fallback_fov:
        description: 'Wide view target FOV (degrees, 120 recommended)'
        required: false
        default: '120'
      fallback_roll:
        description: 'Horizon-levelling roll offset for this venue (degrees)'
        required: false
        default: '4'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Install dependencies
        run: |
          sudo apt-get install -y ffmpeg python3-pip python3-opencv
          pip install --break-system-packages opencv-python-headless numpy

      - name: Download equirect_trim.mp4 from Drive
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          EQUIRECT_FILE_ID: ${{ github.event.inputs.equirect_file_id }}
        run: |
          pip install -q google-auth google-auth-oauthlib google-api-python-client
          echo "$YOUTUBE_TOKEN"       > /tmp/youtube_token.json
          echo "$YOUTUBE_CREDENTIALS" > /tmp/youtube_credentials.json
          python3 -c "
          import json, urllib.request as _req
          token_data = json.loads(open('/tmp/youtube_token.json').read())
          creds_data = json.loads(open('/tmp/youtube_credentials.json').read())
          client_id     = token_data.get('client_id') or creds_data['installed']['client_id']
          client_secret = token_data.get('client_secret') or creds_data['installed']['client_secret']
          refresh_token = token_data['refresh_token']
          token_uri     = token_data.get('token_uri', 'https://oauth2.googleapis.com/token')
          payload = json.dumps({'client_id': client_id, 'client_secret': client_secret,
                                'refresh_token': refresh_token, 'grant_type': 'refresh_token'}).encode()
          r = _req.urlopen(_req.Request(token_uri, data=payload,
                           headers={'Content-Type': 'application/json'}, method='POST'))
          tok = json.loads(r.read())
          if 'access_token' not in tok:
              raise RuntimeError(f'Token refresh failed: {tok}')
          with open('/tmp/drive_token.txt', 'w') as f:
              f.write(tok['access_token'])
          print(f'Access token obtained (expires_in={tok.get(\"expires_in\")}s)')
          "
          ACCESS_TOKEN=$(cat /tmp/drive_token.txt)
          echo "--- Downloading equirect_trim.mp4 ---"
          mkdir -p render_work
          aria2c -x 8 -s 8 --file-allocation=none \
            --header="Authorization: Bearer $ACCESS_TOKEN" \
            --dir=render_work --out=equirect_trim.mp4 \
            "https://www.googleapis.com/drive/v3/files/$EQUIRECT_FILE_ID?alt=media"
          du -sh render_work/equirect_trim.mp4

      - name: Download tracking.json from Drive
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          TRACKING_FILE_ID: ${{ github.event.inputs.tracking_file_id }}
        run: |
          pip install -q google-auth google-auth-oauthlib google-api-python-client
          echo "$YOUTUBE_TOKEN"       > /tmp/youtube_token.json
          echo "$YOUTUBE_CREDENTIALS" > /tmp/youtube_credentials.json
          python3 -c "
          import json, urllib.request as _req
          token_data = json.loads(open('/tmp/youtube_token.json').read())
          creds_data = json.loads(open('/tmp/youtube_credentials.json').read())
          client_id     = token_data.get('client_id') or creds_data['installed']['client_id']
          client_secret = token_data.get('client_secret') or creds_data['installed']['client_secret']
          refresh_token = token_data['refresh_token']
          token_uri     = token_data.get('token_uri', 'https://oauth2.googleapis.com/token')
          payload = json.dumps({'client_id': client_id, 'client_secret': client_secret,
                                'refresh_token': refresh_token, 'grant_type': 'refresh_token'}).encode()
          r = _req.urlopen(_req.Request(token_uri, data=payload,
                           headers={'Content-Type': 'application/json'}, method='POST'))
          tok = json.loads(r.read())
          with open('/tmp/drive_token.txt', 'w') as f:
              f.write(tok['access_token'])
          print(f'Token OK')
          "
          ACCESS_TOKEN=$(cat /tmp/drive_token.txt)
          echo "--- Downloading tracking.json ---"
          aria2c -x 4 -s 4 --file-allocation=none \
            --header="Authorization: Bearer $ACCESS_TOKEN" \
            --dir=render_work --out=tracking.json \
            "https://www.googleapis.com/drive/v3/files/$TRACKING_FILE_ID?alt=media"
          du -sh render_work/tracking.json

      - name: Render segment
        env:
          FFMPEG_BIN: /usr/bin/ffmpeg
          START_FRAME: ${{ github.event.inputs.start_frame }}
          END_FRAME: ${{ github.event.inputs.end_frame }}
          FALLBACK_YAW: ${{ github.event.inputs.fallback_yaw }}
          FALLBACK_PITCH: ${{ github.event.inputs.fallback_pitch }}
          FALLBACK_FOV: ${{ github.event.inputs.fallback_fov }}
          FALLBACK_ROLL: ${{ github.event.inputs.fallback_roll }}
        run: |
          echo "--- Rendering frames $START_FRAME to $END_FRAME ---"
          mkdir -p render_output
          python3 ball_tracker/render_segment.py \
            --input          render_work/equirect_trim.mp4 \
            --tracking       render_work/tracking.json \
            --start-frame    $START_FRAME \
            --end-frame      $END_FRAME \
            --output-clean   render_output/render_clean.mp4 \
            --output-debug   render_output/render_debug.mp4 \
            --fallback-yaw   $FALLBACK_YAW \
            --fallback-pitch $FALLBACK_PITCH \
            --fallback-fov   $FALLBACK_FOV \
            --fallback-roll  $FALLBACK_ROLL
          ls -lh render_output/

      - name: Upload render outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: render-segment-${{ github.run_id }}
          path: render_output/
          retention-days: 7

      - name: Upload render outputs to Google Drive
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          pip install -q google-auth google-auth-oauthlib google-api-python-client
          echo "$YOUTUBE_CREDENTIALS" > youtube_credentials.json
          echo "$YOUTUBE_TOKEN"       > youtube_token.json
          python3 - << 'PY'
          import os, json, urllib.request as _req, datetime
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          FOLDER_ID = "1gHW29JbvUWnbvJTCC0J8O7r-O1IPZAd8"

          token_data = json.loads(open("youtube_token.json").read())
          creds_data = json.loads(open("youtube_credentials.json").read())
          client_id     = token_data.get("client_id") or creds_data["installed"]["client_id"]
          client_secret = token_data.get("client_secret") or creds_data["installed"]["client_secret"]
          refresh_token = token_data["refresh_token"]
          token_uri     = token_data.get("token_uri", "https://oauth2.googleapis.com/token")
          payload = json.dumps({"client_id": client_id, "client_secret": client_secret,
                                "refresh_token": refresh_token, "grant_type": "refresh_token"}).encode()
          r = _req.urlopen(_req.Request(token_uri, data=payload,
                           headers={"Content-Type": "application/json"}, method="POST"))
          tok = json.loads(r.read())
          if "access_token" not in tok:
              raise RuntimeError(f"Token refresh failed: {tok}")
          print(f"Access token obtained (expires_in={tok.get('expires_in')}s)")
          creds = Credentials(
              token=tok["access_token"], refresh_token=refresh_token,
              token_uri=token_uri, client_id=client_id, client_secret=client_secret,
              scopes=["https://www.googleapis.com/auth/drive"],
          )
          creds.expiry = datetime.datetime.utcnow() + datetime.timedelta(seconds=int(tok.get("expires_in", 3600)))
          drive = build("drive", "v3", credentials=creds, cache_discovery=False)

          run_id = os.environ.get("GITHUB_RUN_ID", "unknown")
          folder = drive.files().create(
              body={"name": f"render-segment-{run_id}",
                    "mimeType": "application/vnd.google-apps.folder",
                    "parents": [FOLDER_ID]},
              fields="id"
          ).execute()
          subfolder_id = folder["id"]
          print(f"Created Drive subfolder: render-segment-{run_id}  id={subfolder_id}")

          output_dir = "render_output"
          for fname in sorted(os.listdir(output_dir)):
              fpath = os.path.join(output_dir, fname)
              if not os.path.isfile(fpath): continue
              mime  = "video/mp4" if fname.endswith(".mp4") else "application/json"
              media = MediaFileUpload(fpath, mimetype=mime, resumable=True)
              uploaded = drive.files().create(
                  body={"name": fname, "parents": [subfolder_id]},
                  media_body=media, fields="id,name,size"
              ).execute()
              size_mb = int(uploaded.get("size", 0)) // (1024 * 1024)
              print(f"  Uploaded: {uploaded['name']} ({size_mb}MB)  id={uploaded['id']}")

          print(f"\nAll outputs at: https://drive.google.com/drive/folders/{subfolder_id}")
          PY




