name: GoPro Cloud Scanner

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:
    inputs:
      days:
        description: 'How many days back to scan'
        required: false
        default: '2'
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: gopro-scanner
  cancel-in-progress: false

jobs:
  scan:
    name: Scan GoPro Cloud for New Videos
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-auth google-auth-oauthlib google-api-python-client

      - name: Write GoPro cookies from secret
        env:
          GOPRO_COOKIES: ${{ secrets.GOPRO_COOKIES }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          cookies = os.environ.get("GOPRO_COOKIES", "{}").strip() or "{}"
          Path("gopro_cookies.json").write_text(cookies)
          print("GoPro cookies written from secret")
          PY

      - name: Validate GoPro cookies
        id: validate_cookies
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import sys, os, json, urllib.request
          import gopro_uploader as u

          try:
              session = u.make_session(u.load_cookies_from_file())
              u.gopro_get(session, "/media/search", params={"fields": "id", "per_page": 1, "page": 1, "type": "Video"})
              print("GoPro cookies are valid")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("cookies_valid=true\n")
          except Exception as e:
              print(f"GoPro cookies invalid: {e}")
              print("Dispatching cookie refresh — scanner will re-run after refresh")
              token = os.environ["GH_PAT"]
              repo = os.environ["REPO"]
              payload = json.dumps({
                  "ref": "main",
                  "inputs": {"run_cookie_refresh": "true"}
              }).encode()
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/actions/workflows/cookie-refresh.yml/dispatches",
                  data=payload, method="POST",
                  headers={"Authorization": f"token {token}", "Content-Type": "application/json"}
              )
              urllib.request.urlopen(req)
              print("Cookie refresh dispatched — exiting cleanly")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("cookies_valid=false\n")
          PY

      - name: Load uploaded DB, upload queue, and size-check tracker from main
        if: steps.validate_cookies.outputs.cookies_valid == 'true'
        run: |
          git fetch origin main
          git checkout origin/main -- uploaded.db upload_queue.json size_check.json || true
          [ -f uploaded.db ] || touch uploaded.db
          [ -f upload_queue.json ] || echo '[]' > upload_queue.json
          [ -f size_check.json ] || echo '{}' > size_check.json
          echo "Current queue:"
          cat upload_queue.json
          echo "Current size-check tracker:"
          cat size_check.json

      - name: Scan GoPro for new videos
        if: steps.validate_cookies.outputs.cookies_valid == 'true'
        id: scan
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.days || '2' }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import os, json, sqlite3, urllib.request
          from pathlib import Path
          from datetime import datetime, timezone
          import gopro_uploader as u

          HIGH_CONFIDENCE_SIZE = 15 * 1024 * 1024 * 1024   # 15GB — 4K, clearly complete
          MIN_TRACK_SIZE = 1 * 1024 * 1024 * 1024          # 1GB — below this, definitely still recording
          STABLE_WAIT_SECONDS = 60 * 60                     # 1 hour — size must be stable this long

          # Load existing queue and size-check tracker
          queue_path = Path("upload_queue.json")
          queue = json.loads(queue_path.read_text()) if queue_path.exists() else []
          queued_media_ids = {item["media_id"] for item in queue}

          tracker_path = Path("size_check.json")
          tracker = json.loads(tracker_path.read_text()) if tracker_path.exists() else {}

          # Load DB
          con = u.init_db()
          session = u.get_authenticated_gopro_session()
          media_items = u.fetch_recent_media(session, con=con)

          now = datetime.now(timezone.utc)
          seen_media_ids = set()
          new_items = []
          tracker_changed = False

          for item in media_items:
              media_id = item.get("id", "")
              filename = item.get("filename", "")
              file_size = int(item.get("file_size", 0) or 0)
              captured_at = item.get("captured_at", "")

              seen_media_ids.add(media_id)

              # Skip if already in DB
              reasons, summary = u.describe_media_filter(con, item)
              if reasons:
                  print(f"SKIP: {summary} — {'; '.join(reasons)}")
                  if media_id in tracker:
                      del tracker[media_id]
                      tracker_changed = True
                  continue

              # Skip if already queued
              if media_id in queued_media_ids:
                  print(f"ALREADY QUEUED: {filename}")
                  if media_id in tracker:
                      del tracker[media_id]
                      tracker_changed = True
                  continue

              # Definitely complete (4K-sized) — queue immediately
              if file_size >= HIGH_CONFIDENCE_SIZE:
                  print(f"NEW (>=15GB): {filename} | {file_size/1e9:.2f} GB | captured: {captured_at}")
                  new_items.append({
                      "media_id": media_id,
                      "filename": filename,
                      "file_size": file_size,
                      "captured_at": captured_at,
                      "queued_at": now.isoformat(),
                      "fail_count": 0
                  })
                  if media_id in tracker:
                      del tracker[media_id]
                      tracker_changed = True
                  continue

              # Definitely still recording/uploading — skip and don't track
              if file_size < MIN_TRACK_SIZE:
                  print(f"SKIP (too small — {file_size/1e9:.2f} GB < 1 GB, still recording): {filename}")
                  if media_id in tracker:
                      del tracker[media_id]
                      tracker_changed = True
                  continue

              # Between 1GB and 15GB — size-stability check (handles non-4K sessions)
              prev = tracker.get(media_id)
              if prev is None:
                  print(f"TRACKING: {filename} | {file_size/1e9:.2f} GB | first seen, waiting for stability")
                  tracker[media_id] = {
                      "filename": filename,
                      "file_size": file_size,
                      "captured_at": captured_at,
                      "first_seen": now.isoformat()
                  }
                  tracker_changed = True
                  continue

              if prev["file_size"] != file_size:
                  print(f"TRACKING: {filename} | size changed {prev['file_size']/1e9:.2f} GB -> {file_size/1e9:.2f} GB, still uploading — resetting timer")
                  tracker[media_id] = {
                      "filename": filename,
                      "file_size": file_size,
                      "captured_at": captured_at,
                      "first_seen": now.isoformat()
                  }
                  tracker_changed = True
                  continue

              # Size unchanged — check elapsed time
              first_seen = datetime.fromisoformat(prev["first_seen"])
              elapsed = (now - first_seen).total_seconds()
              if elapsed >= STABLE_WAIT_SECONDS:
                  print(f"NEW (stable {elapsed/60:.0f} min, {file_size/1e9:.2f} GB): {filename} | captured: {captured_at}")
                  new_items.append({
                      "media_id": media_id,
                      "filename": filename,
                      "file_size": file_size,
                      "captured_at": captured_at,
                      "queued_at": now.isoformat(),
                      "fail_count": 0
                  })
                  del tracker[media_id]
                  tracker_changed = True
              else:
                  remaining = (STABLE_WAIT_SECONDS - elapsed) / 60
                  print(f"TRACKING: {filename} | {file_size/1e9:.2f} GB | stable, waiting {remaining:.0f} more min")

          # Clean up tracker entries for media no longer seen at all
          for media_id in list(tracker.keys()):
              if media_id not in seen_media_ids:
                  del tracker[media_id]
                  tracker_changed = True

          if tracker_changed:
              tracker_path.write_text(json.dumps(tracker, indent=2))

          if new_items:
              queue.extend(new_items)
              queue_path.write_text(json.dumps(queue, indent=2))
              print(f"\nAdded {len(new_items)} new item(s) to queue")
              print(f"Queue now has {len(queue)} item(s)")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"new_count={len(new_items)}\n")
          else:
              print("No new videos found")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("new_count=0\n")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"tracker_changed={'true' if tracker_changed else 'false'}\n")

          con.close()
          PY

      - name: Commit updated queue and size-check tracker to main
        if: steps.validate_cookies.outputs.cookies_valid == 'true' && (steps.scan.outputs.new_count != '0' || steps.scan.outputs.tracker_changed == 'true')
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import os, json, base64, urllib.request
          from pathlib import Path

          token = os.environ["GH_PAT"]
          repo = os.environ["REPO"]

          def push_file(local_path, repo_path):
              p = Path(local_path)
              if not p.exists():
                  print(f"No {local_path} — skipping")
                  return
              encoded = base64.b64encode(p.read_bytes()).decode()
              try:
                  req = urllib.request.Request(
                      f"https://api.github.com/repos/{repo}/contents/{repo_path}?ref=main",
                      headers={"Authorization": f"token {token}"}
                  )
                  with urllib.request.urlopen(req) as r:
                      sha = json.load(r)["sha"]
                  payload = json.dumps({
                      "message": f"chore: update {repo_path} [skip ci]",
                      "content": encoded,
                      "sha": sha,
                      "branch": "main"
                  }).encode()
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      payload = json.dumps({
                          "message": f"chore: create {repo_path} [skip ci]",
                          "content": encoded,
                          "branch": "main"
                      }).encode()
                  else:
                      raise

              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/contents/{repo_path}",
                  data=payload, method="PUT",
                  headers={"Authorization": f"token {token}", "Content-Type": "application/json"}
              )
              with urllib.request.urlopen(req) as r:
                  result = json.load(r)
              print(f"{repo_path} committed: {result['commit']['sha']}")

          push_file("upload_queue.json", "upload_queue.json")
          push_file("size_check.json", "size_check.json")
          PY

      - name: Trigger upload run per new video
        if: steps.validate_cookies.outputs.cookies_valid == 'true' && steps.scan.outputs.new_count != '0'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request, time
          from pathlib import Path

          token = os.environ["GH_PAT"]
          repo = os.environ["REPO"]

          queue = json.loads(Path("upload_queue.json").read_text())

          # Route .360 files (GoPro MAX) to gopro360-upload.yml via Vast.ai
          # All other videos go to gopro-upload.yml (GitHub runner)
          import sqlite3, tempfile, base64 as b64, urllib.request as ureq

          # Re-check uploaded.db before dispatching — the queue may contain files
          # that were uploaded in a concurrent run (e.g. the run that just completed
          # triggered this scanner scan before the queue was cleaned up).
          def is_already_uploaded(media_id):
              try:
                  req2 = ureq.Request(
                      f"https://api.github.com/repos/{repo}/contents/uploaded.db",
                      headers={"Authorization": f"token {token}"}
                  )
                  with ureq.urlopen(req2) as r:
                      db_bytes = b64.b64decode(json.load(r)["content"])
                  with tempfile.NamedTemporaryFile(suffix=".db", delete=False) as tf:
                      tf.write(db_bytes)
                      tmp = tf.name
                  con2 = sqlite3.connect(tmp)
                  row = con2.execute("SELECT youtube_id FROM uploads WHERE media_id=?", (media_id,)).fetchone()
                  con2.close()
                  import os; os.unlink(tmp)
                  return row is not None
              except Exception as e:
                  print(f"WARNING: could not check uploaded.db for {media_id}: {e} — dispatching anyway")
                  return False

          triggered = 0
          skipped = 0
          items_to_remove = []
          for item in queue:
              filename = item.get("filename", "")
              media_id = item["media_id"]

              # Skip if already uploaded — remove from queue
              if is_already_uploaded(media_id):
                  print(f"SKIP (already uploaded): {filename} ({media_id}) — removing from queue")
                  items_to_remove.append(media_id)
                  skipped += 1
                  continue

              is_360 = filename.lower().endswith(".360")
              workflow = "gopro360-upload.yml" if is_360 else "gopro-upload.yml"

              if is_360:
                  inputs = {
                      "media_id": media_id,
                      "filename": filename,
                      "captured_at": item.get("captured_at", ""),
                  }
              else:
                  inputs = {"media_id": media_id}

              payload = json.dumps({"ref": "main", "inputs": inputs}).encode()
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/actions/workflows/{workflow}/dispatches",
                  data=payload, method="POST",
                  headers={"Authorization": f"token {token}", "Content-Type": "application/json"}
              )
              urllib.request.urlopen(req)
              label = "360°" if is_360 else "MP4"
              print(f"Triggered {label} upload for {filename} ({media_id}) → {workflow}")
              triggered += 1
              if triggered < len(queue):
                  time.sleep(5)

          # Remove already-uploaded items from queue and commit
          if items_to_remove:
              cleaned = [i for i in queue if i["media_id"] not in items_to_remove]
              from pathlib import Path as P
              P("upload_queue.json").write_text(json.dumps(cleaned, indent=2))
              print(f"Removed {len(items_to_remove)} already-uploaded item(s) from queue")
              # Push cleaned queue back to repo
              encoded_q = b64.b64encode(P("upload_queue.json").read_bytes()).decode()
              q_sha_req = ureq.Request(
                  f"https://api.github.com/repos/{repo}/contents/upload_queue.json",
                  headers={"Authorization": f"token {token}"}
              )
              with ureq.urlopen(q_sha_req) as r:
                  q_sha = json.load(r)["sha"]
              q_payload = json.dumps({"message": "chore: remove uploaded items from queue [skip ci]", "content": encoded_q, "sha": q_sha, "branch": "main"}).encode()
              q_req = ureq.Request(
                  f"https://api.github.com/repos/{repo}/contents/upload_queue.json",
                  data=q_payload, method="PUT",
                  headers={"Authorization": f"token {token}", "Content-Type": "application/json"}
              )
              with ureq.urlopen(q_req) as r:
                  print(f"Queue cleaned and committed: {json.load(r)['commit']['sha']}")

          print(f"\nTriggered {triggered} upload run(s), skipped {skipped} already-uploaded")
          PY

