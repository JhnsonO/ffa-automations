name: Sheet Sync

# Lightweight workflow — checks the FFA YouTube RSS feed for newly-public
# videos and creates sheet tabs for them. Runs every 30 minutes.
# No YouTube OAuth required — RSS feed only shows public videos.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -q google-auth google-auth-httplib2 google-api-python-client

      - name: Sync newly-public videos to sheet
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python sheet_manager.py sync-videos
