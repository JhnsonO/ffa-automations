name: 360 Ball Tracker - Test Run

on:
  workflow_dispatch:
    inputs:
      drive_file_id:
        description: 'Google Drive file ID of the .360 source file'
        required: true
        default: '1J5rJcbPh5Xx8allwUybS7EqlnM9aXFn7'
        type: string
      trim_start_sec:
        description: 'Start time for trim (seconds into the file)'
        required: false
        default: '120'
        type: string
      clip_duration_sec:
        description: 'Seconds of clip to process after trim start'
        required: false
        default: '120'
        type: string
      excluded_offer_ids:
        description: 'Comma-separated offer IDs to skip (used on redispatch)'
        required: false
        default: ''
        type: string
      prep_only:
        description: 'If true, only stitch equirect MP4s and save to Drive (no tracking)'
        required: false
        default: 'false'
        type: string
      equirect_file_id:
        description: 'Drive file ID of already-stitched equirect_trim.mp4 — skips stitch entirely'
        required: false
        default: ''
        type: string

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate SSH key pair
        id: keygen
        run: |
          pip install -q cryptography
          python3 - << 'PY'
          from cryptography.hazmat.primitives import serialization
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
          import os, sys
          key  = Ed25519PrivateKey.generate()
          priv = key.private_bytes(serialization.Encoding.PEM, serialization.PrivateFormat.OpenSSH, serialization.NoEncryption())
          pub  = key.public_key().public_bytes(serialization.Encoding.OpenSSH, serialization.PublicFormat.OpenSSH)
          os.makedirs("/tmp", exist_ok=True)
          with open("/tmp/vastai_key",     "wb") as f: f.write(priv)
          with open("/tmp/vastai_key.pub", "wb") as f: f.write(pub + b" ffa-track\n")
          os.chmod("/tmp/vastai_key", 0o600)
          print("SSH keypair generated")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("pub_key=" + pub.decode() + " ffa-track\n")
          PY

      - name: Search for Vast.ai offer
        id: offer
        env:
          VAST_API_KEY:       ${{ secrets.VASTAI_API_KEY }}
          EXCLUDED_OFFER_IDS: ${{ github.event.inputs.excluded_offer_ids }}
        run: |
          python3 - << 'PY'
          import os, json, urllib.request, urllib.parse, sys

          API_KEY = os.environ["VAST_API_KEY"]
          BASE    = "https://console.vast.ai/api/v0"
          headers = {"Authorization": f"Bearer {API_KEY}", "Content-Type": "application/json", "Accept": "application/json"}

          def vast_get(path, params=None):
              url = f"{BASE}{path}"
              if params: url += "?" + urllib.parse.urlencode(params)
              with urllib.request.urlopen(urllib.request.Request(url, headers=headers), timeout=20) as r:
                  return json.loads(r.read())

          def vast_post(path, data):
              req = urllib.request.Request(f"{BASE}{path}", data=json.dumps(data).encode(), method="POST", headers=headers)
              with urllib.request.urlopen(req) as r: return json.loads(r.read())

          pub_key = open("/tmp/vastai_key.pub").read().strip()
          print("Registering SSH key with Vast.ai...")
          vast_post("/ssh/", {"ssh_key": pub_key})
          print("SSH key registered")

          excluded = [x.strip() for x in os.environ.get("EXCLUDED_OFFER_IDS","").split(",") if x.strip()]
          if excluded:
              print(f"Excluding offer IDs: {excluded}")

          query = {
              "verified":     {"eq": True},
              "rentable":     {"eq": True},
              "cpu_cores":    {"gte": 32},
              "cpu_ram":      {"gte": 65536},
              "cpu_ghz":      {"gte": 4.5},
              "disk_space":   {"gte": 80},
              "inet_down":    {"gte": 800},
              "gpu_frac":     {"eq": 1},
              "num_gpus":     {"eq": 1},
          }
          print(f"Query: {json.dumps(query)}")
          resp   = vast_get("/bundles/", {"q": json.dumps(query)})
          offers = resp.get("offers", [])
          print(f"Raw offers from API: {len(offers)}")

          # v4: GPU-priority selection — prefer offers with good GPU (RTX 3080+)
          # No CPU whitelist — GPU handles YOLO; CPU just needs to not bottleneck SCP/ffmpeg
          # Exclude known-bad offers
          BAD_CPU_SUBSTRINGS = ["E5-", "E3-", "Opteron", "Xeon W3", "Xeon X5"]
          before = len(offers)
          offers = [o for o in offers if not any(s in (o.get("cpu_name") or "") for s in BAD_CPU_SUBSTRINGS)]
          print(f"After CPU blacklist: {len(offers)} offers (excluded {before - len(offers)} ancient CPUs)")

          if excluded:
              before = len(offers)
              offers = [o for o in offers if str(o["id"]) not in excluded]
              print(f"After exclusion filter: {len(offers)} (removed {before - len(offers)})")

          if not offers:
              print("ERROR: No matching offers found", file=sys.stderr)
              sys.exit(1)

          # Score: prefer lower price, mildly prefer GPU VRAM >= 8GB
          def offer_score(o):
              dph = float(o.get("dph_total", 999))
              vram_mb = float(o.get("gpu_mem_bw", 0) or 0)  # proxy for VRAM
              gpu_name = (o.get("gpu_name") or "").lower()
              # Bonus for known good GPUs for YOLO inference
              gpu_bonus = 0.0
              for gpu in ["3090", "3080", "4090", "4080", "4070", "a100", "a40", "a10"]:
                  if gpu in gpu_name:
                      gpu_bonus = 0.05  # $0.05/hr credit for good GPU
                      break
              return dph - gpu_bonus

          offers.sort(key=offer_score)
          print(f"\nTop 5 candidates (GPU-priority scoring):")
          for o in offers[:5]:
              print(f"  id={o['id']} gpu={o.get('gpu_name','?')!r} cpu={o.get('cpu_name','?')!r} dph=${o.get('dph_total','?')}")

          best = offers[0]
          print(f"\nSelected: id={best['id']} gpu={best.get('gpu_name')} cpu={best.get('cpu_name')} dph=${best.get('dph_total')}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"offer_id={best['id']}\n")
              f.write(f"offer_cpu={best.get('cpu_name','unknown')}\n")
              f.write(f"offer_dph={best.get('dph_total','?')}\n")
          PY

      - name: Launch Vast.ai instance
        id: launch
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
          OFFER_ID:     ${{ steps.offer.outputs.offer_id }}
          OFFER_CPU:    ${{ steps.offer.outputs.offer_cpu }}
        run: |
          python3 - << 'PY'
          import os, json, urllib.request, urllib.parse, time, sys

          API_KEY = os.environ["VAST_API_KEY"]
          BASE    = "https://console.vast.ai/api/v0"
          BASE_V1 = "https://cloud.vast.ai/api/v1"
          headers = {"Authorization": f"Bearer {API_KEY}", "Content-Type": "application/json", "Accept": "application/json"}

          def vast_get(path, params=None, base=None):
              url = f"{(base or BASE)}{path}"
              if params: url += "?" + urllib.parse.urlencode(params)
              with urllib.request.urlopen(urllib.request.Request(url, headers=headers), timeout=20) as r:
                  return json.loads(r.read())

          def vast_put(path, data):
              req = urllib.request.Request(f"{BASE}{path}", data=json.dumps(data).encode(), method="PUT", headers=headers)
              with urllib.request.urlopen(req) as r: return json.loads(r.read())

          def vast_delete(path, base=None):
              req = urllib.request.Request(f"{(base or BASE)}{path}", method="DELETE", headers=headers)
              with urllib.request.urlopen(req, timeout=10) as r: return json.loads(r.read())

          offer_id = os.environ["OFFER_ID"]
          pub_key  = open("/tmp/vastai_key.pub").read().strip()

          print(f"Creating instance on offer {offer_id} ({os.environ['OFFER_CPU']})...")
          result = vast_put(f"/asks/{offer_id}/", {
              "client_id": "me",
              "image": "pytorch/pytorch:2.1.0-cuda11.8-cudnn8-runtime",
              "disk": 60,
              "onstart": "",
              "runtype": "ssh",
              "ssh_key": pub_key,
              "env": {},
          })

          instance_id = result.get("new_contract")
          if not instance_id:
              print(f"ERROR: no instance ID returned: {result}", file=sys.stderr)
              sys.exit(1)
          print(f"Instance ID: {instance_id}")
          print(f"Polling for running state (checking every 10s, max 4 min)...")

          ip = port = None
          for attempt in range(24):
              time.sleep(10)
              resp = vast_get("/instances/", base=BASE_V1)
              inst = next((x for x in resp.get("instances", []) if x["id"] == instance_id), None)
              if not inst:
                  print(f"  [{attempt+1}/24] not visible yet")
                  continue
              status    = inst.get("actual_status", "?")
              this_ip   = inst.get("ssh_host") or inst.get("public_ipaddr")
              this_port = inst.get("ssh_port", 22)
              cpu_util  = inst.get("cpu_util", "?")
              print(f"  [{attempt+1}/24] status={status} ip={this_ip} port={this_port} cpu_util={cpu_util}")
              if status == "running" and this_ip:
                  ip, port = this_ip, this_port
                  break
              if status in ("error", "failed", "stopped"):
                  print(f"ERROR: instance entered bad state: {status}", file=sys.stderr)
                  try: vast_delete(f"/instances/{instance_id}/", base=BASE_V1)
                  except: pass
                  sys.exit(1)

          if not ip:
              print("ERROR: instance never reached running state", file=sys.stderr)
              try: vast_delete(f"/instances/{instance_id}/", base=BASE_V1)
              except: pass
              sys.exit(1)

          print(f"\nInstance ready: {ip}:{port}  id={instance_id}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"ip={ip}\nport={port}\ninstance_id={instance_id}\n")
          PY

      - name: Wait for SSH
        id: ssh_wait
        env:
          IP:   ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          python3 - << 'PY'
          import os, socket, time, sys
          ip, port = os.environ["IP"], int(os.environ["PORT"])
          print(f"Waiting for SSH on {ip}:{port}...")
          for i in range(30):
              try:
                  s = socket.create_connection((ip, port), timeout=5)
                  s.close()
                  print(f"SSH port open after {(i+1)*5}s")
                  break
              except Exception as e:
                  print(f"  [{i+1}/30] not ready: {e}")
                  time.sleep(5)
          else:
              print("ERROR: SSH never came up", file=sys.stderr)
              sys.exit(1)
          PY
          echo "Sleeping 20s for SSH daemon and key injection to complete..."
          sleep 20

      - name: Install dependencies on instance
        env:
          IP:   ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=10 root@$IP"
          echo "--- Waiting for SSH key auth (retry up to 60s) ---"
          for i in $(seq 1 24); do
            NPROC=$($SSH "nproc" 2>/dev/null) && break
            echo "  SSH auth not ready yet ($i/24), retrying in 5s..."
            sleep 5
          done
          if [ -z "$NPROC" ]; then echo "ERROR: SSH auth never succeeded"; exit 1; fi
          echo "--- Core count check ---"
          echo "  nproc: $NPROC"
          if [ "$NPROC" -lt 16 ]; then
            echo "ERROR: only $NPROC cores allocated (need >=16) -- bad offer, aborting"
            exit 1
          fi
          echo "  Core count OK ($NPROC cores)"
          echo "--- Installing apt packages (ffmpeg via savoury1 PPA, aria2, exiftool) ---"
          $SSH "apt-get update -qq 2>/dev/null && apt-get install -y --no-install-recommends software-properties-common aria2 libimage-exiftool-perl python3-pil libgl1 libglib2.0-0 xz-utils > /dev/null"
          $SSH "curl -sL https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz | tar -xJ --strip-components=1 -C /usr/local/bin --wildcards '*/ffmpeg' '*/ffprobe' && ln -sf /usr/local/bin/ffmpeg /usr/bin/ffmpeg && ln -sf /usr/local/bin/ffprobe /usr/bin/ffprobe && /usr/bin/ffmpeg -filters 2>/dev/null | grep -q v360 && echo 'v360 OK' || echo 'WARNING: v360 missing'"
          echo "--- Installing Python packages ---"
          $SSH "rm -rf /opt/conda/lib/python3.10/site-packages/cv2 2>/dev/null || true; pip install -q --break-system-packages 'numpy<2' gdown ultralytics supervision pandas opencv-python-headless google-auth google-auth-oauthlib google-api-python-client filterpy 2>/dev/null || pip install -q 'numpy<2' gdown ultralytics supervision pandas opencv-python-headless google-auth google-auth-oauthlib google-api-python-client filterpy"
          echo "--- Verifying installs ---"
          $SSH "python3 -c \"import cv2, supervision, ultralytics, pandas; print('All imports OK')\""

      - name: Download .360 from Google Drive
        if: ${{ github.event.inputs.equirect_file_id == '' }}
        env:
          IP:              ${{ steps.launch.outputs.ip }}
          PORT:            ${{ steps.launch.outputs.port }}
          DRIVE_FILE_ID:   ${{ github.event.inputs.drive_file_id }}
          YOUTUBE_TOKEN:        ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          pip install -q google-auth google-auth-oauthlib google-api-python-client
          echo "$YOUTUBE_TOKEN"       > /tmp/youtube_token.json
          echo "$YOUTUBE_CREDENTIALS" > /tmp/youtube_credentials.json
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@$IP"
          echo "--- Getting fresh Drive access token via live refresh ---"
          python3 - << 'PY'
          import os, json, urllib.request as _req

          token_data = json.loads(open("/tmp/youtube_token.json").read())
          creds_data = json.loads(open("/tmp/youtube_credentials.json").read())

          client_id     = token_data.get("client_id") or creds_data["installed"]["client_id"]
          client_secret = token_data.get("client_secret") or creds_data["installed"]["client_secret"]
          refresh_token = token_data["refresh_token"]
          token_uri     = token_data.get("token_uri", "https://oauth2.googleapis.com/token")

          payload = json.dumps({
              "client_id":     client_id,
              "client_secret": client_secret,
              "refresh_token": refresh_token,
              "grant_type":    "refresh_token",
          }).encode()
          r = _req.urlopen(_req.Request(token_uri, data=payload, headers={"Content-Type": "application/json"}, method="POST"))
          tok = json.loads(r.read())
          if "access_token" not in tok:
              raise RuntimeError(f"Token refresh failed: {tok}")
          with open("/tmp/drive_token.txt", "w") as f:
              f.write(tok["access_token"])
          print(f"Access token obtained (expires_in={tok.get('expires_in')}s)")
          PY
          ACCESS_TOKEN=$(cat /tmp/drive_token.txt)
          FILE_ID="$DRIVE_FILE_ID"
          echo "--- Downloading source.360 from Drive to instance via aria2c ---"
          $SSH "mkdir -p /tmp/ffa_track && aria2c -x 8 -s 8 --file-allocation=none \
            --header='Authorization: Bearer $ACCESS_TOKEN' \
            --dir=/tmp/ffa_track --out=source.360 \
            'https://www.googleapis.com/drive/v3/files/$FILE_ID?alt=media' 2>&1 | tail -10"
          echo "--- Download complete ---"
          $SSH "du -sh /tmp/ffa_track/source.360"

      - name: Stitch equirectangular MP4s (trim + full)
        if: ${{ github.event.inputs.equirect_file_id == '' }}
        env:
          IP:            ${{ steps.launch.outputs.ip }}
          PORT:          ${{ steps.launch.outputs.port }}
          TRIM_START:    ${{ github.event.inputs.trim_start_sec }}
          CLIP_DURATION: ${{ github.event.inputs.clip_duration_sec }}
        run: |
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=30 root@$IP"
          SCP="scp -i /tmp/vastai_key -P $PORT -o StrictHostKeyChecking=no"

          echo "--- Writing stitch script to runner ---"
          python3 -c "import base64; open('/tmp/stitch_equirect.sh','wb').write(base64.b64decode(''))"
          chmod +x /tmp/stitch_equirect.sh
          echo "--- SCPing stitch script to instance ---"
          $SCP /tmp/stitch_equirect.sh root@$IP:/tmp/ffa_track/stitch_equirect.sh
          echo "Script uploaded"

          echo "--- Running stitch (trim ss=$TRIM_START t=$CLIP_DURATION, then full) ---"
          $SSH "chmod +x /tmp/ffa_track/stitch_equirect.sh && /tmp/ffa_track/stitch_equirect.sh $TRIM_START $CLIP_DURATION"

      - name: Download equirect_trim.mp4 from Drive
        if: ${{ github.event.inputs.equirect_file_id != '' && github.event.inputs.prep_only != 'true' }}
        env:
          IP:                  ${{ steps.launch.outputs.ip }}
          PORT:                ${{ steps.launch.outputs.port }}
          EQUIRECT_FILE_ID:    ${{ github.event.inputs.equirect_file_id }}
          YOUTUBE_TOKEN:       ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          pip install -q google-auth google-auth-oauthlib google-api-python-client
          echo "$YOUTUBE_TOKEN"       > /tmp/youtube_token.json
          echo "$YOUTUBE_CREDENTIALS" > /tmp/youtube_credentials.json
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@$IP"
          echo "--- Getting Drive access token ---"
          python3 -c "import base64; exec(base64.b64decode('').decode())"
          ACCESS_TOKEN=$(cat /tmp/drive_token.txt)
          FILE_ID="$EQUIRECT_FILE_ID"
          echo "--- Downloading equirect_trim.mp4 from Drive (id=$FILE_ID) ---"
          $SSH "mkdir -p /tmp/ffa_track && aria2c -x 8 -s 8 --file-allocation=none \\
            --header='Authorization: Bearer $ACCESS_TOKEN' \\
            --dir=/tmp/ffa_track --out=equirect_trim.mp4 \\
            'https://www.googleapis.com/drive/v3/files/$FILE_ID?alt=media' 2>&1 | tail -5"
          $SSH "du -sh /tmp/ffa_track/equirect_trim.mp4"

      - name: Run 360 ball tracker
        if: ${{ github.event.inputs.prep_only != 'true' }}
        env:
          IP:   ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=30 root@$IP"
          SCP="scp -i /tmp/vastai_key -P $PORT -o StrictHostKeyChecking=no"
          echo "--- Encoding run_tracker.py as base64 ---"
          python3 -c "import base64; open('/tmp/run_tracker_b64.txt','w').write(base64.b64encode(open('ball_tracker/run_tracker.py','rb').read()).decode())"
          B64=$(cat /tmp/run_tracker_b64.txt)
          echo "--- Uploading run_tracker.py to instance ---"
          $SSH "echo '$B64' | base64 -d > /tmp/ffa_track/run_tracker.py && echo 'run_tracker.py uploaded OK'"
          echo "--- Downloading football ball model (if missing) ---"
          $SSH "mkdir -p /tmp/ffa_track/models && \
            if [ ! -f /tmp/ffa_track/models/football-ball-detection.pt ]; then \
              pip install -q gdown && \
              gdown -O /tmp/ffa_track/models/football-ball-detection.pt 'https://drive.google.com/uc?id=1isw4wx-MK9h9LMr36VvIWlJD6ppUvw7V' ; \
            else echo 'football model already present'; fi && \
            ls -lh /tmp/ffa_track/models/football-ball-detection.pt"
          echo "--- Running 360 ball tracker (v5 detection baseline) ---"
          $SSH "python3 -c \"import json; open('/tmp/ffa_track/seed_blacklist.json','w').write(json.dumps([{'yaw':-77.43,'pitch':-3.92,'radius':2.0}]))\" && echo seed_blacklist.json written"
          $SSH "cd /tmp/ffa_track && python3 run_tracker.py --input equirect_trim.mp4 --output tracked.mp4 --json tracking.json --ball-model models/football-ball-detection.pt --person-model yolov8s.pt --metrics-only"
      - name: Pull and upload tracking results
        if: ${{ github.event.inputs.prep_only != 'true' }}
        env:
          IP:                  ${{ steps.launch.outputs.ip }}
          PORT:                ${{ steps.launch.outputs.port }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_TOKEN:       ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          mkdir -p tracking_output
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@$IP"
          scp -i /tmp/vastai_key -P $PORT -o StrictHostKeyChecking=no \
              root@$IP:/tmp/ffa_track/tracked.mp4 tracking_output/ && echo "tracked.mp4 pulled OK" || echo "WARNING: tracked.mp4 pull failed"
          scp -i /tmp/vastai_key -P $PORT -o StrictHostKeyChecking=no \
              root@$IP:/tmp/ffa_track/tracking.json tracking_output/ && echo "tracking.json pulled OK" || echo "WARNING: tracking.json pull failed"
          ls -lh tracking_output/

      - name: Upload tracking results as artifact
        if: ${{ github.event.inputs.prep_only != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: tracking-results-${{ github.run_id }}
          path: tracking_output/
          retention-days: 7

      - name: Upload tracking results to Google Drive
        if: ${{ github.event.inputs.prep_only != 'true' }}
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_TOKEN:       ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          pip install -q google-auth google-auth-oauthlib google-api-python-client
          echo "$YOUTUBE_CREDENTIALS" > youtube_credentials.json
          echo "$YOUTUBE_TOKEN"       > youtube_token.json
          python3 - << 'PY'
          import os, json, urllib.request as _req, datetime
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          FOLDER_ID = "1gHW29JbvUWnbvJTCC0J8O7r-O1IPZAd8"

          # Refresh token via direct POST (same pattern as download steps — avoids invalid_scope)
          token_data = json.loads(open("youtube_token.json").read())
          creds_data = json.loads(open("youtube_credentials.json").read())
          client_id     = token_data.get("client_id") or creds_data["installed"]["client_id"]
          client_secret = token_data.get("client_secret") or creds_data["installed"]["client_secret"]
          refresh_token = token_data["refresh_token"]
          token_uri     = token_data.get("token_uri", "https://oauth2.googleapis.com/token")

          payload = json.dumps({
              "client_id":     client_id,
              "client_secret": client_secret,
              "refresh_token": refresh_token,
              "grant_type":    "refresh_token",
          }).encode()
          r = _req.urlopen(_req.Request(token_uri, data=payload,
                           headers={"Content-Type": "application/json"}, method="POST"))
          tok = json.loads(r.read())
          if "access_token" not in tok:
              raise RuntimeError(f"Token refresh failed: {tok}")
          print(f"Access token obtained (expires_in={tok.get('expires_in')}s)")

          # Build Credentials object from the fresh token (no scope re-check)
          creds = Credentials(
              token=tok["access_token"],
              refresh_token=refresh_token,
              token_uri=token_uri,
              client_id=client_id,
              client_secret=client_secret,
              scopes=["https://www.googleapis.com/auth/drive"],
          )
          # Set expiry so google-auth doesn't think it's expired
          creds.expiry = datetime.datetime.utcnow() + datetime.timedelta(seconds=int(tok.get("expires_in", 3600)))

          drive = build("drive", "v3", credentials=creds, cache_discovery=False)

          run_id = os.environ.get("GITHUB_RUN_ID", "unknown")
          folder = drive.files().create(
              body={"name": f"tracking-run-{run_id}", "mimeType": "application/vnd.google-apps.folder", "parents": [FOLDER_ID]},
              fields="id"
          ).execute()
          subfolder_id = folder["id"]
          print(f"Created Drive subfolder: tracking-run-{run_id}  id={subfolder_id}")

          output_dir = "tracking_output"
          for fname in sorted(os.listdir(output_dir)):
              fpath = os.path.join(output_dir, fname)
              if not os.path.isfile(fpath): continue
              mime  = "video/mp4" if fname.endswith(".mp4") else "application/json"
              media = MediaFileUpload(fpath, mimetype=mime, resumable=True)
              uploaded = drive.files().create(
                  body={"name": fname, "parents": [subfolder_id]},
                  media_body=media, fields="id,name,size"
              ).execute()
              size_kb = int(uploaded.get("size", 0)) // 1024
              print(f"  Uploaded: {uploaded['name']} ({size_kb}KB)  id={uploaded['id']}")

          print(f"\nAll outputs at: https://drive.google.com/drive/folders/{subfolder_id}")
          PY

      - name: Terminate Vast.ai instance
        if: always()
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
          INSTANCE_ID:  ${{ steps.launch.outputs.instance_id }}
        run: |
          python3 - << 'PY'
          import os, urllib.request, json
          API_KEY     = os.environ["VAST_API_KEY"]
          instance_id = os.environ.get("INSTANCE_ID", "")
          if not instance_id:
              print("No instance ID -- nothing to terminate")
              exit(0)
          headers = {"Authorization": f"Bearer {API_KEY}", "Content-Type": "application/json"}
          req = urllib.request.Request(
              f"https://console.vast.ai/api/v0/instances/{instance_id}/",
              method="DELETE", headers=headers)
          try:
              urllib.request.urlopen(req, timeout=15)
              print(f"Instance {instance_id} terminated OK")
          except Exception as e:
              print(f"Terminate call failed (may already be gone): {e}")
          PY
