name: 360 Ball Tracker - Test Run

on:
  workflow_dispatch:
    inputs:
      cdn_url:
        description: 'Direct CDN URL of the .360 file to download'
        required: true
        default: ''
        type: string
      trim_start_sec:
        description: 'Start time for trim (seconds)'
        required: false
        default: '120'
        type: string
      clip_duration_sec:
        description: 'Seconds of clip to process'
        required: false
        default: '120'
        type: string
      excluded_offer_ids:
        description: 'Comma-separated offer IDs to skip'
        required: false
        default: ''
        type: string

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Smoke test
        run: |
          echo "cdn_url length: ${#CDN_URL}"
          echo "trim_start_sec: ${{ github.event.inputs.trim_start_sec }}"
          echo "Dispatch working OK"
        env:
          CDN_URL: ${{ github.event.inputs.cdn_url }}
