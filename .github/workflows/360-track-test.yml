name: 360 Ball Tracker - Test Run

on:
  workflow_dispatch:
    inputs:
      drive_file_id:
        description: 'Google Drive file ID of the .360 source file'
        required: true
        default: '1J5rJcbPh5Xx8allwUybS7EqlnM9aXFn7'
        type: string
      trim_start_sec:
        description: 'Start time for trim (seconds into the file)'
        required: false
        default: '120'
        type: string
      clip_duration_sec:
        description: 'Seconds of clip to process after trim start'
        required: false
        default: '120'
        type: string
      excluded_offer_ids:
        description: 'Comma-separated offer IDs to skip (used on redispatch)'
        required: false
        default: ''
        type: string

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate SSH key pair
        id: keygen
        run: |
          pip install -q cryptography
          python3 - << 'PY'
          from cryptography.hazmat.primitives import serialization
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
          import os, sys
          key  = Ed25519PrivateKey.generate()
          priv = key.private_bytes(serialization.Encoding.PEM, serialization.PrivateFormat.OpenSSH, serialization.NoEncryption())
          pub  = key.public_key().public_bytes(serialization.Encoding.OpenSSH, serialization.PublicFormat.OpenSSH)
          os.makedirs("/tmp", exist_ok=True)
          with open("/tmp/vastai_key",     "wb") as f: f.write(priv)
          with open("/tmp/vastai_key.pub", "wb") as f: f.write(pub + b" ffa-track\n")
          os.chmod("/tmp/vastai_key", 0o600)
          print("SSH keypair generated")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("pub_key=" + pub.decode() + " ffa-track\n")
          PY

      - name: Search for Vast.ai offer
        id: offer
        env:
          VAST_API_KEY:       ${{ secrets.VASTAI_API_KEY }}
          EXCLUDED_OFFER_IDS: ${{ github.event.inputs.excluded_offer_ids }}
        run: |
          python3 - << 'PY'
          import os, json, urllib.request, urllib.parse, sys

          API_KEY = os.environ["VAST_API_KEY"]
          BASE    = "https://console.vast.ai/api/v0"
          headers = {"Authorization": f"Bearer {API_KEY}", "Content-Type": "application/json", "Accept": "application/json"}

          def vast_get(path, params=None):
              url = f"{BASE}{path}"
              if params: url += "?" + urllib.parse.urlencode(params)
              with urllib.request.urlopen(urllib.request.Request(url, headers=headers), timeout=20) as r:
                  return json.loads(r.read())

          def vast_post(path, data):
              req = urllib.request.Request(f"{BASE}{path}", data=json.dumps(data).encode(), method="POST", headers=headers)
              with urllib.request.urlopen(req) as r: return json.loads(r.read())

          pub_key = open("/tmp/vastai_key.pub").read().strip()
          print("Registering SSH key with Vast.ai...")
          vast_post("/ssh/", {"ssh_key": pub_key})
          print("SSH key registered")

          excluded = [x.strip() for x in os.environ.get("EXCLUDED_OFFER_IDS","").split(",") if x.strip()]
          if excluded:
              print(f"Excluding offer IDs: {excluded}")

          query = {
              "verified":     {"eq": True},
              "rentable":     {"eq": True},
              "cpu_cores":    {"gte": 32},
              "cpu_ram":      {"gte": 65536},
              "cpu_ghz":      {"gte": 4.5},
              "disk_space":   {"gte": 50},
              "inet_down":    {"gte": 800},
              "gpu_frac":     {"eq": 1},
              "num_gpus":     {"eq": 1},
          }
          print(f"Query: {json.dumps(query)}")
          resp   = vast_get("/bundles/", {"q": json.dumps(query)})
          offers = resp.get("offers", [])
          print(f"Raw offers from API: {len(offers)}")

          BAD_CPU_SUBSTRINGS = ["E5-", "E3-", "Opteron", "Xeon W3", "Xeon X5"]
          before = len(offers)
          offers = [o for o in offers if not any(s in (o.get("cpu_name") or "") for s in BAD_CPU_SUBSTRINGS)]
          print(f"After CPU filter: {len(offers)} (removed {before - len(offers)} weak CPUs)")

          if excluded:
              before = len(offers)
              offers = [o for o in offers if str(o["id"]) not in excluded]
              print(f"After exclusion filter: {len(offers)} (removed {before - len(offers)})")

          if not offers:
              print("ERROR: No matching offers found", file=sys.stderr)
              sys.exit(1)

          offers.sort(key=lambda o: float(o.get("dph_total", 999)))
          print(f"\nTop 5 candidates:")
          for o in offers[:5]:
              print(f"  id={o['id']} cpu={o.get('cpu_name','?')!r} cores={o.get('cpu_cores','?')} ram={o.get('cpu_ram',0)//1024}GB dph=${o.get('dph_total','?')}")

          best = offers[0]
          print(f"\nSelected: id={best['id']} cpu={best.get('cpu_name')} dph=${best.get('dph_total')}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"offer_id={best['id']}\n")
              f.write(f"offer_cpu={best.get('cpu_name','unknown')}\n")
              f.write(f"offer_dph={best.get('dph_total','?')}\n")
          PY

      - name: Launch Vast.ai instance
        id: launch
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
          OFFER_ID:     ${{ steps.offer.outputs.offer_id }}
          OFFER_CPU:    ${{ steps.offer.outputs.offer_cpu }}
        run: |
          python3 - << 'PY'
          import os, json, urllib.request, urllib.parse, time, sys

          API_KEY = os.environ["VAST_API_KEY"]
          BASE    = "https://console.vast.ai/api/v0"
          BASE_V1 = "https://cloud.vast.ai/api/v1"
          headers = {"Authorization": f"Bearer {API_KEY}", "Content-Type": "application/json", "Accept": "application/json"}

          def vast_get(path, params=None, base=None):
              url = f"{(base or BASE)}{path}"
              if params: url += "?" + urllib.parse.urlencode(params)
              with urllib.request.urlopen(urllib.request.Request(url, headers=headers), timeout=20) as r:
                  return json.loads(r.read())

          def vast_put(path, data):
              req = urllib.request.Request(f"{BASE}{path}", data=json.dumps(data).encode(), method="PUT", headers=headers)
              with urllib.request.urlopen(req) as r: return json.loads(r.read())

          def vast_delete(path, base=None):
              req = urllib.request.Request(f"{(base or BASE)}{path}", method="DELETE", headers=headers)
              with urllib.request.urlopen(req, timeout=10) as r: return json.loads(r.read())

          offer_id = os.environ["OFFER_ID"]
          pub_key  = open("/tmp/vastai_key.pub").read().strip()

          print(f"Creating instance on offer {offer_id} ({os.environ['OFFER_CPU']})...")
          result = vast_put(f"/asks/{offer_id}/", {
              "client_id": "me",
              "image": "pytorch/pytorch:2.1.0-cuda11.8-cudnn8-runtime",
              "disk": 30,
              "onstart": "",
              "runtype": "ssh",
              "ssh_key": pub_key,
              "env": {},
          })

          instance_id = result.get("new_contract")
          if not instance_id:
              print(f"ERROR: no instance ID returned: {result}", file=sys.stderr)
              sys.exit(1)
          print(f"Instance ID: {instance_id}")
          print(f"Polling for running state (checking every 10s, max 4 min)...")

          ip = port = None
          for attempt in range(24):
              time.sleep(10)
              resp = vast_get("/instances/", base=BASE_V1)
              inst = next((x for x in resp.get("instances", []) if x["id"] == instance_id), None)
              if not inst:
                  print(f"  [{attempt+1}/24] not visible yet")
                  continue
              status    = inst.get("actual_status", "?")
              this_ip   = inst.get("ssh_host") or inst.get("public_ipaddr")
              this_port = inst.get("ssh_port", 22)
              cpu_util  = inst.get("cpu_util", "?")
              print(f"  [{attempt+1}/24] status={status} ip={this_ip} port={this_port} cpu_util={cpu_util}")
              if status == "running" and this_ip:
                  ip, port = this_ip, this_port
                  break
              if status in ("error", "failed", "stopped"):
                  print(f"ERROR: instance entered bad state: {status}", file=sys.stderr)
                  try: vast_delete(f"/instances/{instance_id}/", base=BASE_V1)
                  except: pass
                  sys.exit(1)

          if not ip:
              print("ERROR: instance never reached running state", file=sys.stderr)
              try: vast_delete(f"/instances/{instance_id}/", base=BASE_V1)
              except: pass
              sys.exit(1)

          print(f"\nInstance ready: {ip}:{port}  id={instance_id}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"ip={ip}\nport={port}\ninstance_id={instance_id}\n")
          PY

      - name: Wait for SSH
        id: ssh_wait
        env:
          IP:   ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          python3 - << 'PY'
          import os, socket, time, sys
          ip, port = os.environ["IP"], int(os.environ["PORT"])
          print(f"Waiting for SSH on {ip}:{port}...")
          for i in range(30):
              try:
                  s = socket.create_connection((ip, port), timeout=5)
                  s.close()
                  print(f"SSH port open after {(i+1)*5}s")
                  break
              except Exception as e:
                  print(f"  [{i+1}/30] not ready: {e}")
                  time.sleep(5)
          else:
              print("ERROR: SSH never came up", file=sys.stderr)
              sys.exit(1)
          PY
          echo "Sleeping 10s for SSH daemon to fully initialise..."
          sleep 10

      - name: Install dependencies on instance
        env:
          IP:   ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@$IP"
          echo "--- Core count check ---"
          NPROC=$($SSH "nproc")
          echo "  nproc: $NPROC"
          if [ "$NPROC" -lt 16 ]; then
            echo "ERROR: only $NPROC cores allocated (need >=16) -- bad offer, aborting"
            exit 1
          fi
          echo "  Core count OK ($NPROC cores)"
          echo "--- Installing apt packages (ffmpeg, libgl1) ---"
          $SSH "apt-get update -qq 2>/dev/null && apt-get install -y --no-install-recommends software-properties-common aria2 > /dev/null && add-apt-repository -y ppa:savoury1/ffmpeg4 2>/dev/null && apt-get update -qq 2>/dev/null && apt-get install -y --no-install-recommends ffmpeg libgl1 libglib2.0-0 && /usr/bin/ffmpeg -filters 2>/dev/null | grep -q v360 && echo 'v360 OK' || echo 'WARNING: v360 missing'"
          echo "--- Installing Python packages ---"
          $SSH "pip install -q --break-system-packages 'numpy<2' gdown ultralytics supervision pandas opencv-python-headless 2>/dev/null || pip install -q 'numpy<2' gdown ultralytics supervision pandas opencv-python-headless"
          echo "--- Verifying installs ---"
          $SSH "python3 -c \"import cv2, supervision, ultralytics, pandas; print('All imports OK')\""

      - name: Download .360 from Google Drive
        env:
          IP:              ${{ steps.launch.outputs.ip }}
          PORT:            ${{ steps.launch.outputs.port }}
          DRIVE_FILE_ID:   ${{ github.event.inputs.drive_file_id }}
          YOUTUBE_TOKEN:   ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          pip install -q google-auth google-auth-oauthlib google-api-python-client
          echo "$YOUTUBE_TOKEN" > /tmp/youtube_token.json
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@$IP"
          echo "--- Generating signed Drive download URL ---"
          python3 - << 'PY'
          import os, json
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build

          SCOPES = ["https://www.googleapis.com/auth/drive", "https://www.googleapis.com/auth/youtube"]
          creds = Credentials.from_authorized_user_file("/tmp/youtube_token.json", SCOPES)
          if creds.expired and creds.refresh_token:
              creds.refresh(Request())

          # Write access token to file for use in shell
          with open("/tmp/drive_token.txt", "w") as f:
              f.write(creds.token)
          print(f"Access token obtained (expires: {creds.expiry})")
          PY
          ACCESS_TOKEN=$(cat /tmp/drive_token.txt)
          FILE_ID="$DRIVE_FILE_ID"
          echo "--- Downloading source.360 from Drive to instance via aria2c ---"
          $SSH "mkdir -p /tmp/ffa_track && aria2c -x 8 -s 8 --file-allocation=none \
            --header='Authorization: Bearer $ACCESS_TOKEN' \
            --dir=/tmp/ffa_track --out=source.360 \
            'https://www.googleapis.com/drive/v3/files/$FILE_ID?alt=media' 2>&1 | tail -10"
          echo "--- Download complete ---"
          $SSH "du -sh /tmp/ffa_track/source.360"

      - name: Convert .360 to equirectangular mp4
        env:
          IP:   ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@$IP"
          echo "--- Source file info ---"
          $SSH "/usr/bin/ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1 /tmp/ffa_track/source.360 2>&1; ls -lh /tmp/ffa_track/source.360"
          echo "--- Converting .360 -> equirectangular mp4 (full file, map video only) ---"
          $SSH "/usr/bin/ffmpeg -y -i /tmp/ffa_track/source.360 -map 0:v:0 -c:v libx264 -preset ultrafast -crf 20 -movflags +faststart /tmp/ffa_track/sample.mp4 2>&1 | tail -5 && echo 'Convert done'"
          $SSH "du -sh /tmp/ffa_track/sample.mp4"
          echo "--- Video info ---"
          $SSH "/usr/bin/ffprobe -v error -select_streams v:0 -show_entries stream=width,height,r_frame_rate,duration -of default=noprint_wrappers=1 /tmp/ffa_track/sample.mp4"

      - name: Save source and clip to Google Drive
        env:
          IP:                  ${{ steps.launch.outputs.ip }}
          PORT:                ${{ steps.launch.outputs.port }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_TOKEN:       ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          pip install -q google-auth google-auth-oauthlib google-api-python-client
          echo "$YOUTUBE_CREDENTIALS" > youtube_credentials.json
          echo "$YOUTUBE_TOKEN"       > youtube_token.json
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@$IP"

          echo "--- Pulling files from instance for Drive upload ---"
          mkdir -p /tmp/drive_upload
          scp -i /tmp/vastai_key -P $PORT -o StrictHostKeyChecking=no root@$IP:/tmp/ffa_track/source.360 /tmp/drive_upload/ && echo "source.360 pulled" || echo "WARNING: source.360 pull failed"
          scp -i /tmp/vastai_key -P $PORT -o StrictHostKeyChecking=no root@$IP:/tmp/ffa_track/sample.mp4 /tmp/drive_upload/clip_trimmed.mp4 && echo "clip_trimmed.mp4 pulled" || echo "WARNING: clip pull failed"
          ls -lh /tmp/drive_upload/

          python3 - << 'PY'
          import os
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          SCOPES    = ["https://www.googleapis.com/auth/drive", "https://www.googleapis.com/auth/youtube"]
          FOLDER_ID = "1gHW29JbvUWnbvJTCC0J8O7r-O1IPZAd8"

          creds = Credentials.from_authorized_user_file("youtube_token.json", SCOPES)
          if creds.expired and creds.refresh_token:
              creds.refresh(Request())
          drive = build("drive", "v3", credentials=creds, cache_discovery=False)

          folder = drive.files().create(
              body={"name": "GS050410_source", "mimeType": "application/vnd.google-apps.folder", "parents": [FOLDER_ID]},
              fields="id"
          ).execute()
          subfolder_id = folder["id"]
          print(f"Drive subfolder: GS050410_source  id={subfolder_id}")

          upload_dir = "/tmp/drive_upload"
          for fname in sorted(os.listdir(upload_dir)):
              fpath = os.path.join(upload_dir, fname)
              if not os.path.isfile(fpath): continue
              size_mb = os.path.getsize(fpath) // (1024*1024)
              print(f"Uploading {fname} ({size_mb}MB)...")
              mime = "video/mp4" if fname.endswith(".mp4") else "application/octet-stream"
              media = MediaFileUpload(fpath, mimetype=mime, resumable=True, chunksize=10*1024*1024)
              uploaded = drive.files().create(
                  body={"name": fname, "parents": [subfolder_id]},
                  media_body=media, fields="id,name,size"
              ).execute()
              print(f"  Uploaded: {uploaded['name']}  id={uploaded['id']}")

          print(f"\nSaved at: https://drive.google.com/drive/folders/{subfolder_id}")
          PY

      - name: Flatten equirectangular to front crop
        env:
          IP:   ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@$IP"
          echo "--- Flattening equirectangular -> 120deg rectilinear crop ---"
          $SSH "/usr/bin/ffmpeg -y -i /tmp/ffa_track/sample.mp4 \
              -vf 'v360=equirect:rectilinear:ih_fov=360:iv_fov=180:h_fov=120:v_fov=80:yaw=0:pitch=0:roll=0:w=1280:h=720' \
              -c:v libx264 -preset ultrafast -crf 23 -an -movflags +faststart \
              /tmp/ffa_track/flat.mp4 2>&1 | tail -5"
          echo "--- Flatten size check ---"
          FLAT_SIZE=$($SSH "stat -c%s /tmp/ffa_track/flat.mp4 2>/dev/null || echo 0")
          echo "flat.mp4 size: $FLAT_SIZE bytes"
          if [ "$FLAT_SIZE" -lt 100000 ]; then
            echo "ERROR: flat.mp4 too small ($FLAT_SIZE bytes) -- flatten failed"
            exit 1
          fi
          echo "--- Flatten complete ($FLAT_SIZE bytes) ---"

      - name: Run YOLOv8 detection + ByteTrack
        env:
          IP:   ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@$IP"
          echo "--- Uploading tracking script ---"
          cat << 'PYEOF' | $SSH "cat > /tmp/ffa_track/run_tracker.py"
          import cv2, json, numpy as np, supervision as sv, pandas as pd
          from ultralytics import YOLO
          from collections import defaultdict

          WORKDIR  = "/tmp/ffa_track"
          INPUT    = f"{WORKDIR}/flat.mp4"
          OUT_VID  = f"{WORKDIR}/tracked.mp4"
          OUT_JSON = f"{WORKDIR}/tracking.json"

          print("Loading YOLOv8x model (downloads ~130MB on first run)...")
          model   = YOLO("yolov8x.pt")
          tracker = sv.ByteTrack()
          box_ann   = sv.BoxAnnotator(thickness=2)
          label_ann = sv.LabelAnnotator(text_scale=0.5)
          trace_ann = sv.TraceAnnotator(thickness=2, trace_length=30)

          cap   = cv2.VideoCapture(INPUT)
          fps   = cap.get(cv2.CAP_PROP_FPS)
          W     = int(cap.get(cv2.CAP_PROP_FRAME_WIDTH))
          H     = int(cap.get(cv2.CAP_PROP_FRAME_HEIGHT))
          total = int(cap.get(cv2.CAP_PROP_FRAME_COUNT))
          print(f"Input: {W}x{H} @ {fps:.1f}fps  {total} frames ({total/fps:.1f}s)")

          out = cv2.VideoWriter(OUT_VID, cv2.VideoWriter_fourcc(*"mp4v"), fps, (W, H))
          log_frames = []
          ball_raw   = {}
          frame_id   = 0

          print("Processing frames...")
          while True:
              ret, frame = cap.read()
              if not ret: break

              results    = model(frame, verbose=False, conf=0.25, classes=[0, 32])[0]
              detections = sv.Detections.from_ultralytics(results)

              ball_dets   = detections[detections.class_id == 32]
              player_dets = detections[detections.class_id == 0]
              player_dets = tracker.update_with_detections(player_dets)

              ball_pos = None
              if len(ball_dets) > 0:
                  best = int(np.argmax(ball_dets.confidence))
                  x1,y1,x2,y2 = ball_dets.xyxy[best]
                  cx,cy = (x1+x2)/2, (y1+y2)/2
                  ball_pos = (float(cx), float(cy), float(ball_dets.confidence[best]))
                  ball_raw[frame_id] = ball_pos

              players = []
              for i in range(len(player_dets)):
                  x1,y1,x2,y2 = player_dets.xyxy[i]
                  tid = int(player_dets.tracker_id[i]) if player_dets.tracker_id is not None else -1
                  players.append({
                      "track_id": tid,
                      "cx": round(float((x1+x2)/2), 1),
                      "cy": round(float((y1+y2)/2), 1),
                      "conf": round(float(player_dets.confidence[i]), 3)
                  })

              log_frames.append({
                  "frame": frame_id, "time_s": round(frame_id/fps, 3),
                  "ball": list(ball_pos) if ball_pos else None,
                  "players": players
              })

              labels = [f"P{int(t)}" for t in (player_dets.tracker_id or [])]
              frame  = trace_ann.annotate(frame, player_dets)
              frame  = box_ann.annotate(frame, player_dets)
              frame  = label_ann.annotate(frame, player_dets, labels=labels)
              if ball_pos:
                  frame = box_ann.annotate(frame, ball_dets)
                  cv2.circle(frame, (int(ball_pos[0]), int(ball_pos[1])), 10, (0,255,0), -1)

              out.write(frame)
              frame_id += 1
              if frame_id % 50 == 0:
                  print(f"  frame {frame_id}/{total} ({100*frame_id//total}%)  ball_detections={len(ball_raw)}")

          cap.release(); out.release()
          print(f"\nDetection complete: ball seen in {len(ball_raw)}/{total} frames ({100*len(ball_raw)//total}%)")

          if ball_raw:
              detected = sorted(ball_raw.keys())
              cx_s = pd.Series({f: ball_raw[f][0] for f in detected})
              cy_s = pd.Series({f: ball_raw[f][1] for f in detected})
              idx  = pd.RangeIndex(total)
              cx_i = cx_s.reindex(idx).interpolate("linear", limit=90)
              cy_i = cy_s.reindex(idx).interpolate("linear", limit=90)
              interp_count = 0
              for entry in log_frames:
                  fr = entry["frame"]
                  if entry["ball"] is None:
                      cx_v = cx_i.get(fr)
                      cy_v = cy_i.get(fr)
                      if cx_v is not None and not np.isnan(float(cx_v)):
                          entry["ball_interp"] = [round(float(cx_v),1), round(float(cy_v),1)]
                          interp_count += 1
              print(f"Interpolated ball position for {interp_count} frames")

          history = defaultdict(dict)
          for entry in log_frames:
              for p in entry["players"]:
                  history[p["track_id"]][entry["frame"]] = (p["cx"], p["cy"])
          facing_count = 0
          for entry in log_frames:
              for p in entry["players"]:
                  tid, fr = p["track_id"], entry["frame"]
                  past   = history[tid].get(fr - 6)
                  future = history[tid].get(fr + 6)
                  if past and future:
                      dx, dy = future[0]-past[0], future[1]-past[1]
                      p["facing_deg"] = round(float(np.degrees(np.arctan2(-dy, dx))), 1)
                      facing_count += 1
          print(f"Player facing computed for {facing_count} player-frames")

          with open(OUT_JSON, "w") as f:
              json.dump({
                  "meta": {
                      "total_frames": total, "fps": fps, "resolution": [W, H],
                      "ball_detected_frames": len(ball_raw),
                      "ball_detection_rate": round(len(ball_raw)/total, 3)
                  },
                  "frames": log_frames
              }, f, indent=2)

          import os
          print(f"\nOutputs:")
          print(f"  tracked.mp4   : {os.path.getsize(OUT_VID)//1024}KB")
          print(f"  tracking.json : {os.path.getsize(OUT_JSON)//1024}KB")
          PYEOF
          echo "--- Running tracker (YOLOv8x model download + inference) ---"
          $SSH "cd /tmp/ffa_track && python3 run_tracker.py"

      - name: Pull results from instance
        env:
          IP:   ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          mkdir -p tracking_output
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@$IP"
          echo "--- Checking output files on instance ---"
          $SSH "ls -lh /tmp/ffa_track/tracked.mp4 /tmp/ffa_track/tracking.json 2>/dev/null || echo 'WARNING: some outputs missing'"
          echo "--- Pulling tracked.mp4 ---"
          scp -i /tmp/vastai_key -P $PORT -o StrictHostKeyChecking=no \
              root@$IP:/tmp/ffa_track/tracked.mp4 tracking_output/ && echo "tracked.mp4 pulled OK" || echo "WARNING: tracked.mp4 pull failed"
          echo "--- Pulling tracking.json ---"
          scp -i /tmp/vastai_key -P $PORT -o StrictHostKeyChecking=no \
              root@$IP:/tmp/ffa_track/tracking.json tracking_output/ && echo "tracking.json pulled OK" || echo "WARNING: tracking.json pull failed"
          echo "--- Local outputs ---"
          ls -lh tracking_output/

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tracking-results-${{ github.run_id }}
          path: tracking_output/
          retention-days: 7

      - name: Upload results to Google Drive
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_TOKEN:       ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          pip install -q google-auth google-auth-oauthlib google-api-python-client
          echo "$YOUTUBE_CREDENTIALS" > youtube_credentials.json
          echo "$YOUTUBE_TOKEN"       > youtube_token.json
          python3 - << 'PY'
          import os
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          SCOPES    = ["https://www.googleapis.com/auth/drive", "https://www.googleapis.com/auth/youtube"]
          FOLDER_ID = "1gHW29JbvUWnbvJTCC0J8O7r-O1IPZAd8"

          creds = Credentials.from_authorized_user_file("youtube_token.json", SCOPES)
          if creds.expired and creds.refresh_token:
              creds.refresh(Request())
          drive = build("drive", "v3", credentials=creds, cache_discovery=False)

          run_id = os.environ.get("GITHUB_RUN_ID", "unknown")
          folder = drive.files().create(
              body={"name": f"tracking-run-{run_id}", "mimeType": "application/vnd.google-apps.folder", "parents": [FOLDER_ID]},
              fields="id"
          ).execute()
          subfolder_id = folder["id"]
          print(f"Created Drive subfolder: tracking-run-{run_id}  id={subfolder_id}")

          output_dir = "tracking_output"
          for fname in sorted(os.listdir(output_dir)):
              fpath = os.path.join(output_dir, fname)
              if not os.path.isfile(fpath): continue
              mime = "video/mp4" if fname.endswith(".mp4") else "application/json"
              media    = MediaFileUpload(fpath, mimetype=mime, resumable=True)
              uploaded = drive.files().create(
                  body={"name": fname, "parents": [subfolder_id]},
                  media_body=media, fields="id,name,size"
              ).execute()
              size_kb = int(uploaded.get("size", 0)) // 1024
              print(f"  Uploaded: {uploaded['name']} ({size_kb}KB)  id={uploaded['id']}")

          print(f"\nAll outputs at: https://drive.google.com/drive/folders/{subfolder_id}")
          PY

      - name: Terminate Vast.ai instance
        if: always()
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
          INSTANCE_ID:  ${{ steps.launch.outputs.instance_id }}
        run: |
          python3 - << 'PY'
          import os, urllib.request, json
          API_KEY     = os.environ["VAST_API_KEY"]
          instance_id = os.environ.get("INSTANCE_ID", "")
          if not instance_id:
              print("No instance ID -- nothing to terminate")
              exit(0)
          headers = {"Authorization": f"Bearer {API_KEY}", "Content-Type": "application/json"}
          req = urllib.request.Request(
              f"https://console.vast.ai/api/v0/instances/{instance_id}/",
              method="DELETE", headers=headers)
          try:
              urllib.request.urlopen(req, timeout=15)
              print(f"Instance {instance_id} terminated OK")
          except Exception as e:
              print(f"Terminate call failed (may already be gone): {e}")
          PY
