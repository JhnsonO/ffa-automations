name: Kill Stuck Instances Now (one-off)
on:
  workflow_dispatch:
jobs:
  kill:
    runs-on: ubuntu-latest
    steps:
      - name: Terminate stuck instances
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request, urllib.error
          API_KEY = os.environ["VAST_API_KEY"]
          headers = {"Authorization": f"Bearer {API_KEY}", "Accept": "application/json"}
          for iid in ["43357156", "43367575"]:
              for url in [
                  f"https://console.vast.ai/api/v0/instances/{iid}/",
                  f"https://cloud.vast.ai/api/v0/instances/{iid}/",
                  f"https://cloud.vast.ai/api/v1/instances/{iid}/",
              ]:
                  req = urllib.request.Request(url, method="DELETE", headers=headers)
                  try:
                      with urllib.request.urlopen(req, timeout=20) as r:
                          print(f"Terminated {iid} via {url}: {json.loads(r.read())}")
                      break
                  except urllib.error.HTTPError as e:
                      print(f"  {iid} {url} -> HTTP {e.code}: {e.read().decode()[:200]}")
                  except Exception as e:
                      print(f"  {iid} {url} -> error: {e}")
          PY
