name: Clip Extractor

# Reads pending clips from the FFA Google Sheet, cuts them from the source
# YouTube video, uploads to Google Drive and writes the link back to the sheet.
# Triggered manually or on a schedule (every 6 hours).

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  process:
    runs-on: self-hosted
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -U google-auth google-auth-httplib2 google-api-python-client jinja2
          # Install Deno for yt-dlp JS challenge solving
          curl -fsSL https://deno.land/install.sh | sh -s -- -y
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          export PATH="$HOME/.deno/bin:$PATH"
          deno --version
          # Install latest yt-dlp (no sudo — self-hosted runner)
          mkdir -p $HOME/.local/bin
          curl -sL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o $HOME/.local/bin/yt-dlp
          chmod a+rx $HOME/.local/bin/yt-dlp
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          yt-dlp --version

      - name: Write credentials
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          python -c "import os; open('youtube_token.json','w').write(os.environ['YOUTUBE_TOKEN'])"
          python -c "import os; open('youtube_credentials.json','w').write(os.environ['YOUTUBE_CREDENTIALS'])"
          python -c "import os; open('yt_cookies.txt','w').write(os.environ['YOUTUBE_COOKIES'])"
          echo "Token: $(wc -c < youtube_token.json) bytes"
          echo "Cookies: $(wc -c < yt_cookies.txt) bytes"

      - name: Clean up tmp before run
        run: rm -rf /tmp/clip_* /tmp/source* /tmp/ffa_* || true

      - name: Process pending clips
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CHROME_PROFILE_PATH: /home/runner/.config/chrome-ffa
        run: python -u sheet_manager.py process-clips

      - name: Clean up tmp after run
        if: always()
        run: rm -rf /tmp/clip_* /tmp/source* /tmp/ffa_* || true
