name: Clip Extractor

# Reads pending clips from the FFA Google Sheet, cuts them from the source
# YouTube video, uploads to Google Drive and writes the link back to the sheet.
# Triggered manually or on a schedule (every 6 hours).

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install -U yt-dlp google-auth google-auth-httplib2 google-api-python-client

      - name: Process pending clips
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: python sheet_manager.py process-clips
