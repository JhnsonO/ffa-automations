name: 360 Modern YOLO Football Benchmark

on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Run notes (optional)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg aria2
          python -m pip install --upgrade pip
          pip install ultralytics huggingface_hub opencv-python-headless numpy pillow

      - name: Get Drive access token
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          token_data=json.loads(os.environ['YOUTUBE_TOKEN']); creds=json.loads(os.environ['YOUTUBE_CREDENTIALS'])
          payload=json.dumps({'client_id':token_data.get('client_id') or creds['installed']['client_id'],'client_secret':token_data.get('client_secret') or creds['installed']['client_secret'],'refresh_token':token_data['refresh_token'],'grant_type':'refresh_token'}).encode()
          req=urllib.request.Request(token_data.get('token_uri','https://oauth2.googleapis.com/token'),data=payload,headers={'Content-Type':'application/json'},method='POST')
          data=json.loads(urllib.request.urlopen(req).read())
          if 'access_token' not in data: raise RuntimeError(data)
          open('/tmp/drive_access_token.txt','w').write(data['access_token'])
          print('Drive token refreshed')
          PY

      - name: Download source video
        run: |
          mkdir -p source_video
          aria2c -q -x 4 -s 4 --file-allocation=none --header="Authorization: Bearer $(cat /tmp/drive_access_token.txt)" --dir=source_video --out=gopro_max_equirect.mp4 "https://www.googleapis.com/drive/v3/files/1z2p2FgLsjgvIIBw0HZXWEenckMLWpVNX?alt=media"
          ffprobe -v error -select_streams v:0 -show_entries stream=width,height -of default=noprint_wrappers=1 source_video/gopro_max_equirect.mp4

      - name: Download Stage 1d and Tier A tracklets artifacts
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p artifacts/stage1d artifacts/stage2
          python - <<'PY'
          import io, os, sys, urllib.request, urllib.error, zipfile
          token=os.environ['GH_PAT']
          def download(artifact_id, dest):
              class NoRedirect(urllib.request.HTTPRedirectHandler):
                  def redirect_request(self, req, fp, code, msg, headers, newurl): return None
              req=urllib.request.Request(f'https://api.github.com/repos/JhnsonO/ffa-automations/actions/artifacts/{artifact_id}/zip',headers={'Authorization':f'Bearer {token}','Accept':'application/vnd.github+json'})
              try:
                  urllib.request.build_opener(NoRedirect()).open(req)
                  raise RuntimeError('No redirect returned')
              except urllib.error.HTTPError as exc:
                  url=exc.headers.get('Location')
              if not url: raise RuntimeError(f'No redirect for {artifact_id}')
              with urllib.request.urlopen(urllib.request.Request(url)) as response: raw=response.read()
              zipfile.ZipFile(io.BytesIO(raw)).extractall(dest)
              print(artifact_id, os.listdir(dest))
          download('7834602065','artifacts/stage1d')
          download('7846400233','artifacts/stage2')
          required=['artifacts/stage1d/stage1_candidates_geo_filtered.json','artifacts/stage2/tracklets_tier_a_experimental.json']
          missing=[x for x in required if not os.path.exists(x)]
          if missing: raise RuntimeError(f'Missing extracted inputs: {missing}')
          PY

      - name: Run benchmark
        run: |
          python ball_tracker/experiments/modern_yolo_benchmark.py \
            --video source_video/gopro_max_equirect.mp4 \
            --candidates artifacts/stage1d/stage1_candidates_geo_filtered.json \
            --tracklets artifacts/stage2/tracklets_tier_a_experimental.json \
            --output-dir benchmark_output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: modern-yolo-benchmark
          path: benchmark_output/
          retention-days: 14
