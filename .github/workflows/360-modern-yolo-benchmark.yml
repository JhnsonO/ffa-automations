name: 360 Modern YOLO Football Benchmark

on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Run notes (optional)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg aria2
          python -m pip install --upgrade pip
          pip install ultralytics huggingface_hub opencv-python-headless numpy pillow

      - name: Get Drive access token
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          token_data=json.loads(os.environ['YOUTUBE_TOKEN']); creds=json.loads(os.environ['YOUTUBE_CREDENTIALS'])
          payload=json.dumps({'client_id':token_data.get('client_id') or creds['installed']['client_id'],'client_secret':token_data.get('client_secret') or creds['installed']['client_secret'],'refresh_token':token_data['refresh_token'],'grant_type':'refresh_token'}).encode()
          req=urllib.request.Request(token_data.get('token_uri','https://oauth2.googleapis.com/token'),data=payload,headers={'Content-Type':'application/json'},method='POST')
          data=json.loads(urllib.request.urlopen(req).read())
          if 'access_token' not in data: raise RuntimeError(data)
          open('/tmp/drive_access_token.txt','w').write(data['access_token'])
          print('Drive token refreshed')
          PY

      - name: Download source video
        run: |
          mkdir -p source_video
          aria2c -q -x 4 -s 4 --file-allocation=none --header="Authorization: Bearer $(cat /tmp/drive_access_token.txt)" --dir=source_video --out=gopro_max_equirect.mp4 "https://www.googleapis.com/drive/v3/files/1z2p2FgLsjgvIIBw0HZXWEenckMLWpVNX?alt=media"
          ffprobe -v error -select_streams v:0 -show_entries stream=width,height -of default=noprint_wrappers=1 source_video/gopro_max_equirect.mp4

      - name: Resolve and download current Stage 1d artifact
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p artifacts/stage1d
          python - <<'PY'
          import io, json, os, sys, urllib.error, urllib.request, zipfile
          token=os.environ['GH_PAT']
          headers={'Authorization':f'Bearer {token}','Accept':'application/vnd.github+json'}
          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl): return None
          def artifact_zip(artifact_id):
              req=urllib.request.Request(f'https://api.github.com/repos/JhnsonO/ffa-automations/actions/artifacts/{artifact_id}/zip',headers=headers)
              try:
                  urllib.request.build_opener(NoRedirect()).open(req)
              except urllib.error.HTTPError as exc:
                  location=exc.headers.get('Location')
                  if location:
                      with urllib.request.urlopen(urllib.request.Request(location)) as r: return r.read()
              raise RuntimeError(f'No redirect for artifact {artifact_id}')
          # Search newest non-expired artifacts by name, then validate the actual JSON filename.
          with urllib.request.urlopen(urllib.request.Request('https://api.github.com/repos/JhnsonO/ffa-automations/actions/artifacts?per_page=100',headers=headers)) as r:
              artifacts=json.loads(r.read()).get('artifacts',[])
          candidates=[a for a in artifacts if not a.get('expired') and 'stage1d' in a.get('name','').lower()]
          for artifact in candidates:
              try:
                  raw=artifact_zip(artifact['id'])
                  with zipfile.ZipFile(io.BytesIO(raw)) as z:
                      names=z.namelist()
                      match=next((n for n in names if n.endswith('stage1_candidates_geo_filtered.json')),None)
                      if not match: continue
                      z.extract(match,'artifacts/stage1d')
                      src=os.path.join('artifacts/stage1d',match)
                      dst='artifacts/stage1d/stage1_candidates_geo_filtered.json'
                      os.makedirs(os.path.dirname(dst),exist_ok=True)
                      if src!=dst: os.replace(src,dst)
                      print(f"Resolved Stage 1d artifact {artifact['id']}: {artifact['name']}")
                      break
              except Exception as exc:
                  print(f"Skipping artifact {artifact['id']}: {exc}")
          else:
              raise RuntimeError('No live Stage 1d artifact containing stage1_candidates_geo_filtered.json was found')
          PY

      - name: Download Tier A tracklets artifact
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p artifacts/stage2
          python - <<'PY'
          import io, os, urllib.error, urllib.request, zipfile
          token=os.environ['GH_PAT']; headers={'Authorization':f'Bearer {token}','Accept':'application/vnd.github+json'}
          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl): return None
          req=urllib.request.Request('https://api.github.com/repos/JhnsonO/ffa-automations/actions/artifacts/7846400233/zip',headers=headers)
          try: urllib.request.build_opener(NoRedirect()).open(req)
          except urllib.error.HTTPError as exc: url=exc.headers.get('Location')
          if not url: raise RuntimeError('No redirect for Tier A artifact')
          with urllib.request.urlopen(urllib.request.Request(url)) as r: raw=r.read()
          zipfile.ZipFile(io.BytesIO(raw)).extractall('artifacts/stage2')
          assert os.path.exists('artifacts/stage2/tracklets_tier_a_experimental.json')
          PY

      - name: Run benchmark
        run: |
          python ball_tracker/experiments/modern_yolo_benchmark.py \
            --video source_video/gopro_max_equirect.mp4 \
            --candidates artifacts/stage1d/stage1_candidates_geo_filtered.json \
            --tracklets artifacts/stage2/tracklets_tier_a_experimental.json \
            --output-dir benchmark_output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: modern-yolo-benchmark
          path: benchmark_output/
          retention-days: 14
