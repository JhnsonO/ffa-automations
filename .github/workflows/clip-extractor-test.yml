name: clip-extractor-test

on:
  workflow_dispatch:

jobs:
  process:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/fast-clip-extraction

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install -U google-auth google-auth-httplib2 google-api-python-client jinja2
          mkdir -p $HOME/.local/bin
          curl -sL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o $HOME/.local/bin/yt-dlp
          chmod a+rx $HOME/.local/bin/yt-dlp
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          if [ ! -f "$HOME/.deno/bin/deno" ]; then
            curl -fsSL https://deno.land/install.sh | sh -s -- -y
          fi
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          $HOME/.local/bin/yt-dlp --version
          $HOME/.deno/bin/deno --version

      - name: Write credentials
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "$YOUTUBE_TOKEN" > youtube_token.json
          echo "$YOUTUBE_CREDENTIALS" > youtube_credentials.json

      - name: Clean up tmp before run
        run: rm -rf /tmp/clip_* /tmp/source* /tmp/ffa_* || true

      - name: Copy cookies from Vultr
        run: |
          sudo cp /root/yt_cookies_permanent.txt $GITHUB_WORKSPACE/yt_cookies.txt
          sudo chown runner:runner $GITHUB_WORKSPACE/yt_cookies.txt
          sudo chmod 666 $GITHUB_WORKSPACE/yt_cookies.txt
          echo "Cookies ready — $(wc -l < $GITHUB_WORKSPACE/yt_cookies.txt) lines"

      - name: Process pending clips
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          YOUTUBE_COOKIES_FILE: ${{ github.workspace }}/yt_cookies.txt
        run: python3 -u sheet_manager.py process-clips

      - name: Clean up tmp after run
        if: always()
        run: rm -rf /tmp/clip_* /tmp/source* /tmp/ffa_* || true
