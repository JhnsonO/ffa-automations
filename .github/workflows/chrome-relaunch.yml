name: Chrome FFA Relaunch (VM)

on:
  workflow_dispatch:

concurrency:
  group: chrome-ffa-relaunch
  cancel-in-progress: false

jobs:
  relaunch:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Inspect, clean, install watchdog, verify Chrome up
        run: |
          set +e
          echo "===== INSPECTION ====="
          echo "-- Xvfb :99 --"
          sudo -n ps -eo pid,user,args | grep -E "Xvfb.*:99" | grep -v grep
          echo "-- existing chrome procs --"
          sudo -n ps -eo pid,user,args | grep -Ei "chrome|chromium" | grep -v grep
          CHROME=$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser || command -v chromium)
          echo "chrome binary: $CHROME"
          echo "-- profile Default listing --"
          sudo -n ls -la /root/.config/chrome-ffa/Default/ 2>/dev/null | grep -Ei "Cookies|Singleton|Preferences"

          echo "===== WRITE WATCHDOG ====="
          echo "" | base64 -d | sudo -n tee /root/chrome_ffa_watchdog.sh >/dev/null
          sudo -n chmod +x /root/chrome_ffa_watchdog.sh
          echo "written:"; sudo -n head -n 3 /root/chrome_ffa_watchdog.sh

          echo "===== BACK UP DEAD COOKIES ====="
          sudo -n bash -c 'f=/root/.config/chrome-ffa/Default/Cookies; if [ -f "$f" ]; then cp -a "$f" "${f}.broken.$(date +%s)" && echo "backed up $f"; else echo "no Cookies file present"; fi'

          echo "===== INSTALL ROOT CRON WATCHDOG ====="
          sudo -n bash -c '
            tmp=$(mktemp)
            crontab -l 2>/dev/null | grep -v chrome_ffa_watchdog > "$tmp"
            echo "* * * * * /root/chrome_ffa_watchdog.sh >> /tmp/chrome_ffa_watchdog.cron.log 2>&1" >> "$tmp"
            echo "@reboot sleep 25 && /root/chrome_ffa_watchdog.sh >> /tmp/chrome_ffa_watchdog.cron.log 2>&1" >> "$tmp"
            crontab "$tmp" && rm -f "$tmp"
            echo "installed cron lines:"; crontab -l | grep chrome_ffa_watchdog
          '

          echo "===== WAIT FOR CRON TO SPAWN CHROME (survives job cleanup) ====="
          up=""
          for i in $(seq 1 80); do
            if sudo -n bash -c 'curl -s --max-time 2 http://localhost:9222/json/version' 2>/dev/null | grep -qi "Browser"; then up="port"; break; fi
            if sudo -n pgrep -f "user-data-dir=/root/.config/chrome-ffa" >/dev/null 2>&1; then up="proc"; fi
            sleep 2
          done

          echo "===== VERIFICATION ====="
          echo "up=$up"
          echo "-- chrome procs now --"
          sudo -n ps -eo pid,user,etimes,args | grep -Ei "chrome" | grep -v grep | head
          echo "-- debug endpoint --"
          sudo -n bash -c 'curl -s --max-time 3 http://localhost:9222/json/version' 2>/dev/null || echo "(no debug port response)"
          echo "-- launch log tail --"
          sudo -n tail -n 15 /tmp/chrome_ffa.log 2>/dev/null
          echo "-- cron log tail --"
          sudo -n tail -n 10 /tmp/chrome_ffa_watchdog.cron.log 2>/dev/null

          if [ -n "$up" ]; then echo "RESULT: CHROME_UP"; else echo "RESULT: CHROME_NOT_CONFIRMED"; fi
