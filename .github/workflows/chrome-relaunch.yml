name: Chrome FFA Relaunch (VM)

on:
  workflow_dispatch:

concurrency:
  group: chrome-ffa-relaunch
  cancel-in-progress: false

jobs:
  relaunch:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Clean, install watchdog, verify Chrome up
        run: |
          set +e
          echo "===== KILL ANY DEAD/STRAY CHROME FOR THIS PROFILE ====="
          sudo -n pkill -f "user-data-dir=/root/.config/chrome-ffa" 2>/dev/null; sleep 2

          echo "===== WRITE CORRECTED WATCHDOG ====="
          echo "" | base64 -d | sudo -n tee /root/chrome_ffa_watchdog.sh >/dev/null
          sudo -n chmod +x /root/chrome_ffa_watchdog.sh
          sudo -n grep -c "no-sandbox" /root/chrome_ffa_watchdog.sh

          echo "===== (RE)INSTALL ROOT CRON WATCHDOG ====="
          sudo -n bash -c '
            tmp=$(mktemp)
            crontab -l 2>/dev/null | grep -v chrome_ffa_watchdog > "$tmp"
            echo "* * * * * /root/chrome_ffa_watchdog.sh >> /tmp/chrome_ffa_watchdog.cron.log 2>&1" >> "$tmp"
            echo "@reboot sleep 25 && /root/chrome_ffa_watchdog.sh >> /tmp/chrome_ffa_watchdog.cron.log 2>&1" >> "$tmp"
            crontab "$tmp" && rm -f "$tmp"
            crontab -l | grep chrome_ffa_watchdog
          '

          echo "===== KICK ONCE VIA CRON PATH + WAIT FOR REAL LIVENESS (debug port) ====="
          up=""
          for i in $(seq 1 80); do
            if sudo -n bash -c 'curl -s --max-time 2 http://localhost:9222/json/version' 2>/dev/null | grep -qi "Browser"; then up="port"; break; fi
            sleep 2
          done

          echo "===== VERIFICATION ====="
          echo "up=$up"
          echo "-- chrome procs (with age) --"
          sudo -n ps -eo pid,user,etimes,args | grep -Ei "google-chrome" | grep -v grep | head
          echo "-- debug endpoint --"
          sudo -n bash -c 'curl -s --max-time 3 http://localhost:9222/json/version' 2>/dev/null || echo "(no debug port response)"
          echo "-- launch log tail --"
          sudo -n tail -n 15 /tmp/chrome_ffa.log 2>/dev/null
          if [ "$up" = "port" ]; then echo "RESULT: CHROME_UP_CONFIRMED"; else echo "RESULT: CHROME_NOT_CONFIRMED"; fi
