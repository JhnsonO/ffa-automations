name: Apply uploader patch

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/patch_uploader_progress_and_labels.py'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Apply patch script
        run: python3 scripts/patch_uploader_progress_and_labels.py

      - name: Syntax check
        run: python3 -m py_compile gopro_uploader.py

      - name: Commit patched uploader
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gopro_uploader.py
          if git diff --staged --quiet; then
            echo "No uploader changes to commit"
            exit 0
          fi
          git commit -m "chore: improve uploader progress logs and camera labels"
          git push origin HEAD:main
