name: Debug Vast Instances
on:
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Execute finish command
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request, urllib.error
          API_KEY = os.environ["VAST_API_KEY"]
          headers = {"Authorization": f"Bearer {API_KEY}", "Accept": "application/json", "Content-Type": "application/json"}
          iid = 40823599

          body = json.dumps({}).encode()
          for url in [
              f"https://console.vast.ai/api/v0/instances/reboot/{iid}/",
              f"https://cloud.vast.ai/api/v1/instances/reboot/{iid}/",
          ]:
              req = urllib.request.Request(url, data=body, method="PUT", headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=20) as r:
                      print(f"{url}: HTTP {r.status} {r.read().decode()}")
              except urllib.error.HTTPError as e:
                  print(f"{url}: HTTP {e.code} {e.read().decode()[:200]}")
          PY
