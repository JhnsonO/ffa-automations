name: Debug Vast Instances

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Try multiple endpoint variants
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request, urllib.error

          API_KEY = os.environ["VAST_API_KEY"]

          attempts = [
              ("cloud.vast.ai bearer",  "https://cloud.vast.ai/api/v0/instances/", {"Authorization": f"Bearer {API_KEY}", "Accept": "application/json"}),
              ("cloud.vast.ai apikey param", f"https://cloud.vast.ai/api/v0/instances/?api_key={API_KEY}", {"Accept": "application/json"}),
              ("console.vast.ai bearer", "https://console.vast.ai/api/v0/instances/", {"Authorization": f"Bearer {API_KEY}", "Accept": "application/json"}),
              ("console.vast.ai apikey param", f"https://console.vast.ai/api/v0/instances/?api_key={API_KEY}", {"Accept": "application/json"}),
          ]

          for name, url, hdrs in attempts:
              print(f"--- {name} ---")
              try:
                  req = urllib.request.Request(url, headers=hdrs)
                  with urllib.request.urlopen(req, timeout=15) as r:
                      body = r.read().decode()
                      print(f"  HTTP {r.status}")
                      print(f"  {body[:300]}")
              except urllib.error.HTTPError as e:
                  print(f"  HTTP {e.code}: {e.read().decode()[:300]}")
              except Exception as e:
                  print(f"  ERROR: {e}")
              print()
          PY
