name: Debug Vast Instances
on:
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Execute finish command
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request, urllib.error
          API_KEY = os.environ["VAST_API_KEY"]
          headers = {"Authorization": f"Bearer {API_KEY}", "Accept": "application/json", "Content-Type": "application/json"}
          iid = 40823599

          req = urllib.request.Request("https://cloud.vast.ai/api/v1/instances/", headers=headers)
          with urllib.request.urlopen(req, timeout=15) as r:
              d = json.loads(r.read())
          for inst in d.get("instances", []):
              if inst["id"] == iid:
                  print("status:", inst.get("actual_status"), "ssh_host:", inst.get("ssh_host"), "ssh_port:", inst.get("ssh_port"), "public_ip:", inst.get("public_ipaddr"))
          PY
