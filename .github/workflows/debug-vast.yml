name: Debug Vast Instances

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Terminate leaked instance 40642710
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request, urllib.error

          API_KEY = os.environ["VAST_API_KEY"]
          headers = {"Authorization": f"Bearer {API_KEY}", "Accept": "application/json"}

          req = urllib.request.Request(
              "https://cloud.vast.ai/api/v1/instances/40642710/",
              method="DELETE", headers=headers
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f"HTTP {r.status}: {r.read().decode()}")
          except urllib.error.HTTPError as e:
              print(f"HTTP {e.code}: {e.read().decode()}")
          PY
