name: Debug Vast Instances
on:
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Execute finish command
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request, urllib.error
          API_KEY = os.environ["VAST_API_KEY"]
          headers = {"Authorization": f"Bearer {API_KEY}", "Accept": "application/json", "Content-Type": "application/json"}
          iid = 40823599

          cmd = (
              "cd /tmp/ffa360 && "
              "(ffprobe -v error -show_entries format=duration -of csv=p=0 output.equirect.mp4 "
              " || (ffmpeg -y -i output.equirect.mp4 -c copy -movflags +faststart output.repaired.mp4 "
              "      && mv output.repaired.mp4 output.equirect.mp4)) && "
              "cp output.equirect.mp4 output.final.mp4 && "
              "exiftool -api LargeFileSupport=1 -overwrite_original "
              " -XMP-GSpherical:Spherical=true -XMP-GSpherical:Stitched=true "
              " -XMP-GSpherical:StitchingSoftware=FFmpeg -XMP-GSpherical:ProjectionType=equirectangular "
              " output.final.mp4 && "
              "ls -la output.final.mp4 && "
              "curl -sS -F'file=@output.final.mp4' https://0x0.st"
          )

          body = json.dumps({"command": cmd}).encode()
          req = urllib.request.Request(f"https://console.vast.ai/api/v0/instances/command/{iid}/", data=body, method="PUT", headers=headers)
          try:
              with urllib.request.urlopen(req, timeout=20) as r:
                  print(f"HTTP {r.status} {r.read().decode()}")
          except urllib.error.HTTPError as e:
              print(f"HTTP {e.code} {e.read().decode()}")
          PY
