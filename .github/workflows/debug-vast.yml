name: Debug Vast Instances
on:
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Terminate leaked instances
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          API_KEY = os.environ["VAST_API_KEY"]
          headers = {"Authorization": f"Bearer {API_KEY}", "Accept": "application/json"}
          for iid in [40643535, 40647270, 40647582]:
              req = urllib.request.Request(f"https://cloud.vast.ai/api/v1/instances/{iid}/", method="DELETE", headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      print(f"id={iid}: HTTP {r.status} {r.read().decode()}")
              except urllib.error.HTTPError as e:
                  print(f"id={iid}: HTTP {e.code} {e.read().decode()}")

          # Re-list to confirm
          import time
          time.sleep(2)
          req = urllib.request.Request("https://cloud.vast.ai/api/v1/instances/", headers=headers)
          with urllib.request.urlopen(req, timeout=15) as r:
              data = json.loads(r.read())
          print(f"\\nRemaining instances: {data.get('total_instances')}")
          for inst in data.get("instances", []):
              print(f"  id={inst['id']} status={inst['actual_status']}")
          PY
