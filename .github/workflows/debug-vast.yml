name: Debug Vast Instances

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Terminate instance 40643535
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request

          API_KEY = os.environ["VAST_API_KEY"]
          headers = {"Authorization": f"Bearer {API_KEY}", "Accept": "application/json"}
          req = urllib.request.Request("https://cloud.vast.ai/api/v1/instances/40643535/", method="DELETE", headers=headers)
          with urllib.request.urlopen(req, timeout=15) as r:
              print(f"HTTP {r.status}: {r.read().decode()}")
          PY
