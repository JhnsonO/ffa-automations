name: Debug Vast Instances
on:
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Attach SSH key to instance
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          API_KEY = os.environ["VAST_API_KEY"]
          headers = {"Authorization": f"Bearer {API_KEY}", "Accept": "application/json", "Content-Type": "application/json"}
          pubkey = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILmtQvIxOA1cwx9Xl9/lrXVRAxXVK+EbVIPABG4UQ+0Z root@vm"
          iid = 40823599

          body = json.dumps({"ssh_key": pubkey}).encode()
          req = urllib.request.Request(f"https://cloud.vast.ai/api/v1/instances/{iid}/ssh/", data=body, method="POST", headers=headers)
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f"POST ssh/: HTTP {r.status} {r.read().decode()}")
          except urllib.error.HTTPError as e:
              print(f"POST ssh/: HTTP {e.code} {e.read().decode()}")
          PY
