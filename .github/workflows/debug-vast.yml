name: Debug Vast Instances
on:
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Execute finish command
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request, urllib.error
          API_KEY = os.environ["VAST_API_KEY"]
          headers = {"Authorization": f"Bearer {API_KEY}", "Accept": "application/json", "Content-Type": "application/json"}
          iid = 40823599

          req = urllib.request.Request(f"https://cloud.vast.ai/api/v1/instances/{iid}/", method="DELETE", headers=headers)
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f"Terminated {iid}: HTTP {r.status} {r.read().decode()}")
          except urllib.error.HTTPError as e:
              print(f"Terminate {iid}: HTTP {e.code} {e.read().decode()}")
          PY
