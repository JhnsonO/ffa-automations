name: VNC Auth Check (temporary)

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Inspect live x11vnc process + auth log
        run: |
          echo "=== current x11vnc process(es) ==="
          pgrep -af x11vnc || echo "no x11vnc running right now"
          echo ""
          echo "=== exact cmdline of running x11vnc (null-safe) ==="
          for p in $(pgrep -f "x11vnc.*-display :99"); do
            echo "--- pid $p ---"
            tr '\0' ' ' < /proc/$p/cmdline; echo
          done
          echo ""
          echo "=== passwd file that's actually being pointed to ==="
          ls -la "$HOME/.vnc/passwd" 2>&1
          echo "md5: $(md5sum "$HOME/.vnc/passwd" 2>&1)"
          echo ""
          echo "=== x11vnc's own log tail ==="
          tail -n 60 "$HOME/.x11vnc.log" 2>&1 || echo "no log file found"
          echo ""
          echo "=== crontab HOME resolution check ==="
          crontab -l | head -5

      - name: Regenerate all-digit password and restart x11vnc
        run: |
          NEWPASS="$(shuf -i 10000000-99999999 -n1)"
          x11vnc -storepasswd "$NEWPASS" "$HOME/.vnc/passwd"
          echo "NEW_ALL_DIGIT_PASSWORD=$NEWPASS"
          pkill -f "x11vnc.*-display :99" || true
          sleep 2
          bash "$HOME/x11vnc_watchdog.sh"
          sleep 2
          echo "=== confirm restarted with new pid ==="
          pgrep -af "x11vnc.*-display :99"
          ss -tlnp 2>/dev/null | grep 5900 || sudo ss -tlnp | grep 5900
