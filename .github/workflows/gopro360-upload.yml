name: Upload GoPro 360 Session (Vast.ai)

on:
  workflow_dispatch:
    inputs:
      media_id:
        description: 'GoPro media ID for the .360 file'
        required: true
        type: string
      filename:
        description: 'GoPro filename e.g. GS010404.360'
        required: true
        type: string
      captured_at:
        description: 'Capture timestamp (ISO8601) — leave blank to auto-detect'
        required: false
        default: ''
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: gopro360-upload-${{ github.event.inputs.media_id }}
  cancel-in-progress: false

jobs:
  upload-360:
    name: Stitch + Upload 360 via Vast.ai
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install requests google-auth google-auth-oauthlib google-api-python-client

      - name: Write GoPro cookies
        env:
          GOPRO_COOKIES: ${{ secrets.GOPRO_COOKIES }}
        run: |
          python3 -c "
          import os
          from pathlib import Path
          cookies = os.environ.get('GOPRO_COOKIES', '{}').strip() or '{}'
          Path('gopro_cookies.json').write_text(cookies)
          print('GoPro cookies written')
          "

      - name: Get GoPro CDN URL for .360 file
        id: get_url
        env:
          MEDIA_ID: ${{ github.event.inputs.media_id }}
          FILENAME: ${{ github.event.inputs.filename }}
          CAPTURED_AT: ${{ github.event.inputs.captured_at }}
        run: |
          python3 - <<'PY'
          import os, sys
          import gopro_uploader as u

          media_id = os.environ["MEDIA_ID"]
          filename  = os.environ["FILENAME"]
          captured_at = os.environ.get("CAPTURED_AT", "").strip()

          session = u.make_session(u.load_cookies_from_file())

          # Fetch download variants for this media item
          try:
              resp = u.gopro_get(session, f"/media/{media_id}/download")
              variations = resp.get("_embedded", {}).get("variations", [])
          except Exception as e:
              print(f"ERROR fetching variants: {e}")
              sys.exit(1)

          # Prefer concat (full-length dual-fisheye), then proxy (capped ~15min)
          cdn_url = None
          variant_used = None
          for label in ["concat", "high_res_proxy_mp4"]:
              for v in variations:
                  if v.get("label") == label and v.get("url"):
                      cdn_url = v["url"]
                      variant_used = label
                      break
              if cdn_url:
                  break

          if not cdn_url:
              for v in sorted(variations, key=lambda x: int(x.get("width", 0)), reverse=True):
                  if v.get("url"):
                      cdn_url = v["url"]
                      variant_used = v.get("label", "unknown")
                      break

          if not cdn_url:
              print(f"ERROR: No downloadable variant found for {filename}")
              sys.exit(1)

          print(f"Variant: {variant_used}")
          print(f"URL: {cdn_url[:80]}...")

          # Auto-detect captured_at if not supplied
          if not captured_at:
              try:
                  pages = u.fetch_recent_media(u.get_authenticated_gopro_session())
                  for item in pages:
                      if item.get("id") == media_id:
                          captured_at = item.get("captured_at", "")
                          print(f"Auto-detected captured_at: {captured_at}")
                          break
              except Exception as ex:
                  print(f"Warning: could not auto-detect captured_at: {ex}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"cdn_url={cdn_url}\n")
              f.write(f"captured_at={captured_at}\n")
              f.write(f"variant={variant_used}\n")
          PY

      - name: Generate SSH key pair for this run
        run: |
          ssh-keygen -t ed25519 -f /tmp/vastai_key -N "" -C "ffa-360-actions"
          echo "pub_key=$(cat /tmp/vastai_key.pub)" >> $GITHUB_OUTPUT
        id: ssh_key

      - name: Search for cheapest offer + launch Vast.ai instance
        id: launch
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
        run: |
          python3 - <<'PY'
          import os, time, json, urllib.request, urllib.parse, sys

          API_KEY = os.environ["VAST_API_KEY"]
          pub_key = open("/tmp/vastai_key.pub").read().strip()

          BASE = "https://cloud.vast.ai/api/v0"
          BASE_V1 = "https://cloud.vast.ai/api/v1"
          headers = {
              "Authorization": f"Bearer {API_KEY}",
              "Content-Type": "application/json",
              "Accept": "application/json",
          }

          def vast_get(path, params=None, base=None):
              url = f"{base or BASE}{path}"
              if params:
                  url += "?" + urllib.parse.urlencode(params)
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=20) as r:
                  return json.loads(r.read())

          def vast_put(path, data):
              req = urllib.request.Request(f"{BASE}{path}",
                  data=json.dumps(data).encode(), method="PUT", headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def vast_post(path, data):
              req = urllib.request.Request(f"{BASE}{path}",
                  data=json.dumps(data).encode(), method="POST", headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def vast_delete(path, base=None):
              req = urllib.request.Request(f"{base or BASE}{path}", method="DELETE", headers=headers)
              with urllib.request.urlopen(req, timeout=20) as r:
                  return json.loads(r.read())

          # ── Register SSH key ────────────────────────────────────────────────
          print("Registering SSH key...")
          vast_post("/ssh/", {"ssh_key": pub_key})
          print("SSH key registered")

          # ── Dynamic offer search ────────────────────────────────────────────
          # Search for cheapest reliable single RTX 3060 with enough disk for FFmpeg
          print("Searching for cheapest available offer...")
          # verified=True excludes unverified hosts
          # geolocation excludes China (CN) — unreliable boot times over GitHub Actions SSH
          query = json.dumps({
              "reliability2": {"gte": 0.98},
              "inet_up": {"gte": 200},
              "disk_space": {"gte": 100},
              "cpu_cores": {"gte": 16},
              "cpu_ram": {"gte": 64},
              "gpu_name": {"in": ["RTX 4090", "RTX 6000Ada", "L40", "L40S"]},
              "rentable": {"eq": True},
              "verified": {"eq": True},
              "geolocation": {"neq": "CN"},
          })
          resp = vast_get("/bundles/", {"q": query})
          offers = resp.get("offers", [])
          print(f"Found {len(offers)} verified non-CN offers")

          if not offers:
              print("ERROR: No matching offers found", file=sys.stderr)
              sys.exit(1)

          # Sort by price per hour, try top 5 in order
          offers.sort(key=lambda o: float(o.get("dph_total", 999)))
          candidates = offers[:5]

          IMAGE_PAYLOAD = {
              "image": "nvidia/cuda:12.4.1-runtime-ubuntu22.04",
              "disk": 60,
              "runtype": "ssh",
              "ssh_key": pub_key,
              "env": {"NVIDIA_VISIBLE_DEVICES": "all", "NVIDIA_DRIVER_CAPABILITIES": "all"},
          }

          ip = port = instance_id = None
          for offer in candidates:
              offer_id = offer["id"]
              gpu_name = offer.get("gpu_name", "unknown")
              price = offer.get("dph_total", "?")
              location = offer.get("geolocation", "?")
              print(f"Trying offer {offer_id} — {gpu_name} @ ${price:.4f}/hr ({location})")

              try:
                  result = vast_put(f"/asks/{offer_id}/", IMAGE_PAYLOAD)
              except urllib.error.HTTPError as e:
                  print(f"  launch failed: HTTP {e.code} — {e.read().decode()[:200]} — trying next offer")
                  continue

              this_instance = result.get("new_contract")
              if not this_instance:
                  print(f"  no instance ID returned: {result} — trying next offer")
                  continue
              print(f"  Instance ID: {this_instance}")

              this_ip = this_port = None
              for attempt in range(20):  # max 5 min boot wait
                  time.sleep(15)
                  try:
                      resp = vast_get("/instances/", base=BASE_V1)
                      inst = next((x for x in resp.get("instances", []) if x["id"] == this_instance), None)
                      if not inst:
                          print(f"    [{attempt+1}] instance not visible yet")
                          continue
                  except Exception as e:
                      print(f"    [{attempt+1}] poll error: {e}")
                      continue

                  status   = inst.get("actual_status", "")
                  ssh_host = inst.get("ssh_host") or inst.get("public_ipaddr")
                  ssh_port = inst.get("ssh_port", 22)
                  print(f"    [{attempt+1}] status={status} host={ssh_host} port={ssh_port}")

                  if status == "running" and ssh_host:
                      this_ip = ssh_host
                      this_port = str(ssh_port)
                      break

              if this_ip:
                  ip, port, instance_id = this_ip, this_port, this_instance
                  break
              else:
                  print(f"  instance {this_instance} never reached running — terminating, trying next offer")
                  try: vast_delete(f"/instances/{this_instance}/", base=BASE_V1)
                  except: pass

          if not ip:
              print("ERROR: All candidate offers exhausted — giving up", file=sys.stderr)
              sys.exit(1)

          print(f"Ready: {ip}:{port}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"instance_id={instance_id}\n")
              f.write(f"ip={ip}\n")
              f.write(f"port={port}\n")
          PY

      - name: Wait for SSH
        id: wait_ssh
        continue-on-error: true
        run: |
          IP="${{ steps.launch.outputs.ip }}"
          PORT="${{ steps.launch.outputs.port }}"
          echo "Waiting for SSH on ${IP}:${PORT}..."
          for i in $(seq 1 24); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=8 \
                   -i /tmp/vastai_key -p "${PORT}" "root@${IP}" \
                   "echo SSH_OK" 2>/dev/null | grep -q SSH_OK; then
              echo "SSH is up after ${i} attempts"
              exit 0
            fi
            echo "  [${i}/24] not ready — waiting 15s..."
            sleep 15
          done
          echo "ERROR: SSH never came up"
          exit 1

      - name: Re-dispatch on SSH failure
        if: steps.wait_ssh.outcome == 'failure'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "SSH never came up on this host — instance was a dud. Re-dispatching a fresh run with the same inputs..."
          curl -s -X POST -H "Authorization: token ${GH_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/gopro360-upload.yml/dispatches" \
            -d '{"ref":"${{ github.ref_name }}","inputs":{"media_id":"${{ github.event.inputs.media_id }}","filename":"${{ github.event.inputs.filename }}","captured_at":"${{ github.event.inputs.captured_at }}"}}'
          echo "Fresh run dispatched. Failing this run (dud host already terminated below)."
          exit 1

      - name: Copy stitch script to instance
        if: steps.wait_ssh.outcome == 'success'
        run: |
          python3 - <<'PY'
          import urllib.request, json, base64
          from pathlib import Path

          PAT  = "${{ secrets.GH_PAT }}"
          REPO = "${{ github.repository }}"

          req = urllib.request.Request(
              f"https://api.github.com/repos/{REPO}/contents/gopro360/vastai_stitch.sh",
              headers={"Authorization": f"token {PAT}", "Accept": "application/vnd.github.v3+json"}
          )
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())
          Path("/tmp/vastai_stitch.sh").write_bytes(base64.b64decode(data["content"]))
          print("Script fetched OK")
          PY

          scp -o StrictHostKeyChecking=no \
              -i /tmp/vastai_key \
              -P "${{ steps.launch.outputs.port }}" \
              /tmp/vastai_stitch.sh \
              "root@${{ steps.launch.outputs.ip }}:/tmp/vastai_stitch.sh"
          echo "Script transferred"

      - name: Run stitch + upload on instance
        if: steps.wait_ssh.outcome == 'success'
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=60 \
              -o ServerAliveCountMax=60 \
              -i /tmp/vastai_key \
              -p "${{ steps.launch.outputs.port }}" \
              "root@${{ steps.launch.outputs.ip }}" \
              "SOURCE_URL='${{ steps.get_url.outputs.cdn_url }}' \
               MEDIA_ID='${{ github.event.inputs.media_id }}' \
               FILENAME='${{ github.event.inputs.filename }}' \
               CAPTURED_AT='${{ steps.get_url.outputs.captured_at }}' \
               YOUTUBE_CREDS='${YOUTUBE_CREDENTIALS}' \
               YOUTUBE_TOKEN='${YOUTUBE_TOKEN}' \
               GH_PAT='${GH_PAT}' \
               REPO='${{ github.repository }}' \
               TRANSCODE_BITRATE='20M' \
               bash /tmp/vastai_stitch.sh"

      - name: Terminate Vast.ai instance
        if: always()
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
          INSTANCE_ID: ${{ steps.launch.outputs.instance_id }}
        run: |
          if [ -z "${INSTANCE_ID}" ]; then
            echo "No instance ID — nothing to terminate"
            exit 0
          fi
          python3 - <<'PY'
          import os, json, urllib.request

          API_KEY = os.environ["VAST_API_KEY"]
          INSTANCE_ID = os.environ["INSTANCE_ID"]

          req = urllib.request.Request(
              f"https://cloud.vast.ai/api/v1/instances/{INSTANCE_ID}/",
              method="DELETE",
              headers={"Authorization": f"Bearer {API_KEY}", "Accept": "application/json"},
          )
          try:
              with urllib.request.urlopen(req, timeout=20) as r:
                  print(f"Terminated {INSTANCE_ID}: {json.loads(r.read())}")
          except Exception as e:
              print(f"Termination error (may already be gone): {e}")
          PY

