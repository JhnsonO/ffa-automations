name: Check GoPro Cookies

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check cookies
        id: check
        run: |
          python3 << 'EOF'
          import json, requests, os, sys

          cookies = json.loads(os.environ["GOPRO_COOKIES"])
          session = requests.Session()
          session.cookies.update(cookies)

          r = session.get(
              "https://api.gopro.com/media/search",
              headers={"Accept": "application/vnd.gopro.jk.media+json; version=2.0.0"},
              params={"fields": "id,filename", "per_page": 1, "page": 1},
              timeout=15,
          )
          print(f"HTTP {r.status_code}")
          if r.status_code == 200:
              print("COOKIES_VALID=true")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("valid=true\n")
          else:
              print("COOKIES_VALID=false")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("valid=false\n")
              sys.exit(1)
          EOF
        env:
          GOPRO_COOKIES: ${{ secrets.GOPRO_COOKIES }}

      - name: Cookies OK
        if: steps.check.outputs.valid == 'true'
        run: echo "GoPro cookies are working fine."

      - name: Cookies EXPIRED - create GitHub issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'cookies-expired'
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '⚠️ GoPro cookies have expired — uploads will fail',
                body: '## Action needed\n\nYour GoPro session cookies have expired. Videos are no longer uploading to YouTube.\n\n**To fix (30 seconds):**\n1. Close Chrome completely on your laptop\n2. Run: `python3 refresh_cookies.py`\n3. Done — uploads will resume automatically\n\n**If you\'re away from your laptop:**\nLog into GoPro Cloud in Chrome on any computer, open DevTools → Application → Cookies → gopro.com, copy all cookie values, and update the `GOPRO_COOKIES` secret in GitHub Settings → Secrets.',
                labels: ['cookies-expired']
              });
              console.log('Issue created!');
            } else {
              console.log('Issue already exists, skipping.');
            }

