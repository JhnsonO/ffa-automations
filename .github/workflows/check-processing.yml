name: Check YouTube Processing Status (one-off)
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          pip install google-auth google-auth-oauthlib google-api-python-client -q
          python3 - <<'PY'
          import os, json
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build

          open("youtube_credentials.json", "w").write(os.environ["YOUTUBE_CREDENTIALS"])
          open("youtube_token.json", "w").write(os.environ["YOUTUBE_TOKEN"])

          creds = Credentials.from_authorized_user_file("youtube_token.json",
              ["https://www.googleapis.com/auth/youtube.readonly"])
          yt = build("youtube", "v3", credentials=creds)

          resp = yt.videos().list(
              part="status,processingDetails,fileDetails,contentDetails",
              id="O6XbDV9R8ho"
          ).execute()

          items = resp.get("items", [])
          if not items:
              print("Video not found")
          else:
              print(json.dumps(items[0], indent=2))
          PY
