name: Cookie Persistence Check (VM)
on:
  workflow_dispatch:
concurrency:
  group: cookie-check
  cancel-in-progress: false
jobs:
  check:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: Verify chrome-ffa cookies now persist
        run: |
          set +e
          echo "== live Cookies file stat =="
          sudo -n stat -c 'size=%s bytes  mtime=%y' /root/.config/chrome-ffa/Default/Cookies
          echo "== copy + count rows (Chrome holds a lock, so copy first) =="
          sudo -n bash -c '
            cp -a /root/.config/chrome-ffa/Default/Cookies /tmp/ck.sqlite 2>/dev/null
            if command -v sqlite3 >/dev/null; then
              echo -n "total cookies: "; sqlite3 /tmp/ck.sqlite "select count(*) from cookies;" 2>&1
              echo -n "google/youtube auth cookies: "; sqlite3 /tmp/ck.sqlite "select count(*) from cookies where host_key like \"%google.com\" or host_key like \"%youtube.com\";" 2>&1
              echo "sample hosts:"; sqlite3 /tmp/ck.sqlite "select distinct host_key from cookies where host_key like \"%youtube%\" or host_key like \"%google%\" limit 8;" 2>&1
            else
              echo "sqlite3 not installed; size check only"
            fi
            rm -f /tmp/ck.sqlite
          '
          echo "== chrome still alive? =="
          sudo -n bash -c 'curl -s --max-time 3 http://localhost:9222/json/version' 2>/dev/null | grep -o "Chrome/[0-9.]*" || echo "(debug port quiet)"
