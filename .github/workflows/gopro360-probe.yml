name: Probe GoPro 360 Clip (ffprobe only, no download)

on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'GoPro filename e.g. GS010404.360 — leave blank to just LIST recent clips instead'
        required: false
        default: ''
        type: string

jobs:
  probe:
    name: List or probe GoPro clip stream info
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install requests

      - name: Install ffprobe
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Write GoPro cookies
        env:
          GOPRO_COOKIES: ${{ secrets.GOPRO_COOKIES }}
        run: |
          python3 -c "
          import os
          from pathlib import Path
          cookies = os.environ.get('GOPRO_COOKIES', '{}').strip() or '{}'
          Path('gopro_cookies.json').write_text(cookies)
          "

      - name: List recent clips or probe one
        env:
          FILENAME: ${{ github.event.inputs.filename }}
        run: |
          python3 - <<'PY'
          import os, sys, subprocess, json
          import gopro_uploader as u

          filename = os.environ.get("FILENAME", "").strip()
          session = u.make_session(u.load_cookies_from_file())

          if not filename:
              print("No filename given — listing 15 most recent video clips:\n")
              items = u.fetch_recent_media(session)
              for item in items[:15]:
                  print(f"  {item.get('filename'):20s} id={item.get('id')}  captured_at={item.get('captured_at')}  size={int(item.get('file_size', 0) or 0)/1e9:.2f}GB")
              print("\nRe-run this workflow with 'filename' set to the MAX 2 clip you want probed.")
              sys.exit(0)

          item = u.fetch_media_by_filename(session, filename)
          if not item:
              print(f"ERROR: {filename} not found in recent GoPro Cloud media")
              sys.exit(1)

          media_id = item["id"]
          dl_url = u.get_concat_download_url(session, media_id)
          if not dl_url:
              print(f"ERROR: no download URL for {filename}")
              sys.exit(1)

          print(f"Got CDN URL for {filename} (media_id={media_id})")
          print("Running ffprobe (header-only, no download)...\n")

          result = subprocess.run(
              ["ffprobe", "-v", "error", "-show_entries",
               "stream=index,codec_name,codec_type,width,height,pix_fmt,bit_rate,avg_frame_rate",
               "-of", "json", dl_url],
              capture_output=True, text=True, timeout=120
          )
          print(result.stdout)
          if result.returncode != 0:
              print("ffprobe stderr:", result.stderr[:2000])
              sys.exit(1)
          PY
