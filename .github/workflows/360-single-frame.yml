name: 360 Single Frame Extractor

on:
  workflow_dispatch:
    inputs:
      equirect_file_id:
        description: 'Drive ID of equirect_trim.mp4'
        required: true
        default: '1z2p2FgLsjgvIIBw0HZXWEenckMLWpVNX'
        type: string
      frame_number:
        description: 'Frame number to extract'
        required: true
        default: '711'
        type: string
      label:
        description: 'Label to draw on frame'
        required: false
        default: 'T0056 f711 yaw=38.7 pitch=16.2 conf=0.53'
        type: string

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install ffmpeg
        run: sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Get Drive access token
        env:
          YOUTUBE_TOKEN:       ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "$YOUTUBE_TOKEN"       > /tmp/youtube_token.json
          echo "$YOUTUBE_CREDENTIALS" > /tmp/youtube_credentials.json
          python3 - << 'PY'
          import os, json, urllib.request as _req
          token_data = json.loads(open("/tmp/youtube_token.json").read())
          creds_data = json.loads(open("/tmp/youtube_credentials.json").read())
          client_id     = token_data.get("client_id") or creds_data["installed"]["client_id"]
          client_secret = token_data.get("client_secret") or creds_data["installed"]["client_secret"]
          refresh_token = token_data["refresh_token"]
          token_uri     = token_data.get("token_uri", "https://oauth2.googleapis.com/token")
          payload = json.dumps({"client_id": client_id, "client_secret": client_secret,
              "refresh_token": refresh_token, "grant_type": "refresh_token"}).encode()
          r = _req.urlopen(_req.Request(token_uri, data=payload,
                           headers={"Content-Type": "application/json"}, method="POST"))
          tok = json.loads(r.read())
          if "access_token" not in tok:
              raise RuntimeError(f"Token refresh failed: {tok}")
          with open("/tmp/drive_token.txt", "w") as f:
              f.write(tok["access_token"])
          print(f"Token OK")
          PY

      - name: Extract frame
        env:
          EQUIRECT_FILE_ID: ${{ github.event.inputs.equirect_file_id }}
          FRAME_NUMBER:     ${{ github.event.inputs.frame_number }}
          LABEL:            ${{ github.event.inputs.label }}
        run: |
          ACCESS_TOKEN=$(cat /tmp/drive_token.txt)
          python3 ball_tracker/extract_single_frame.py \
            --drive-file-id "$EQUIRECT_FILE_ID" \
            --access-token  "$ACCESS_TOKEN" \
            --frame         "$FRAME_NUMBER" \
            --label         "$LABEL" \
            --output-dir    single_frame_output

      - name: Upload frame
        uses: actions/upload-artifact@v4
        with:
          name: single-frame-${{ github.event.inputs.frame_number }}-${{ github.run_id }}
          path: single_frame_output/frame_${{ github.event.inputs.frame_number }}.jpg
          retention-days: 7
