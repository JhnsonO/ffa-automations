name: Vast Cleanup

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: List and kill all vast instances
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
        run: |
          python3 - << 'PY'
          import urllib.request, json, sys

          API_KEY = os.environ["VAST_API_KEY"] if False else __import__('os').environ["VAST_API_KEY"]
          BASE_V1 = "https://cloud.vast.ai/api/v1"
          headers = {"Authorization": f"Bearer {API_KEY}", "Content-Type": "application/json"}

          def vast_get(url):
              with urllib.request.urlopen(urllib.request.Request(url, headers=headers), timeout=20) as r:
                  return json.loads(r.read())

          resp = vast_get(f"{BASE_V1}/instances/")
          instances = resp.get("instances", [])
          print(f"Found {len(instances)} instances on account:")
          for inst in instances:
              print(f"  id={inst['id']} status={inst.get('actual_status')} cpu={inst.get('cpu_name','?')} dph=${inst.get('dph_total','?')} started={inst.get('start_date','?')}")

          if not instances:
              print("No instances to clean up.")
          else:
              print(f"\nTerminating all {len(instances)} instances...")
              for inst in instances:
                  iid = inst['id']
                  try:
                      req = urllib.request.Request(f"{BASE_V1}/instances/{iid}/", method="DELETE", headers=headers)
                      urllib.request.urlopen(req, timeout=10)
                      print(f"  Terminated {iid}")
                  except Exception as e:
                      print(f"  Failed to terminate {iid}: {e}")
          PY
