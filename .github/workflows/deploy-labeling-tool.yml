name: Deploy Labeling Tool

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy camera labeling tool to self-hosted VM
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip3 install --break-system-packages -r labeling_tool/requirements.txt 2>/dev/null \
            || pip3 install -r labeling_tool/requirements.txt

      - name: Copy tool into persistent runner directory
        run: |
          TARGET="$HOME/ffa-labeling-tool"
          # Data dirs are created (not wiped) so labels/clips already saved on
          # the VM from a prior deploy are never touched by a redeploy.
          mkdir -p "$TARGET/clips" "$TARGET/labels" "$TARGET/drive_cache"
          cp -f labeling_tool/app.py "$TARGET/app.py"
          cp -f labeling_tool/requirements.txt "$TARGET/requirements.txt"
          rm -rf "$TARGET/static"
          cp -r labeling_tool/static "$TARGET/static"
          if [ -f .ffa_labeling_drive_folder_id ]; then
            cp .ffa_labeling_drive_folder_id "$TARGET/.ffa_labeling_drive_folder_id"
          fi
          echo "Deployed to $TARGET"

      - name: Configure Drive credentials (optional, non-fatal if secret is unset)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "${GOOGLE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "GOOGLE_SERVICE_ACCOUNT_JSON secret not set -- skipping Drive credential wiring (tool still runs, local-clips-only, as before)."
            exit 0
          fi
          python3 - <<'PYEOF'
          import base64, json, os, stat
          raw = os.environ["GOOGLE_SERVICE_ACCOUNT_JSON"]
          data = json.loads(raw)
          compact = json.dumps(data)
          # Base64-wrap before writing: systemd's EnvironmentFile= applies
          # shell-style backslash-escape processing to unquoted values
          # (systemd >=246), which corrupts the literal \n sequences inside
          # the PEM private_key field -- confirmed root cause of the 7 July
          # 2026 "Unable to load PEM file ... InvalidByte" failure. Base64
          # output has no backslashes/newlines/quotes, so it survives that
          # parser untouched. See docs/ai-project-state.md.
          b64 = base64.b64encode(compact.encode()).decode()
          target = os.path.expanduser("~/ffa-labeling-tool/.env")
          with open(target, "w") as f:
              f.write("GOOGLE_SERVICE_ACCOUNT_JSON_B64=" + b64 + "\n")
          os.chmod(target, stat.S_IRUSR | stat.S_IWUSR)
          print("Drive credentials written to .env (base64-wrapped, 600 perms). Service account:", data.get("client_email", "?"))
          PYEOF

      - name: Install and enable systemd service
        run: |
          TARGET="$HOME/ffa-labeling-tool"
          SERVICE="ffa-labeling-tool"
          PORT="${LABELING_TOOL_PORT:-8090}"
          USER_NAME="$(whoami)"

          # Retire the old nohup+cron lifecycle -- systemd owns this now.
          # Idempotent: harmless if these were never installed.
          crontab -l 2>/dev/null | grep -v "ffa-labeling-tool/run.sh" | grep -v "ffa-labeling-tool watchdog" | crontab - 2>/dev/null || true
          pkill -f "ffa-labeling-tool/app.py" 2>/dev/null || true
          rm -f "$TARGET/run.sh"

          if sudo -n true 2>/dev/null; then
            echo "Passwordless sudo available -- installing a system-level unit."
            echo "USE_SYSTEM=1" >> "$GITHUB_ENV"
            sudo tee /etc/systemd/system/${SERVICE}.service > /dev/null <<EOF
          [Unit]
          Description=FFA Camera Labeling Tool
          After=network.target

          [Service]
          Type=simple
          User=$USER_NAME
          WorkingDirectory=$TARGET
          ExecStart=/usr/bin/python3 $TARGET/app.py
          EnvironmentFile=-$TARGET/.env
          Environment=LABELING_TOOL_PORT=$PORT
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF
            sudo systemctl daemon-reload
            sudo systemctl enable "${SERVICE}.service"
            sudo systemctl restart "${SERVICE}.service"
          else
            echo "No passwordless sudo -- using a user-level unit (needs lingering to survive this job's session ending)."
            echo "USE_SYSTEM=0" >> "$GITHUB_ENV"
            mkdir -p "$HOME/.config/systemd/user"
            cat > "$HOME/.config/systemd/user/${SERVICE}.service" <<EOF
          [Unit]
          Description=FFA Camera Labeling Tool
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=$TARGET
          ExecStart=/usr/bin/python3 $TARGET/app.py
          EnvironmentFile=-$TARGET/.env
          Environment=LABELING_TOOL_PORT=$PORT
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=default.target
          EOF
            export XDG_RUNTIME_DIR="/run/user/$(id -u)"
            if loginctl enable-linger "$USER_NAME" 2>&1; then
              echo "Lingering enabled for $USER_NAME."
            else
              echo "::warning::enable-linger failed -- service may still die when this job's session ends. Ask Johnson to run once, as root: loginctl enable-linger $USER_NAME"
            fi
            systemctl --user daemon-reload
            systemctl --user enable "${SERVICE}.service"
            systemctl --user restart "${SERVICE}.service"
          fi

      - name: Verify the service is actually up (state + real HTTP check)
        run: |
          SERVICE="ffa-labeling-tool"
          PORT="${LABELING_TOOL_PORT:-8090}"
          sleep 2

          if [ "${USE_SYSTEM:-0}" = "1" ]; then
            STATE=$(sudo systemctl is-active "${SERVICE}.service" || true)
          else
            export XDG_RUNTIME_DIR="/run/user/$(id -u)"
            STATE=$(systemctl --user is-active "${SERVICE}.service" || true)
          fi
          echo "systemd unit state: $STATE"

          CODE=""
          for i in $(seq 1 15); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:$PORT/" || true)
            [ "$CODE" = "200" ] && break
            sleep 2
          done
          echo "HTTP check: $CODE"

          if [ "$STATE" != "active" ] || [ "$CODE" != "200" ]; then
            echo "::error::unit state=$STATE, HTTP=$CODE -- journal below"
            if [ "${USE_SYSTEM:-0}" = "1" ]; then
              sudo journalctl -u "${SERVICE}.service" -n 40 --no-pager || true
            else
              export XDG_RUNTIME_DIR="/run/user/$(id -u)"
              journalctl --user -u "${SERVICE}.service" -n 40 --no-pager || true
            fi
            exit 1
          fi
          echo "Labeling tool is up via systemd (mode=$([ "${USE_SYSTEM:-0}" = "1" ] && echo system || echo user)), bound 0.0.0.0:$PORT"
