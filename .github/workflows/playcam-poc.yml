name: Playcam POC - Phase1+2.5 Wide-Safety Camera (Vast.ai)

on:
  workflow_dispatch:
    inputs:
      equirect_file_id:
        description: 'Drive file ID of the full session video'
        required: false
        default: '1z2p2FgLsjgvIIBw0HZXWEenckMLWpVNX'
        type: string
      start_seconds:
        description: 'Start offset into the source video (seconds)'
        required: false
        default: '0'
        type: string
      duration_seconds:
        description: 'Window length to process (seconds), 180-300 recommended'
        required: false
        default: '240'
        type: string
      venue_profile_path:
        description: 'Path to venue profile in repo'
        required: false
        default: 'playcam/venue_profiles/st_margarets.json'
        type: string
      sample_fps:
        description: 'Phase 1 detection sample rate'
        required: false
        default: '2'
        type: string

jobs:
  playcam-poc:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate SSH key pair
        run: |
          pip install -q cryptography
          python3 -u - << 'PY'
          from cryptography.hazmat.primitives import serialization
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
          import os
          key = Ed25519PrivateKey.generate()
          priv = key.private_bytes(serialization.Encoding.PEM, serialization.PrivateFormat.OpenSSH, serialization.NoEncryption())
          pub = key.public_key().public_bytes(serialization.Encoding.OpenSSH, serialization.PublicFormat.OpenSSH)
          with open('/tmp/vastai_key', 'wb') as f: f.write(priv)
          with open('/tmp/vastai_key.pub', 'wb') as f: f.write(pub + b' ffa-playcam\n')
          os.chmod('/tmp/vastai_key', 0o600)
          PY

      - name: Launch reliable Vast.ai GPU instance
        id: launch
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
        run: |
          python3 -u - << 'PY'
          import os, json, time, urllib.request, urllib.parse, sys

          api_key = os.environ['VAST_API_KEY']
          base = 'https://console.vast.ai/api/v0'
          cloud = 'https://cloud.vast.ai/api/v1'
          headers = {'Authorization': f'Bearer {api_key}', 'Content-Type': 'application/json', 'Accept': 'application/json'}
          pub_key = open('/tmp/vastai_key.pub').read().strip()

          def request(method, url, data=None, timeout=25):
              body = json.dumps(data).encode() if data is not None else None
              req = urllib.request.Request(url, data=body, method=method, headers=headers)
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  return json.loads(r.read())

          def delete_instance(instance_id):
              for ep in (f'{base}/instances/{instance_id}/',
                         f'https://cloud.vast.ai/api/v0/instances/{instance_id}/',
                         f'{cloud}/instances/{instance_id}/'):
                  try:
                      request('DELETE', ep, timeout=15)
                      return
                  except Exception as exc:
                      last_exc = exc
              print(f'Cleanup warning for {instance_id}: all endpoints failed, last error: {last_exc}')

          # Register this ephemeral GitHub runner key with Vast.
          request('POST', f'{base}/ssh/', {'ssh_key': pub_key})

          # This job runs YOLO/Ultralytics: require a real, reliable GPU offer.
          query = {
              'verified': {'eq': True},
              'rentable': {'eq': True},
              'reliability': {'gte': 0.98},
              'gpu_ram': {'gte': 8192},
              'num_gpus': {'gte': 1},
              'cpu_cores': {'gte': 8},
              'cpu_ram': {'gte': 16384},
              'disk_space': {'gte': 40},
              'inet_down': {'gte': 300},
          }
          bundles = request('GET', f'{base}/bundles/?' + urllib.parse.urlencode({'q': json.dumps(query)}))
          offers = bundles.get('offers', [])
          bad_cpu = ('E5-', 'E3-', 'Opteron', 'Xeon W3', 'Xeon X5')
          offers = [o for o in offers if not any(x in (o.get('cpu_name') or '') for x in bad_cpu)]
          offers.sort(key=lambda o: float(o.get('dph_total', 999)))
          if not offers:
              print('ERROR: No reliable GPU offers matched the Playcam requirements', file=sys.stderr)
              sys.exit(1)

          print(f'Found {len(offers)} eligible offers; trying up to 5 cheapest reliable offers.')
          selected = None
          for index, offer in enumerate(offers[:5], start=1):
              offer_id = offer['id']
              print('Trying offer %s (%s/5): gpu=%s vram=%sMB reliability=%s cpu=%s $%s/hr' % (
                  offer_id, index, offer.get('gpu_name', 'unknown'), offer.get('gpu_ram', '?'),
                  offer.get('reliability', '?'), offer.get('cpu_name', 'unknown'), offer.get('dph_total', '?')))
              try:
                  result = request('PUT', f'{base}/asks/{offer_id}/', {
                      'client_id': 'me',
                      'image': 'pytorch/pytorch:2.1.0-cuda11.8-cudnn8-runtime',
                      'disk': 40,
                      'onstart': '',
                      'runtype': 'ssh',
                      'ssh_key': pub_key,
                      'env': {},
                  })
              except Exception as exc:
                  print(f'Launch request failed for offer {offer_id}: {exc}')
                  continue
              instance_id = result.get('new_contract')
              if not instance_id:
                  print(f'Offer {offer_id} did not return an instance: {result}')
                  continue

              for attempt in range(30):  # 5 minutes per offer
                  time.sleep(10)
                  try:
                      instances = request('GET', f'{cloud}/instances/')
                      inst = next((x for x in instances.get('instances', []) if x.get('id') == instance_id), None)
                  except Exception as exc:
                      print(f'  [{attempt + 1}/30] status lookup failed: {exc}')
                      continue
                  if not inst:
                      print(f'  [{attempt + 1}/30] instance not listed yet')
                      continue
                  status = inst.get('actual_status', '?')
                  ip = inst.get('ssh_host') or inst.get('public_ipaddr')
                  port = inst.get('ssh_port', 22)
                  print(f'  [{attempt + 1}/30] status={status} ip={ip} port={port}')
                  if status == 'running' and ip:
                      selected = (instance_id, ip, port, offer)
                      break
                  if status in ('error', 'failed', 'stopped'):
                      break
              if selected:
                  break
              print(f'Offer {offer_id} did not become usable; terminating instance {instance_id} and trying next.')
              delete_instance(instance_id)

          if not selected:
              print('ERROR: None of the first five reliable GPU offers became ready', file=sys.stderr)
              sys.exit(1)
          instance_id, ip, port, offer = selected
          print(f'Selected ready instance: id={instance_id} gpu={offer.get("gpu_name")} vram={offer.get("gpu_ram")}MB reliability={offer.get("reliability")} ip={ip}:{port}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'instance_id={instance_id}\nip={ip}\nport={port}\n')
          PY

      - name: Wait for SSH
        env:
          IP: ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          for i in $(seq 1 18); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=8 -i /tmp/vastai_key -p "$PORT" "root@$IP" 'echo OK' 2>/dev/null | grep -q OK; then
              echo 'SSH ready'; exit 0
            fi
            echo "SSH not ready ($i/18)"; sleep 5
          done
          echo 'ERROR: SSH never came up'; exit 1

      - name: Install dependencies
        env:
          IP: ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=20 -o ServerAliveCountMax=3 root@$IP"
          $SSH "stdbuf -oL -eL apt-get update && stdbuf -oL -eL apt-get install -y --no-install-recommends ffmpeg aria2 libgl1 libglib2.0-0"
          $SSH "stdbuf -oL -eL pip install 'numpy<2' ultralytics opencv-python-headless matplotlib"
          $SSH "python3 -c \"import cv2, numpy, matplotlib, torch; from ultralytics import YOLO; assert torch.cuda.is_available(), 'CUDA unavailable'; print('deps OK, CUDA:', torch.cuda.get_device_name(0), 'numpy:', numpy.__version__)\""

      - name: Upload playcam to instance
        env:
          IP: ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes root@$IP"
          SCP="scp -i /tmp/vastai_key -P $PORT -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes"
          $SSH 'mkdir -p /tmp/playcam_run/playcam/venue_profiles /tmp/playcam_run/playcam/output'
          $SCP playcam/play_location.py root@$IP:/tmp/playcam_run/playcam/
          $SCP playcam/smooth_camera_path.py root@$IP:/tmp/playcam_run/playcam/
          $SCP playcam/crop_utils.py root@$IP:/tmp/playcam_run/playcam/
          $SCP playcam/wide_safety_camera.py root@$IP:/tmp/playcam_run/playcam/
          $SCP "${{ github.event.inputs.venue_profile_path }}" root@$IP:/tmp/playcam_run/playcam/venue_profiles/

      - name: Download source window from Drive
        env:
          IP: ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
          FILE_ID: ${{ github.event.inputs.equirect_file_id }}
          START: ${{ github.event.inputs.start_seconds }}
          DURATION: ${{ github.event.inputs.duration_seconds }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "$YOUTUBE_TOKEN" > /tmp/youtube_token.json
          echo "$YOUTUBE_CREDENTIALS" > /tmp/youtube_credentials.json
          python3 -u - << 'PY'
          import json, urllib.request as req
          token_data = json.loads(open('/tmp/youtube_token.json').read())
          creds_data = json.loads(open('/tmp/youtube_credentials.json').read())
          payload = json.dumps({'client_id': token_data.get('client_id') or creds_data['installed']['client_id'], 'client_secret': token_data.get('client_secret') or creds_data['installed']['client_secret'], 'refresh_token': token_data['refresh_token'], 'grant_type': 'refresh_token'}).encode()
          response = req.urlopen(req.Request(token_data.get('token_uri', 'https://oauth2.googleapis.com/token'), data=payload, headers={'Content-Type': 'application/json'}, method='POST'))
          token = json.loads(response.read())
          if 'access_token' not in token: raise RuntimeError(f'Token refresh failed: {token}')
          open('/tmp/drive_token.txt', 'w').write(token['access_token'])
          print(f"Token OK (expires_in={token.get('expires_in')}s)")
          PY
          ACCESS_TOKEN=$(cat /tmp/drive_token.txt)
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes root@$IP"
          $SSH "aria2c -x 8 -s 8 --file-allocation=none --header='Authorization: Bearer $ACCESS_TOKEN' --dir=/tmp/playcam_run --out=source_full.mp4 'https://www.googleapis.com/drive/v3/files/$FILE_ID?alt=media' 2>&1 | tail -5"
          $SSH "ffmpeg -y -ss $START -i /tmp/playcam_run/source_full.mp4 -t $DURATION -c copy /tmp/playcam_run/clip.mp4"
          $SSH "ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 /tmp/playcam_run/clip.mp4"
          $SSH 'rm /tmp/playcam_run/source_full.mp4'

      - name: Run Phase 1 (play_location.py)
        env:
          IP: ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
          FPS: ${{ github.event.inputs.sample_fps }}
        run: |
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes root@$IP"
          $SSH "set -o pipefail; cd /tmp/playcam_run && python3 playcam/play_location.py --input clip.mp4 --venue-profile playcam/venue_profiles/$(basename ${{ github.event.inputs.venue_profile_path }}) --output playcam/output/play_location.jsonl --fps $FPS --no-debug 2>&1 | tail -40"

      - name: Run Phase 2.5 (wide safety) and render
        env:
          IP: ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes root@$IP"
          $SSH "set -o pipefail; cd /tmp/playcam_run && python3 playcam/wide_safety_camera.py --input playcam/output/play_location.jsonl --venue-profile playcam/venue_profiles/$(basename ${{ github.event.inputs.venue_profile_path }}) --output playcam/output/wide_safety_timeline.jsonl --render --source-video clip.mp4 --render-output playcam/output/wide_safety_render.mp4 --plot-output playcam/output/mode_timeline.png 2>&1 | tail -60"

      - name: Generate metrics and copy artifacts
        env:
          IP: ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes root@$IP"
          $SSH "cd /tmp/playcam_run && python3 - <<'PY'
          import json
          recs = [json.loads(l) for l in open('playcam/output/wide_safety_timeline.jsonl')]
          scores = [r['concentration_score'] for r in recs]
          modes = [r['mode'] for r in recs]
          transitions, prev = [], None
          for r in recs:
              if r['mode'] != prev:
                  transitions.append({'t': r['timestamp'], 'mode': r['mode'], 'score': r['concentration_score']})
                  prev = r['mode']
          summary = {'total_frames': len(recs), 'duration_sec': recs[-1]['timestamp'] if recs else 0, 'mode_changes': sum(a != b for a,b in zip(modes, modes[1:])), 'wide_mode_fraction': round(modes.count('wide') / len(modes), 3), 'score_min': round(min(scores), 3), 'score_max': round(max(scores), 3), 'score_mean': round(sum(scores)/len(scores), 3), 'transitions': transitions}
          json.dump(summary, open('playcam/output/metrics_summary.json', 'w'), indent=2)
          print(json.dumps(summary, indent=2))
          PY"
          SCP="scp -i /tmp/vastai_key -P $PORT -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes"
          mkdir -p poc_artifacts
          $SCP "root@$IP:/tmp/playcam_run/playcam/output/wide_safety_render.mp4" poc_artifacts/ || echo 'render missing'
          $SCP "root@$IP:/tmp/playcam_run/playcam/output/wide_safety_timeline.jsonl" poc_artifacts/
          $SCP "root@$IP:/tmp/playcam_run/playcam/output/play_location.jsonl" poc_artifacts/
          $SCP "root@$IP:/tmp/playcam_run/playcam/output/mode_timeline.png" poc_artifacts/
          $SCP "root@$IP:/tmp/playcam_run/playcam/output/metrics_summary.json" poc_artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: playcam-poc-${{ github.run_id }}
          path: poc_artifacts/
          retention-days: 14

      - name: Terminate Vast.ai instance
        if: always()
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
          INSTANCE_ID: ${{ steps.launch.outputs.instance_id }}
        run: |
          python3 - << 'PY'
          import os, urllib.request, urllib.error
          instance_id = os.environ.get('INSTANCE_ID', '')
          if not instance_id:
              print('No instance ID'); raise SystemExit(0)

          headers = {'Authorization': f"Bearer {os.environ['VAST_API_KEY']}", 'Content-Type': 'application/json'}
          endpoints = [
              f'https://console.vast.ai/api/v0/instances/{instance_id}/',
              f'https://cloud.vast.ai/api/v0/instances/{instance_id}/',
              f'https://cloud.vast.ai/api/v1/instances/{instance_id}/',
          ]
          done = False
          for url in endpoints:
              req = urllib.request.Request(url, method='DELETE', headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      print(f'Instance {instance_id} terminated OK via {url}: {r.read().decode()[:200]}')
                  done = True
                  break
              except urllib.error.HTTPError as exc:
                  print(f'  {url} -> HTTP {exc.code}: {exc.read().decode(errors="replace")[:200]}')
              except Exception as exc:
                  print(f'  {url} -> error: {exc}')
          if not done:
              print(f'::error::Instance {instance_id} may still be RUNNING — check https://cloud.vast.ai/instances manually')
          PY
