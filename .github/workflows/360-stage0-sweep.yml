name: 360 Stage 0 - Static Hotspot Sweep

on:
  workflow_dispatch:
    inputs:
      equirect_file_id:
        description: 'Drive ID of equirect_trim.mp4 (full clip)'
        required: true
        default: '1z2p2FgLsjgvIIBw0HZXWEenckMLWpVNX'
        type: string
      sample_interval_s:
        description: 'Seconds between sampled frames'
        required: false
        default: '0.5'
        type: string
      sphere_bin_deg:
        description: 'Spherical histogram bin size (degrees)'
        required: false
        default: '2.0'
        type: string
      max_frames:
        description: 'Optional cap on sampled frames (blank = full clip)'
        required: false
        default: ''
        type: string
      excluded_offer_ids:
        description: 'Comma-separated Vast.ai offer IDs to skip'
        required: false
        default: ''
        type: string

jobs:
  stage0:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5


      - name: Generate SSH key pair
        id: keygen
        run: |
          pip install -q cryptography
          python3 - << 'PY'
          from cryptography.hazmat.primitives import serialization
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
          import os
          key  = Ed25519PrivateKey.generate()
          priv = key.private_bytes(serialization.Encoding.PEM, serialization.PrivateFormat.OpenSSH, serialization.NoEncryption())
          pub  = key.public_key().public_bytes(serialization.Encoding.OpenSSH, serialization.PublicFormat.OpenSSH)
          os.makedirs("/tmp", exist_ok=True)
          with open("/tmp/vastai_key",     "wb") as f: f.write(priv)
          with open("/tmp/vastai_key.pub", "wb") as f: f.write(pub + b" ffa-audit\n")
          os.chmod("/tmp/vastai_key", 0o600)
          print("SSH keypair generated")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("pub_key=" + pub.decode() + " ffa-audit\n")
          PY

      - name: Search for Vast.ai offer
        id: offer
        env:
          VAST_API_KEY:       ${{ secrets.VASTAI_API_KEY }}
          EXCLUDED_OFFER_IDS: ${{ github.event.inputs.excluded_offer_ids }}
        run: |
          python3 - << 'PY'
          import os, json, urllib.request, urllib.parse, sys

          API_KEY = os.environ["VAST_API_KEY"]
          BASE    = "https://console.vast.ai/api/v0"
          headers = {"Authorization": f"Bearer {API_KEY}", "Content-Type": "application/json", "Accept": "application/json"}

          def vast_get(path, params=None):
              url = f"{BASE}{path}"
              if params: url += "?" + urllib.parse.urlencode(params)
              with urllib.request.urlopen(urllib.request.Request(url, headers=headers), timeout=20) as r:
                  return json.loads(r.read())

          def vast_post(path, data):
              req = urllib.request.Request(f"{BASE}{path}", data=json.dumps(data).encode(), method="POST", headers=headers)
              with urllib.request.urlopen(req) as r: return json.loads(r.read())

          pub_key = open("/tmp/vastai_key.pub").read().strip()
          print("Registering SSH key with Vast.ai...")
          vast_post("/ssh/", {"ssh_key": pub_key})
          print("SSH key registered")

          excluded = [x.strip() for x in os.environ.get("EXCLUDED_OFFER_IDS","").split(",") if x.strip()]
          if excluded:
              print(f"Excluding offer IDs: {excluded}")

          query = {
              "verified":   {"eq": True},
              "rentable":   {"eq": True},
              "cpu_cores":  {"gte": 32},
              "cpu_ram":    {"gte": 65536},
              "cpu_ghz":    {"gte": 4.5},
              "disk_space": {"gte": 80},
              "inet_down":  {"gte": 800},
              "gpu_frac":   {"eq": 1},
              "num_gpus":   {"eq": 1},
          }
          resp   = vast_get("/bundles/", {"q": json.dumps(query)})
          offers = resp.get("offers", [])
          print(f"Raw offers: {len(offers)}")

          BAD_CPU = ["E5-", "E3-", "Opteron", "Xeon W3", "Xeon X5"]
          offers = [o for o in offers if not any(s in (o.get("cpu_name") or "") for s in BAD_CPU)]
          if excluded:
              offers = [o for o in offers if str(o["id"]) not in excluded]

          if not offers:
              print("ERROR: No matching offers", file=sys.stderr)
              sys.exit(1)

          def score(o):
              dph = float(o.get("dph_total", 999))
              gpu = (o.get("gpu_name") or "").lower()
              bonus = 0.05 if any(g in gpu for g in ["3090","3080","4090","4080","4070","a100","a40","a10"]) else 0.0
              return dph - bonus

          offers.sort(key=score)
          best = offers[0]
          print(f"Selected: id={best['id']} gpu={best.get('gpu_name')} cpu={best.get('cpu_name')} dph=${best.get('dph_total')}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"offer_id={best['id']}\noffer_cpu={best.get('cpu_name','unknown')}\noffer_dph={best.get('dph_total','?')}\n")
          PY

      - name: Launch Vast.ai instance
        id: launch
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
          OFFER_ID:     ${{ steps.offer.outputs.offer_id }}
          OFFER_CPU:    ${{ steps.offer.outputs.offer_cpu }}
        run: |
          python3 - << 'PY'
          import os, json, urllib.request, urllib.parse, time, sys

          API_KEY = os.environ["VAST_API_KEY"]
          BASE    = "https://console.vast.ai/api/v0"
          BASE_V1 = "https://cloud.vast.ai/api/v1"
          headers = {"Authorization": f"Bearer {API_KEY}", "Content-Type": "application/json", "Accept": "application/json"}

          def vast_get(path, params=None, base=None):
              url = f"{(base or BASE)}{path}"
              if params: url += "?" + urllib.parse.urlencode(params)
              with urllib.request.urlopen(urllib.request.Request(url, headers=headers), timeout=20) as r:
                  return json.loads(r.read())

          def vast_put(path, data):
              req = urllib.request.Request(f"{BASE}{path}", data=json.dumps(data).encode(), method="PUT", headers=headers)
              with urllib.request.urlopen(req) as r: return json.loads(r.read())

          def vast_delete(path, base=None):
              req = urllib.request.Request(f"{(base or BASE)}{path}", method="DELETE", headers=headers)
              with urllib.request.urlopen(req, timeout=10) as r: return json.loads(r.read())

          offer_id = os.environ["OFFER_ID"]
          pub_key  = open("/tmp/vastai_key.pub").read().strip()

          print(f"Creating instance on offer {offer_id} ({os.environ['OFFER_CPU']})...")
          result = vast_put(f"/asks/{offer_id}/", {
              "client_id": "me",
              "image": "pytorch/pytorch:2.1.0-cuda11.8-cudnn8-runtime",
              "disk": 60,
              "onstart": "",
              "runtype": "ssh",
              "ssh_key": pub_key,
              "env": {},
          })

          instance_id = result.get("new_contract")
          if not instance_id:
              print(f"ERROR: no instance ID: {result}", file=sys.stderr)
              sys.exit(1)
          print(f"Instance ID: {instance_id}")

          ip = port = None
          for attempt in range(24):
              time.sleep(10)
              resp = vast_get("/instances/", base=BASE_V1)
              inst = next((x for x in resp.get("instances", []) if x["id"] == instance_id), None)
              if not inst:
                  print(f"  [{attempt+1}/24] not visible yet")
                  continue
              status    = inst.get("actual_status", "?")
              this_ip   = inst.get("ssh_host") or inst.get("public_ipaddr")
              this_port = inst.get("ssh_port", 22)
              print(f"  [{attempt+1}/24] status={status} ip={this_ip} port={this_port}")
              if status == "running" and this_ip:
                  ip, port = this_ip, this_port
                  break
              if status in ("error", "failed", "stopped"):
                  print(f"ERROR: instance bad state: {status}", file=sys.stderr)
                  try: vast_delete(f"/instances/{instance_id}/", base=BASE_V1)
                  except: pass
                  sys.exit(1)

          if not ip:
              print("ERROR: instance never reached running state", file=sys.stderr)
              try: vast_delete(f"/instances/{instance_id}/", base=BASE_V1)
              except: pass
              sys.exit(1)

          print(f"Instance ready: {ip}:{port}  id={instance_id}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"ip={ip}\nport={port}\ninstance_id={instance_id}\n")
          PY

      - name: Wait for SSH
        env:
          IP:   ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          python3 - << 'PY'
          import os, socket, time, sys
          ip, port = os.environ["IP"], int(os.environ["PORT"])
          print(f"Waiting for SSH on {ip}:{port}...")
          for i in range(30):
              try:
                  s = socket.create_connection((ip, port), timeout=5)
                  s.close()
                  print(f"SSH port open after {(i+1)*5}s")
                  break
              except Exception as e:
                  print(f"  [{i+1}/30] not ready: {e}")
                  time.sleep(5)
          else:
              print("ERROR: SSH never came up", file=sys.stderr)
              sys.exit(1)
          PY
          echo "Sleeping 20s for SSH daemon..."
          sleep 20

      - name: Install dependencies
        env:
          IP:   ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=10 root@$IP"
          echo "--- Waiting for SSH auth ---"
          for i in $(seq 1 24); do
            NPROC=$($SSH "nproc" 2>/dev/null) && break
            echo "  SSH auth not ready ($i/24), retrying..."
            sleep 5
          done
          if [ -z "$NPROC" ]; then echo "ERROR: SSH auth never succeeded"; exit 1; fi
          echo "nproc: $NPROC"
          echo "--- Installing system packages ---"
          $SSH "apt-get update -qq 2>/dev/null && apt-get install -y --no-install-recommends \
            software-properties-common aria2 libimage-exiftool-perl python3-pil > /dev/null && \
            add-apt-repository -y ppa:savoury1/ffmpeg4 2>/dev/null && \
            apt-get update -qq 2>/dev/null && \
            apt-get install -y --no-install-recommends ffmpeg libgl1 libglib2.0-0 && \
            /usr/bin/ffmpeg -filters 2>/dev/null | grep -q v360 && echo 'v360 OK' || echo 'WARNING: v360 missing'"
          echo "--- Installing Python packages ---"
          $SSH "pip install -q --break-system-packages 'numpy<2' gdown ultralytics opencv-python-headless \
            google-auth google-auth-oauthlib google-api-python-client filterpy 2>/dev/null || \
            pip install -q 'numpy<2' gdown ultralytics opencv-python-headless \
            google-auth google-auth-oauthlib google-api-python-client filterpy"
          $SSH "python3 -c \"import cv2, ultralytics; print('Imports OK')\""

      - name: Get Drive access token
        env:
          YOUTUBE_TOKEN:       ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          pip install -q google-auth google-auth-oauthlib google-api-python-client
          echo "$YOUTUBE_TOKEN"       > /tmp/youtube_token.json
          echo "$YOUTUBE_CREDENTIALS" > /tmp/youtube_credentials.json
          python3 - << 'PY'
          import os, json, urllib.request as _req
          token_data = json.loads(open("/tmp/youtube_token.json").read())
          creds_data = json.loads(open("/tmp/youtube_credentials.json").read())
          client_id     = token_data.get("client_id") or creds_data["installed"]["client_id"]
          client_secret = token_data.get("client_secret") or creds_data["installed"]["client_secret"]
          refresh_token = token_data["refresh_token"]
          token_uri     = token_data.get("token_uri", "https://oauth2.googleapis.com/token")
          payload = json.dumps({
              "client_id": client_id, "client_secret": client_secret,
              "refresh_token": refresh_token, "grant_type": "refresh_token",
          }).encode()
          r = _req.urlopen(_req.Request(token_uri, data=payload,
                           headers={"Content-Type": "application/json"}, method="POST"))
          tok = json.loads(r.read())
          if "access_token" not in tok:
              raise RuntimeError(f"Token refresh failed: {tok}")
          with open("/tmp/drive_token.txt", "w") as f:
              f.write(tok["access_token"])
          print(f"Access token obtained (expires_in={tok.get('expires_in')}s)")
          PY

      - name: Download equirect_trim.mp4
        env:
          IP:               ${{ steps.launch.outputs.ip }}
          PORT:             ${{ steps.launch.outputs.port }}
          EQUIRECT_FILE_ID: ${{ github.event.inputs.equirect_file_id }}
        run: |
          ACCESS_TOKEN=$(cat /tmp/drive_token.txt)
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@$IP"
          $SSH "mkdir -p /tmp/ffa_stage0"
          echo "--- Downloading equirect_trim.mp4 ---"
          $SSH "aria2c -x 8 -s 8 --file-allocation=none \
            --header='Authorization: Bearer $ACCESS_TOKEN' \
            --dir=/tmp/ffa_stage0 --out=equirect_trim.mp4 \
            'https://www.googleapis.com/drive/v3/files/$EQUIRECT_FILE_ID?alt=media' 2>&1 | tail -5"
          $SSH "du -sh /tmp/ffa_stage0/equirect_trim.mp4"

      - name: Upload stage0 module and YOLO model
        env:
          IP:   ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@$IP"
          echo "--- Uploading stage0_hotspot_sweep.py ---"
          python3 -c "import base64; open('/tmp/s0_b64.txt','w').write(base64.b64encode(open('ball_tracker/stage0_hotspot_sweep.py','rb').read()).decode())"
          B64=$(cat /tmp/s0_b64.txt)
          $SSH "echo '$B64' | base64 -d > /tmp/ffa_stage0/stage0_hotspot_sweep.py && echo 'module uploaded OK'"
          echo "--- Installing deps + downloading YOLO ball model ---"
          $SSH "pip install -q ultralytics matplotlib opencv-python-headless numpy gdown && \
            mkdir -p /tmp/ffa_stage0/models && \
            if [ ! -f /tmp/ffa_stage0/models/football-ball-detection.pt ]; then \
              gdown -O /tmp/ffa_stage0/models/football-ball-detection.pt \
                'https://drive.google.com/uc?id=1isw4wx-MK9h9LMr36VvIWlJD6ppUvw7V'; \
            else echo 'model already present'; fi && \
            ls -lh /tmp/ffa_stage0/models/football-ball-detection.pt"

      - name: Run Stage 0 sweep
        env:
          IP:                ${{ steps.launch.outputs.ip }}
          PORT:              ${{ steps.launch.outputs.port }}
          SAMPLE_INTERVAL_S: ${{ github.event.inputs.sample_interval_s }}
          SPHERE_BIN_DEG:    ${{ github.event.inputs.sphere_bin_deg }}
          MAX_FRAMES:        ${{ github.event.inputs.max_frames }}
        run: |
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=60 -o ServerAliveInterval=30 root@$IP"
          MAXARG=""
          if [ -n "$MAX_FRAMES" ]; then MAXARG="--max-frames $MAX_FRAMES"; fi
          echo "--- Running Stage 0 static hotspot sweep ---"
          $SSH "cd /tmp/ffa_stage0 && FFMPEG_BIN=/usr/bin/ffmpeg python3 stage0_hotspot_sweep.py \
            --input equirect_trim.mp4 \
            --output-dir stage0_output \
            --weights models/football-ball-detection.pt \
            --sample-interval-s $SAMPLE_INTERVAL_S \
            --sphere-bin-deg $SPHERE_BIN_DEG \
            $MAXARG"
          $SSH "ls -lh /tmp/ffa_stage0/stage0_output/ && echo 'Stage 0 outputs OK'"

      - name: Pull Stage 0 outputs
        env:
          IP:   ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          mkdir -p stage0_output
          scp -i /tmp/vastai_key -P $PORT -o StrictHostKeyChecking=no -r \
              root@$IP:/tmp/ffa_stage0/stage0_output/* stage0_output/ && echo "outputs pulled OK"
          ls -lh stage0_output/

      - name: Upload Stage 0 outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage0-sweep-${{ github.run_id }}
          path: stage0_output/
          retention-days: 14

      - name: Upload Stage 0 JSONs to Google Drive
        env:
          IP:   ${{ steps.launch.outputs.ip }}
          PORT: ${{ steps.launch.outputs.port }}
        run: |
          ACCESS_TOKEN=$(cat /tmp/drive_token.txt)
          SSH="ssh -i /tmp/vastai_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@$IP"

          echo "--- Uploading hotspot_map.json to Drive ---"
          HM_RESPONSE=$($SSH "curl -s -X POST \
            'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart' \
            -H 'Authorization: Bearer $ACCESS_TOKEN' \
            -F 'metadata={\"name\":\"hotspot_map.json\"};type=application/json;charset=UTF-8' \
            -F 'file=@/tmp/ffa_stage0/stage0_output/hotspot_map.json;type=application/json'")
          echo "hotspot_map response: $HM_RESPONSE"
          HM_ID=$(echo "$HM_RESPONSE" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
          if [ -z "$HM_ID" ]; then echo "ERROR: hotspot_map upload returned no ID"; exit 1; fi

          echo "--- Uploading stage0_detections.json to Drive ---"
          DET_RESPONSE=$($SSH "curl -s -X POST \
            'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart' \
            -H 'Authorization: Bearer $ACCESS_TOKEN' \
            -F 'metadata={\"name\":\"stage0_detections.json\"};type=application/json;charset=UTF-8' \
            -F 'file=@/tmp/ffa_stage0/stage0_output/stage0_detections.json;type=application/json'")
          echo "stage0_detections response: $DET_RESPONSE"
          DET_ID=$(echo "$DET_RESPONSE" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
          if [ -z "$DET_ID" ]; then echo "ERROR: stage0_detections upload returned no ID"; exit 1; fi

          echo ""
          echo "=== STAGE 1 DRIVE IDS ==="
          echo "hotspot_map_file_id      : $HM_ID"
          echo "stage0_detections_file_id: $DET_ID"

      - name: Terminate Vast.ai instance
        if: always()
        env:
          VAST_API_KEY: ${{ secrets.VASTAI_API_KEY }}
          INSTANCE_ID:  ${{ steps.launch.outputs.instance_id }}
        run: |
          python3 - << 'PY'
          import os, urllib.request, json
          API_KEY     = os.environ["VAST_API_KEY"]
          instance_id = os.environ.get("INSTANCE_ID", "")
          if not instance_id:
              print("No instance ID — nothing to terminate")
              exit(0)
          headers = {"Authorization": f"Bearer {API_KEY}", "Content-Type": "application/json"}
          req = urllib.request.Request(
              f"https://console.vast.ai/api/v0/instances/{instance_id}/",
              method="DELETE", headers=headers)
          try:
              urllib.request.urlopen(req, timeout=15)
              print(f"Instance {instance_id} terminated OK")
          except Exception as e:
              print(f"Terminate failed (may already be gone): {e}")
          PY
