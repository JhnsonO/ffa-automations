name: Apply Stage 1 venue mask integration

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-stage1-venue-mask.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply venue mask patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("ball_tracker/stage1_candidate_gen.py")
          text = path.read_text()

          def replace_once(old, new):
              global text
              if old not in text:
                  raise RuntimeError(f"Patch anchor not found:\n{old[:160]}")
              text = text.replace(old, new, 1)

          replace_once(
              'KNOWN_FENCE_PITCH = -3.9\n\n\n# ─────────────────────────────────────────────────────────────────────────────\n# Geometry',
              '''KNOWN_FENCE_PITCH = -3.9
DEFAULT_VENUE_MASK = os.path.join(os.path.dirname(__file__), "venue_mask.json")


def _load_venue_mask(mask_path, frame_width, frame_height):
    """Load an optional calibration polygon; missing file means full-frame mode."""
    if not mask_path or not os.path.isfile(mask_path):
        return None
    with open(mask_path) as f:
        data = json.load(f)
    if data.get("frame_width") != frame_width or data.get("frame_height") != frame_height:
        raise ValueError(
            "Venue mask dimension mismatch: "
            f"mask={data.get('frame_width')}x{data.get('frame_height')}, "
            f"frame={frame_width}x{frame_height}"
        )
    polygon = data.get("polygon")
    if not isinstance(polygon, list) or len(polygon) < 4:
        raise ValueError("Venue mask polygon must contain at least 4 points")
    return np.asarray(polygon, dtype=np.int32).reshape((-1, 1, 2))


def _venue_contains(yaw, pitch, polygon, frame_width, frame_height):
    """Test spherical candidate coordinates against the equirectangular mask."""
    if polygon is None:
        return True
    x = ((yaw / 360.0) + 0.5) * frame_width
    y = (0.5 - pitch / 180.0) * frame_height
    return cv2.pointPolygonTest(polygon, (float(x), float(y)), False) >= 0


# ─────────────────────────────────────────────────────────────────────────────
# Geometry'''
          )

          replace_once(
              '    total_frames = int(cap.get(cv2.CAP_PROP_FRAME_COUNT))\n    fps          = cap.get(cv2.CAP_PROP_FPS) or s0_fps\n    print(f"[stage1] Clip: {total_frames} frames @ {fps:.2f} fps")',
              '''    total_frames = int(cap.get(cv2.CAP_PROP_FRAME_COUNT))
    fps          = cap.get(cv2.CAP_PROP_FPS) or s0_fps
    frame_width  = int(cap.get(cv2.CAP_PROP_FRAME_WIDTH))
    frame_height = int(cap.get(cv2.CAP_PROP_FRAME_HEIGHT))
    venue_polygon = _load_venue_mask(args.venue_mask, frame_width, frame_height)
    venue_mask_enabled = venue_polygon is not None
    if venue_mask_enabled:
        print(f"[stage1] Venue mask enabled: {args.venue_mask}")
    else:
        print("[stage1] Venue mask not found; using full frame")
    print(f"[stage1] Clip: {total_frames} frames @ {fps:.2f} fps")'''
          )

          replace_once(
              '    n_pitch_rejected     = 0   # dropped by hard pitch filter\n    n_kept               = 0   # after pitch filter, penalty applied',
              '''    n_pitch_rejected     = 0   # dropped by hard pitch filter
    n_venue_rejected     = 0   # dropped outside optional venue polygon
    n_kept               = 0   # after venue/pitch filters, penalty applied'''
          )

          replace_once(
              '        # ── Apply pitch filter + penalty ──────────────────────────────────────\n        frame_cands = []\n        for (yaw, pitch, raw_conf, crop_yaw, source, geom) in candidates_raw:\n            cand = process_candidate(',
              '''        # ── Apply venue mask, pitch filter + penalty ──────────────────────────
        frame_cands = []
        for (yaw, pitch, raw_conf, crop_yaw, source, geom) in candidates_raw:
            if not _venue_contains(yaw, pitch, venue_polygon, frame_width, frame_height):
                n_venue_rejected += 1
                continue
            cand = process_candidate('''
          )

          replace_once(
              '                f"raw={n_raw_so_far}  kept={n_kept}  pitch_rej={n_pitch_rejected}  "\n                f"nms_warn={n_nms_warnings}",',
              '                f"raw={n_raw_so_far}  kept={n_kept}  venue_rej={n_venue_rejected}  "\n                f"pitch_rej={n_pitch_rejected}  nms_warn={n_nms_warnings}",'
          )

          replace_once(
              '            "pitch_max_deg":    args.pitch_max_deg,\n            "hotspot_map":',
              '            "pitch_max_deg":    args.pitch_max_deg,\n            "venue_mask_enabled": venue_mask_enabled,\n            "venue_mask":       args.venue_mask if venue_mask_enabled else None,\n            "hotspot_map":'
          )

          replace_once(
              '        n_pitch_rejected, pitch_rej_pct,\n        candidates_after, weight_reduction,',
              '        n_pitch_rejected, pitch_rej_pct, n_venue_rejected, venue_mask_enabled,\n        candidates_after, weight_reduction,'
          )

          replace_once(
              '        "n_pitch_rejected": n_pitch_rejected,\n        "n_kept":',
              '        "n_pitch_rejected": n_pitch_rejected,\n        "n_venue_rejected": n_venue_rejected,\n        "venue_mask_enabled": venue_mask_enabled,\n        "n_kept":'
          )

          replace_once(
              'def build_report(n_frames, n_raw, n_s0_reuse, n_new, n_pitch_rej, pitch_rej_pct,\n                  n_kept, weight_reduction,',
              'def build_report(n_frames, n_raw, n_s0_reuse, n_new, n_pitch_rej, pitch_rej_pct,\n                  n_venue_rej, venue_mask_enabled, n_kept, weight_reduction,'
          )

          replace_once(
              '    lines.append(f"Hotspot map           : {os.path.basename(args.hotspot_map)}")\n    lines.append("")',
              '    lines.append(f"Hotspot map           : {os.path.basename(args.hotspot_map)}")\n    lines.append(f"Venue mask            : {args.venue_mask if venue_mask_enabled else \'disabled (full frame)\'}")\n    lines.append("")'
          )

          replace_once(
              '    lines.append(f"Pitch-rejected        : {n_pitch_rej}  ({pitch_rej_pct:.1f}% of raw)")\n    lines.append(f"After pitch filter    : {n_kept}")',
              '    lines.append(f"Venue-rejected        : {n_venue_rej}")\n    lines.append(f"Pitch-rejected        : {n_pitch_rej}  ({pitch_rej_pct:.1f}% of raw)")\n    lines.append(f"After venue/pitch     : {n_kept}")'
          )

          replace_once(
              '    ap.add_argument("--pitch-min-deg",      type=float, default=DEF_PITCH_MIN_DEG,',
              '    ap.add_argument("--venue-mask",         default=DEFAULT_VENUE_MASK,\n                    help="Optional venue_mask.json; missing file uses full frame")\n    ap.add_argument("--pitch-min-deg",      type=float, default=DEF_PITCH_MIN_DEG,'
          )

          path.write_text(text)
          PY
          python -m py_compile ball_tracker/stage1_candidate_gen.py
      - name: Commit integration and remove one-shot workflow
        run: |
          rm .github/workflows/apply-stage1-venue-mask.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ball_tracker/stage1_candidate_gen.py .github/workflows/apply-stage1-venue-mask.yml
          git commit -m "Integrate optional venue mask filtering in Stage 1"
          git push
