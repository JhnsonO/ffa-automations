name: VNC Cookie Deep Check (temporary)

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Check root's live Cookies file content right now
        run: |
          echo "=== file magic on root's LIVE Cookies file (direct, no copy) ==="
          sudo file /root/.config/chrome-ffa/Default/Cookies
          echo ""
          echo "=== mtime ==="
          sudo stat /root/.config/chrome-ffa/Default/Cookies | grep Modify
          echo ""
          echo "=== row counts via python sqlite3 directly on root's file (read-only, sudo) ==="
          sudo python3 - <<'PY'
          import sqlite3
          try:
              con = sqlite3.connect("file:/root/.config/chrome-ffa/Default/Cookies?mode=ro", uri=True)
              tables = con.execute("SELECT name FROM sqlite_master WHERE type='table'").fetchall()
              print("tables:", tables)
              if any(t[0]=='cookies' for t in tables):
                  total = con.execute("SELECT COUNT(*) FROM cookies").fetchone()[0]
                  yt = con.execute("SELECT COUNT(*) FROM cookies WHERE host_key LIKE '%youtube%' OR host_key LIKE '%google%'").fetchone()[0]
                  print(f"total cookies: {total}, youtube/google cookies: {yt}")
                  rows = con.execute("SELECT host_key, name, length(encrypted_value), expires_utc FROM cookies WHERE host_key LIKE '%youtube%' LIMIT 10").fetchall()
                  for r in rows:
                      print(r)
              con.close()
          except Exception as e:
              print("EXCEPTION:", repr(e))
          PY
          echo ""
          echo "=== Local State encryption key info (existence only, not printing key) ==="
          sudo test -f "/root/.config/chrome-ffa/Local State" && echo "Local State exists" || echo "Local State MISSING"
          sudo python3 -c "
          import json
          d = json.load(open('/root/.config/chrome-ffa/Local State'))
          print('has os_crypt.encrypted_key:', 'os_crypt' in d and 'encrypted_key' in d.get('os_crypt', {}))
          "
          echo ""
          echo "=== is libsecret/gnome-keyring available (affects Chrome cookie encryption on Linux) ==="
          which secret-tool 2>&1 || echo "no secret-tool"
          ps aux | grep -iE "gnome-keyring|kwalletd" | grep -v grep || echo "no keyring daemon running"
          echo ""
          echo "=== chrome version vs when profile was created ==="
          google-chrome --version
