name: Diagnose GoPro Media Dates

on:
  workflow_dispatch:
    inputs:
      pages:
        description: 'How many GoPro media pages to inspect'
        required: false
        default: '3'
        type: string
      per_page:
        description: 'How many items per page'
        required: false
        default: '50'
        type: string

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install chromium --with-deps

      - name: Diagnose GoPro media dates
        env:
          GOPRO_COOKIES: ${{ secrets.GOPRO_COOKIES }}
          GOPRO_EMAIL: ${{ secrets.GOPRO_EMAIL }}
          GOPRO_PASSWORD: ${{ secrets.GOPRO_PASSWORD }}
          PAGES: ${{ github.event.inputs.pages || '3' }}
          PER_PAGE: ${{ github.event.inputs.per_page || '50' }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import requests
          from datetime import datetime, timezone, timedelta

          GOPRO_API = "https://api.gopro.com"
          GOPRO_HEADERS = {"Accept": "application/vnd.gopro.jk.media+json; version=2.0.0"}

          pages = int(os.environ.get("PAGES") or 3)
          per_page = int(os.environ.get("PER_PAGE") or 50)
          cookies_raw = (os.environ.get("GOPRO_COOKIES") or "{}").strip() or "{}"

          try:
              cookies = json.loads(cookies_raw)
          except json.JSONDecodeError as e:
              raise SystemExit(f"GOPRO_COOKIES is not valid JSON: {e}")

          session = requests.Session()
          session.cookies.update(cookies)

          def refresh_cookies_via_playwright():
              email = os.environ.get("GOPRO_EMAIL")
              password = os.environ.get("GOPRO_PASSWORD")
              if not email or not password:
                  raise SystemExit("GOPRO_EMAIL / GOPRO_PASSWORD env vars not set — cannot refresh cookies")

              from playwright.sync_api import sync_playwright, TimeoutError as PlaywrightTimeout

              print("Saved GoPro cookies returned 401; refreshing via Playwright...")
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True, args=["--no-sandbox", "--disable-dev-shm-usage"])
                  context = browser.new_context(user_agent="Mozilla/5.0 Chrome/120.0.0.0 Safari/537.36")
                  page = context.new_page()
                  page.goto("https://gopro.com/login", wait_until="domcontentloaded", timeout=30000)
                  page.wait_for_selector("input#email", timeout=15000)
                  page.fill("input#email", email)
                  page.fill("input#password", password)
                  page.click("button.Login_loginButton__iaFNb")
                  try:
                      page.wait_for_url(lambda url: "gopro.com/login" not in url, timeout=20000)
                  except PlaywrightTimeout:
                      current_url = page.url
                      browser.close()
                      raise SystemExit(f"Playwright login failed — still on: {current_url}")
                  if "plus.gopro.com" not in page.url:
                      page.goto("https://plus.gopro.com", wait_until="domcontentloaded", timeout=20000)
                  fresh_cookies = context.cookies()
                  browser.close()

              cookie_dict = {c["name"]: c["value"] for c in fresh_cookies}
              session.cookies.clear()
              session.cookies.update(cookie_dict)
              print(f"Cookie refresh successful — {len(cookie_dict)} cookies loaded for this diagnostic run")

          def gopro_get(path, params=None, allow_refresh=True):
              response = session.get(f"{GOPRO_API}{path}", headers=GOPRO_HEADERS, params=params, timeout=30)
              print(f"GoPro GET {path}: HTTP {response.status_code}")
              if response.status_code == 401 and allow_refresh:
                  refresh_cookies_via_playwright()
                  return gopro_get(path, params=params, allow_refresh=False)
              response.raise_for_status()
              return response.json()

          fields = ",".join([
              "id",
              "filename",
              "file_size",
              "type",
              "captured_at",
              "created_at",
              "updated_at",
              "uploaded_at",
              "ready_to_view",
              "date_created",
              "date_modified",
              "source_duration",
              "duration",
          ])

          cutoff = datetime.now(timezone.utc) - timedelta(days=7)
          print("=" * 80)
          print("GoPro media date diagnostics")
          print(f"Inspecting up to {pages} page(s), {per_page} item(s) per page")
          print(f"Current UTC time: {datetime.now(timezone.utc).isoformat()}")
          print(f"Seven-day reference cutoff: {cutoff.isoformat()}")
          print("=" * 80)

          seen = 0
          for page in range(1, pages + 1):
              data = gopro_get("/media/search", params={
                  "fields": fields,
                  "order_by": "captured_at",
                  "order": "desc",
                  "per_page": per_page,
                  "page": page,
                  "type": "Video",
              })
              items = data.get("_embedded", {}).get("media", [])
              print(f"\nPAGE {page}: {len(items)} video item(s)")
              if not items:
                  break

              for item in items:
                  seen += 1
                  filename = item.get("filename") or "(no filename)"
                  media_id = item.get("id") or "(no id)"
                  file_size = int(item.get("file_size", 0) or 0)

                  date_keys = [
                      "captured_at",
                      "created_at",
                      "updated_at",
                      "uploaded_at",
                      "date_created",
                      "date_modified",
                  ]
                  date_values = {key: item.get(key) for key in date_keys if item.get(key)}
                  extra_keys = sorted(k for k in item.keys() if k not in {"id", "filename", "file_size", "type"})

                  print("-" * 80)
                  print(f"{seen}. {filename} | id={media_id} | size={file_size / 1e9:.2f} GB")
                  print(f"   available_date_fields: {date_values or 'none'}")
                  print(f"   all_returned_extra_keys: {extra_keys}")

              pages_meta = data.get("_pages", {})
              if page >= pages_meta.get("total_pages", 1):
                  break

          print("=" * 80)
          print(f"Diagnostics complete. Inspected {seen} item(s).")
          print("=" * 80)
          PY
