name: VNC Readonly Verify (temporary)

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Read-only status check
        run: |
          echo "=== x11vnc process ==="
          pgrep -af "x11vnc.*-display :99" || echo "NOT RUNNING"
          echo ""
          echo "=== listening on 5900 ==="
          sudo ss -tlnp | grep 5900 || echo "NOT LISTENING"
          echo ""
          echo "=== passwd file mtime (should be untouched by this run) ==="
          ls -la "$HOME/.vnc/passwd"
