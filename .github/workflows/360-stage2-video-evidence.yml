name: 360 Stage 2 — Video Evidence Pack

on:
  workflow_dispatch:

jobs:
  evidence-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          pip install --quiet numpy pillow opencv-python-headless
          sudo apt-get install -y --quiet ffmpeg aria2

      - name: Get Drive access token
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          python3 - << 'PY'
          import json, urllib.request, os
          token_data = json.loads(os.environ["YOUTUBE_TOKEN"])
          creds_data = json.loads(os.environ["YOUTUBE_CREDENTIALS"])
          client_id     = token_data.get("client_id") or creds_data["installed"]["client_id"]
          client_secret = token_data.get("client_secret") or creds_data["installed"]["client_secret"]
          refresh_token = token_data["refresh_token"]
          token_uri     = token_data.get("token_uri", "https://oauth2.googleapis.com/token")
          payload = json.dumps({"client_id": client_id, "client_secret": client_secret,
              "refresh_token": refresh_token, "grant_type": "refresh_token"}).encode()
          r = urllib.request.urlopen(urllib.request.Request(token_uri, data=payload,
              headers={"Content-Type": "application/json"}, method="POST"))
          tok = json.loads(r.read())
          if "access_token" not in tok:
              raise RuntimeError(f"Token refresh failed: {tok}")
          open("/tmp/drive_access_token.txt", "w").write(tok["access_token"])
          print(f"Drive token OK (expires_in={tok.get('expires_in')}s)")
          PY

      - name: Download Stage 1d artifact (7834602065) — redirect-safe
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p /tmp/stage1d
          python3 - << 'PY'
          import os, urllib.request, urllib.error, zipfile, io, sys
          token  = os.environ["GH_PAT"]
          art_id = "7834602065"

          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl): return None

          opener = urllib.request.build_opener(NoRedirect())
          req = urllib.request.Request(
              f"https://api.github.com/repos/JhnsonO/ffa-automations/actions/artifacts/{art_id}/zip",
              headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"})
          try:
              opener.open(req)
              blob_url = None
          except urllib.error.HTTPError as redir:
              blob_url = redir.headers.get("Location")
          if not blob_url:
              print("FATAL: no redirect URL from GH artifact endpoint"); sys.exit(1)

          print(f"Downloading artifact {art_id}...")
          with urllib.request.urlopen(urllib.request.Request(blob_url)) as r:
              data = r.read()
          print(f"  Downloaded {len(data)/1e6:.1f} MB")

          with zipfile.ZipFile(io.BytesIO(data)) as z:
              z.extractall("/tmp/stage1d")
          print("  Extracted:", os.listdir("/tmp/stage1d"))

          target = "/tmp/stage1d/stage1_candidates_geo_filtered.json"
          if not os.path.exists(target):
              print(f"FATAL: {target} not in artifact"); sys.exit(1)
          print(f"  {target}  {os.path.getsize(target)/1e6:.1f} MB  OK")
          PY

      - name: Download Stage 2 smoke tracklets (run 28063029760)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p /tmp/stage2_out
          python3 - << 'PY'
          import os, urllib.request, urllib.error, zipfile, io, sys, json
          token = os.environ["GH_PAT"]

          # Find the artifact by name from the smoke validation run
          run_id = "28063029760"
          req = urllib.request.Request(
              f"https://api.github.com/repos/JhnsonO/ffa-automations/actions/runs/{run_id}/artifacts",
              headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"})
          data = json.loads(urllib.request.urlopen(req).read())
          arts = data.get("artifacts", [])
          print(f"  Run {run_id} artifacts: {[a['name'] for a in arts]}")

          art = next((a for a in arts if "smoke-validation" in a["name"]), None)
          if not art:
              print("FATAL: smoke-validation artifact not found"); sys.exit(1)

          art_id = art["id"]
          print(f"  Using artifact {art_id}: {art['name']}")

          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl): return None

          opener = urllib.request.build_opener(NoRedirect())
          req2 = urllib.request.Request(
              f"https://api.github.com/repos/JhnsonO/ffa-automations/actions/artifacts/{art_id}/zip",
              headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"})
          try:
              opener.open(req2)
              blob_url = None
          except urllib.error.HTTPError as redir:
              blob_url = redir.headers.get("Location")
          if not blob_url:
              print("FATAL: no redirect URL"); sys.exit(1)

          with urllib.request.urlopen(urllib.request.Request(blob_url)) as r:
              zdata = r.read()
          print(f"  Downloaded {len(zdata)/1e6:.1f} MB")

          with zipfile.ZipFile(io.BytesIO(zdata)) as z:
              z.extractall("/tmp/stage2_out")
          print("  Extracted:", os.listdir("/tmp/stage2_out"))

          target = "/tmp/stage2_out/tracklets.json"
          if not os.path.exists(target):
              print(f"FATAL: tracklets.json not in artifact"); sys.exit(1)
          print(f"  tracklets.json  {os.path.getsize(target)/1e6:.2f} MB  OK")
          PY

      - name: Download hotspot map from Drive
        run: |
          ACCESS_TOKEN=$(cat /tmp/drive_access_token.txt)
          curl -fsSL \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://www.googleapis.com/drive/v3/files/1TNZvN7OLrMurAjACTQY9ytEzZWwIeF0M?alt=media" \
            -o /tmp/stage1d/hotspot_map.json
          echo "hotspot_map.json: $(wc -c < /tmp/stage1d/hotspot_map.json) bytes"

      - name: Download source video from Drive (aria2c)
        run: |
          mkdir -p /tmp/video
          ACCESS_TOKEN=$(cat /tmp/drive_access_token.txt)
          aria2c \
            --header="Authorization: Bearer $ACCESS_TOKEN" \
            --out="equirect_trim.mp4" \
            --dir="/tmp/video" \
            --max-connection-per-server=4 \
            --split=4 \
            --min-split-size=64M \
            --file-allocation=none \
            --show-console-readout=true \
            "https://www.googleapis.com/drive/v3/files/1z2p2FgLsjgvIIBw0HZXWEenckMLWpVNX?alt=media"
          ls -lh /tmp/video/
          echo "Video size: $(wc -c < /tmp/video/equirect_trim.mp4) bytes"

      - name: Verify video with ffprobe (fail-fast)
        run: |
          python3 - << 'PY'
          import subprocess, json, sys
          probe = subprocess.run(
              ["ffprobe", "-v", "error", "-select_streams", "v:0",
               "-show_entries", "stream=width,height,r_frame_rate,nb_frames",
               "-of", "json", "/tmp/video/equirect_trim.mp4"],
              capture_output=True, text=True)
          if probe.returncode != 0:
              print(f"FATAL ffprobe: {probe.stderr}"); sys.exit(1)
          s = json.loads(probe.stdout)["streams"][0]
          w, h = s["width"], s["height"]
          num, den = s["r_frame_rate"].split("/")
          fps = float(num) / float(den)
          ratio = w / h
          print(f"  {w}×{h}  fps={fps:.4f}  ratio={ratio:.3f}")
          if abs(ratio - 2.0) > 0.15:
              print(f"FATAL: aspect ratio {ratio:.3f} — not equirectangular (expected ~2.0)"); sys.exit(1)
          if fps <= 0:
              print("FATAL: FPS could not be determined"); sys.exit(1)
          print("  Equirectangular OK")
          nb = s.get("nb_frames", "unknown")
          print(f"  Total frames: {nb}")
          PY

      - name: Build video evidence pack
        run: |
          mkdir -p /tmp/stage2_evidence
          python3 ball_tracker/stage2_video_evidence_pack.py \
            --tracklets    /tmp/stage2_out/tracklets.json \
            --candidates   /tmp/stage1d/stage1_candidates_geo_filtered.json \
            --video        /tmp/video/equirect_trim.mp4 \
            --output-dir   /tmp/stage2_evidence \
            --max-crops-per-tracklet 10

      - name: Generate companion table pack
        run: |
          python3 ball_tracker/stage2_review_pack.py \
            --tracklets /tmp/stage2_out/tracklets.json \
            --output-dir /tmp/stage2_evidence

      - name: Collect outputs
        run: |
          mkdir -p final_output
          cp /tmp/stage2_evidence/stage2_video_evidence_pack.png  final_output/
          cp /tmp/stage2_evidence/stage2_evidence_summary.txt     final_output/
          cp /tmp/stage2_evidence/stage2_review_pack.png          final_output/ 2>/dev/null || true
          cp /tmp/stage2_evidence/stage2_review_summary.txt       final_output/ 2>/dev/null || true
          echo "=== final_output ==="
          ls -lh final_output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage2-video-evidence-${{ github.run_id }}
          path: final_output/
          retention-days: 30
